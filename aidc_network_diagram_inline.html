/* ===== js/hardware-engine.js ===== */

/**
 * hardware-engine.js - B300 网络设备硬件计算引擎
 * 纯函数设计，输入确定则输出确定，支持 Memoization 缓存
 */

/** @typedef {{ role: string, model: string, count: number, desc: string }} SwitchItem */
/** @typedef {{ conn: string, model: string, count: number, desc: string }} ModuleItem */
/** @typedef {{ conn: string, model: string, count: number, desc: string }} CableItem */
/** @typedef {{ networkType: string, podCount: number, serversPerPod: number, leafSwitches: number, spineSwitches: number, coreSwitches: number, [key:string]: any }} ComputeMeta */
/** @typedef {{ storageNodes: number, totalStorageDownlink: number, storageLeaf: number, storageSpine: number, serverStoragePorts: number, storagePorts: number }} StorageMeta */
/** @typedef {{ switches: SwitchItem[], modules: ModuleItem[], cables: CableItem[], meta: ComputeMeta }} ComputeSection */
/** @typedef {{ switches: SwitchItem[], modules: ModuleItem[], cables: CableItem[], meta: StorageMeta }} StorageSection */
/** @typedef {{ compute: ComputeSection, storage: StorageSection|null }} HardwareResult */

// Memoization 缓存 Map
const _cache = new Map();

/**
 * 计算下一个 2 的幂
 * @param {number} n
 * @returns {number}
 */
function nextPowerOf2(n) {
    if (n <= 0) return 1;
    return Math.pow(2, Math.ceil(Math.log2(n)));
}

/**
 * 生成缓存键
 * @param {number} serverCount
 * @param {string} gpuType
 * @param {Object} options
 * @returns {string}
 */
function _cacheKey(serverCount, gpuType, options = {}) {
    return `${gpuType}::${serverCount}::${options.serverStorageNic || ''}::${options.storageServerCount || 0}::${options.storageNic || ''}::${options.storageNicCount || 0}::${options.architecture || ''}::${options.switchModel || ''}`;
}

/**
 * 获取算力服务器存储网端口数
 * @param {string} serverStorageNic
 * @returns {number}
 */
function getServerStoragePorts(serverStorageNic) {
    const spec = STORAGE_NIC_SPECS[serverStorageNic];
    return spec ? spec.portCount : 1;
}

/**
 * 获取存储服务器端口数（单网卡端口数 * 网卡数量）
 * @param {string} storageNic
 * @param {number} storageNicCount
 * @returns {number}
 */
function getStoragePorts(storageNic, storageNicCount) {
    const spec = STORAGE_NIC_SPECS[storageNic];
    const portPerNic = spec ? spec.portCount : 1;
    return portPerNic * storageNicCount;
}

/**
 * 计算 B300 网络设备硬件清单
 * @param {number} serverCount
 * @param {string} gpuType - GPU 规格键，如 'B300_SXM6'
 * @param {Object} options - 可选参数
 * @param {string} [options.serverStorageNic='CX7_400G'] - 算力服务器存储网卡配置
 * @param {number} [options.storageServerCount=12] - 存储服务器数量
 * @param {string} [options.storageNic='CX7_400G'] - 存储网卡配置
 * @param {number} [options.storageNicCount=2] - 存储网卡数量
 * @param {string} [options.architecture='virtual-dual-plane'] - 组网架构
 * @returns {HardwareResult}
 */
function calcHardware(serverCount, gpuType = 'B300_SXM6', options = {}) {
    const {
        serverStorageNic = 'CX7_400G',
        storageServerCount = 12,
        storageNic = 'CX7_400G',
        storageNicCount = 2,
        architecture = 'virtual-dual-plane'
    } = options;

    const key = _cacheKey(serverCount, gpuType, options);
    if (_cache.has(key)) {
        return _cache.get(key);
    }

    const gpuSpec = GPU_SPECS[gpuType] || GPU_SPECS.B300_SXM6;
    const isSinglePlane = architecture === 'single-plane';
    const switchModel = isSinglePlane
        ? 'RG-S6990-64OC2XS'
        : (options.switchModel || 'RG-S6990-128QC2XS');
    const swSpec = SWITCH_SPECS[switchModel] || SWITCH_SPECS['RG-S6990-128QC2XS'];
    const result = { compute: /** @type {ComputeSection} */(null), storage: /** @type {StorageSection|null} */(null) };

    // ===== 计算网 =====
    const downlinksPerServer = isSinglePlane
        ? (gpuSpec.downlinksPerServer / 2)
        : gpuSpec.downlinksPerServer;
    const leafDownlinkPorts = isSinglePlane
        ? swSpec.downlinkPorts
        : gpuSpec.leafDownlinkPorts;
    const serversPerLeaf = leafDownlinkPorts / downlinksPerServer;

    // Leaf 数量
    let leafSwitches = 0;
    let podCount = 0;
    let serversPerPod = 0;

    if (isSinglePlane) {
        serversPerPod = 32;
        podCount = Math.ceil(serverCount / serversPerPod);
        leafSwitches = podCount * 8;
    } else {
        leafSwitches = Math.ceil(serverCount / serversPerLeaf);
        if (leafSwitches % 2 !== 0) leafSwitches += 1;
    }

    // Spine / Core 数量
    let spineSwitches = 0;
    let coreSwitches = 0;
    let networkType = '';

    if (serverCount <= ARCHITECTURE.TWO_TIER_MAX) {
        spineSwitches = nextPowerOf2(Math.ceil(leafSwitches / 2));
        networkType = 'Two-Tier (Leaf-Spine)';
    } else {
        spineSwitches = leafSwitches;
        coreSwitches = nextPowerOf2(Math.ceil(spineSwitches / 2));
        networkType = 'Three-Tier (Leaf-Spine-Core)';
    }

    // 计算网交换机列表
    const computeSwitches = /** @type {SwitchItem[]} */([]);
    computeSwitches.push({
        role: 'Leaf',
        model: switchModel,
        count: leafSwitches,
        desc: `${leafDownlinkPorts}下行+${leafDownlinkPorts}上行 400G`
    });
    computeSwitches.push({
        role: 'Spine',
        model: switchModel,
        count: spineSwitches,
        desc: `${leafDownlinkPorts * 2} 400G全互联`
    });
    if (coreSwitches > 0) {
        computeSwitches.push({
            role: 'Core',
            model: switchModel,
            count: coreSwitches,
            desc: '核心层汇聚'
        });
    }

    // 计算网光模块
    const computeModules = /** @type {ModuleItem[]} */([]);
    const ct = MODULES_TABLE.compute;
    // Spine↔Leaf: 双端计算
    const spineLeafModuleCount = leafSwitches * leafDownlinkPorts * 2;
    computeModules.push({ conn: 'Spine↔Leaf', model: ct.spineLeaf.model, count: spineLeafModuleCount, desc: ct.spineLeaf.desc });
    // Server↔Leaf: 交换机侧
    const serverLeafModuleCount = serverCount * downlinksPerServer;
    computeModules.push({ conn: 'Server↔Leaf', model: ct.serverLeafSw.model, count: serverLeafModuleCount, desc: ct.serverLeafSw.desc });
    // Server↔Leaf: 服务器侧 (800G分支模块, 每台配8个)
    const serverSideModuleCount = serverCount * 8;
    computeModules.push({ conn: 'Server↔Leaf', model: ct.serverLeafSrv.model, count: serverSideModuleCount, desc: ct.serverLeafSrv.desc });

    // 计算网线缆
    const computeCables = /** @type {CableItem[]} */([]);
    const cab = MODULES_TABLE.cables;
    computeCables.push({ conn: 'Spine↔Leaf', model: cab.spineLeafCompute.model, count: leafSwitches * leafDownlinkPorts, desc: cab.spineLeafCompute.desc });
    computeCables.push({ conn: 'Server↔Leaf', model: cab.serverLeafCompute.model, count: serverCount * downlinksPerServer, desc: cab.serverLeafCompute.desc });

    // POD 划分
    if (!isSinglePlane) {
        if (serverCount <= 64) {
            podCount = 1;
            serversPerPod = serverCount;
        } else {
            serversPerPod = 64;
            podCount = Math.ceil(serverCount / serversPerPod);
        }
    }
    // 单平面下 podCount / serversPerPod / leafSwitches 已在上方计算

    result.compute = {
        switches: computeSwitches,
        modules: computeModules,
        cables: computeCables,
        meta: {
            networkType,
            podCount,
            serversPerPod,
            leafSwitches,
            spineSwitches,
            coreSwitches
        }
    };

    // ===== 存储网 =====
    // 使用菜单配置的存储服务器数量，不再硬编码配比
    const actualStorageNodes = storageServerCount;
    if (actualStorageNodes > 0 && serverCount >= 32) {
        // 算力服务器存储网端口总数
        const serverStoragePorts = getServerStoragePorts(serverStorageNic);
        const totalServerStorageDownlink = serverCount * serverStoragePorts;

        // 存储服务器存储网端口总数
        const storagePorts = getStoragePorts(storageNic, storageNicCount);
        const totalStorageNodeDownlink = actualStorageNodes * storagePorts;

        const totalStorageDownlink = totalServerStorageDownlink + totalStorageNodeDownlink;

        let storageLeaf = Math.ceil(totalStorageDownlink / leafDownlinkPorts);
        if (storageLeaf % 2 !== 0) storageLeaf += 1;

        let storageSpine = Math.max(2, nextPowerOf2(Math.ceil(storageLeaf / 2)));

        const storageSwitches = /** @type {SwitchItem[]} */([]);
        storageSwitches.push({
            role: 'Leaf',
            model: switchModel,
            count: storageLeaf,
            desc: `${leafDownlinkPorts}下行+${leafDownlinkPorts}上行 400G`
        });
        storageSwitches.push({
            role: 'Spine',
            model: switchModel,
            count: storageSpine,
            desc: `${leafDownlinkPorts * 2} 400G全互联`
        });

        const storageModules = /** @type {ModuleItem[]} */([]);
        const st = MODULES_TABLE.storage;
        const storageLeafSpineModuleCount = storageLeaf * leafDownlinkPorts * 2;
        storageModules.push({ conn: 'Spine↔Leaf', model: st.spineLeaf.model, count: storageLeafSpineModuleCount, desc: st.spineLeaf.desc });
        storageModules.push({ conn: 'Server↔Leaf', model: st.serverLeaf.model, count: totalStorageDownlink, desc: st.serverLeaf.desc });

        const storageCables = /** @type {CableItem[]} */([]);
        storageCables.push({ conn: 'Spine↔Leaf', model: cab.spineLeafStorage.model, count: storageLeaf * leafDownlinkPorts, desc: cab.spineLeafStorage.desc });
        storageCables.push({ conn: 'Server↔Leaf', model: cab.serverLeafStorage.model, count: totalStorageDownlink, desc: cab.serverLeafStorage.desc });

        result.storage = {
            switches: storageSwitches,
            modules: storageModules,
            cables: storageCables,
            meta: {
                storageNodes: actualStorageNodes,
                totalStorageDownlink,
                storageLeaf,
                storageSpine,
                serverStoragePorts,
                storagePorts
            }
        };
    }

    _cache.set(key, result);
    return result;
}

/**
 * 清除硬件计算缓存
 */
function clearHardwareCache() {
    _cache.clear();
}

/**
 * 获取缓存统计（调试用）
 * @returns {{ size: number, keys: string[] }}
 */
function getCacheStats() {
    return { size: _cache.size, keys: Array.from(_cache.keys()) };
}

/* ===== js/layout-engine.js ===== */

/**
 * layout-engine.js - 布局计算引擎
 * 负责坐标计算、POD 划分、压缩显示策略
 * 输出纯数据结构，供 svg-renderer.js 消费
 */

/** @typedef {{ type: 'rect'|'text'|'line', [key:string]: any }} BgElement */
/** @typedef {{ type: 'virtualSpine'|'physicalSpine'|'singleSpine'|'gap', idx?: number, count?: number, x: number, y: number, width: number, height: number, id?: string, label?: string, tooltip?: string, p1x?: number, p2x?: number, bottomY?: number }} SpineNode */
/** @typedef {{ type: 'leafPair'|'gap', groupIdx?: number, count?: number, x: number, y: number, l1Id: string, l2Id: string, l1Label: string, l2Label: string, p1x: number, p2x: number, bottomY: number, podIndex: number, tooltipL1: string, tooltipL2: string }} LeafNode */
/** @typedef {{ type: 'server'|'gap'|'ellipsis', idx?: string, x: number, y: number, width: number, height: number, id: string, label: string, tooltip: string, railCount: number }} ServerNode */
/** @typedef {{ x1: number, y1: number, x2: number, y2: number, color: string, classes: string }} LinkSegment */
/** @typedef {{ podIndex: number, bgRect: Object, podLabel: Object, podSubLabel: Object, leafNodes: LeafNode[], serverNodes: ServerNode[] }} PodLayout */
/** @typedef {{ dimensions: {width:number,height:number}, bgElements: BgElement[], spineNodes: SpineNode[], pods: PodLayout[], links: LinkSegment[], visibleLeafGroupIds: Set<number>, architecture: string }} TopologyLayout */

/**
 * 构建压缩显示位置数组
 * @param {number} totalCount
 * @returns {Array<{type:'item'|'gap', idx?:number, count?:number}>}
 */
function buildCompressedPositions(totalCount) {
    if (totalCount <= 3) {
        return Array.from({ length: totalCount }, (_, i) => ({ type: 'item', idx: i + 1 }));
    }
    return [
        { type: 'item', idx: 1 },
        { type: 'item', idx: 2 },
        { type: 'gap', count: totalCount - 3 },
        { type: 'item', idx: totalCount }
    ];
}

/**
 * 构建 POD 压缩显示位置数组
 * @param {number} podCount
 * @returns {Array<{type:'pod'|'gap', actualIndex?:number, count?:number}>}
 */
function buildPodPositions(podCount) {
    if (podCount <= 2) {
        return Array.from({ length: podCount }, (_, i) => ({ type: 'pod', actualIndex: i }));
    }
    const omitted = podCount - 3;
    const positions = [
        { type: 'pod', actualIndex: 0 },           // POD 1
        { type: 'pod', actualIndex: 1 }            // POD 2
    ];
    if (omitted > 0) {
        positions.push({ type: 'gap', count: omitted }); // 省略标记
    }
    positions.push({ type: 'pod', actualIndex: podCount - 1 }); // 最后一个 POD
    return positions;
}

/**
 * 获取架构显示信息
 * @param {string} architecture
 * @returns {{ label: string, desc: string, planes: number, mode: string }}
 */
function getArchDisplayInfo(architecture) {
    const archType = ARCHITECTURE_TYPES[architecture] || ARCHITECTURE_TYPES['virtual-dual-plane'];
    switch (architecture) {
        case 'single-plane':
            return { ...archType, label: '单平面组网', desc: '单平面 [全蓝]' };
        case 'physical-dual-plane':
            return { ...archType, label: '物理双平面组网', desc: '物理双平面 [蓝/橙分离]' };
        case 'virtual-dual-plane':
        default:
            return { ...archType, label: '虚拟双平面组网', desc: '物理单机·虚拟双平面 [VRF逃生]' };
    }
}

/**
 * 计算拓扑布局
 * @param {number} serverCount
 * @param {string} gpuType
 * @param {Object} options
 * @param {string} [options.architecture='virtual-dual-plane']
 * @returns {TopologyLayout}
 */
function calcLayout(serverCount, gpuType, options = {}) {
    const { architecture = 'virtual-dual-plane', computeNic = 'CX8_800G' } = options;
    const archInfo = getArchDisplayInfo(architecture);
    const computeNicSpec = COMPUTE_NIC_SPECS[computeNic];
    const computeNicLabel = computeNicSpec ? computeNicSpec.label : computeNic;
    const isSinglePlane = archInfo.mode === 'single';
    const isVirtualDual = archInfo.mode === 'virtual';
    const isPhysicalDual = archInfo.mode === 'physical';

    const gpuSpec = GPU_SPECS[gpuType];
    const parts = gpuType.split('_');
    const railCount = gpuSpec?.railCount || 8;

    const hwData = calcHardware(serverCount, gpuType, options);
    const cm = hwData.compute.meta;
    const actualSpineCount = cm.spineSwitches;
    const podCount = cm.podCount;
    const leafGroupsPerPod = isSinglePlane ? Math.ceil(cm.leafSwitches / podCount) : Math.ceil(cm.leafSwitches / podCount / 2);

    const spineY = LAYOUT.spineY;
    const leafY = LAYOUT.leafY;
    const serverY = LAYOUT.serverY;

    // POD 压缩位置计算
    const podPositions = buildPodPositions(podCount);
    const normalPodCount = podPositions.filter(p => p.type === 'pod').length;
    const podGapCount = podPositions.filter(p => p.type === 'gap').length;

    // 画布宽度 = 正常POD标准宽度总和 + gap窄宽度总和
    const canvasWidth = Math.max(
        LAYOUT.baseCanvasWidth,
        normalPodCount * LAYOUT.podWidthFactor + podGapCount * LAYOUT.podGapWidth
    );
    const spineBoxWidth = canvasWidth - LAYOUT.spineBoxPadding;

    // 正常POD均分剩余空间（扣除gap固定宽度后）
    const normalPodWidth = podGapCount > 0 && normalPodCount > 0
        ? (spineBoxWidth - podGapCount * LAYOUT.podGapWidth) / normalPodCount
        : spineBoxWidth / podPositions.length;

    // 累加计算每个 POD 位置的起始 x 和宽度
    const podLayoutInfos = [];
    let currentPodX = 200;
    for (const pos of podPositions) {
        const width = pos.type === 'gap' ? LAYOUT.podGapWidth : normalPodWidth;
        podLayoutInfos.push({ ...pos, x: currentPodX, width });
        currentPodX += width;
    }

    /** @type {BgElement[]} */
    const bgElements = [];
    /** @type {SpineNode[]} */
    const spineNodes = [];
    /** @type {LinkSegment[]} */
    const links = [];
    /** @type {PodLayout[]} */
    const pods = [];

    // ===== 1. Spine 层背景 =====
    bgElements.push({
        type: 'rect',
        x: 200, y: spineY - 80,
        width: spineBoxWidth, height: 180,
        fill: 'rgba(15, 23, 42, 0.5)',
        stroke: '#475569', strokeWidth: 2, strokeDasharray: '6,4', rx: 12
    });
    bgElements.push({
        type: 'text',
        x: 230, y: spineY - 52,
        text: `核心层 (Spine) — ${archInfo.desc} [${actualSpineCount}台]`,
        fontSize: 16, fill: '#94a3b8', fontWeight: 'bold',
        fontFamily: "'Inter','Microsoft YaHei',sans-serif"
    });

    // VRF逃生图例（仅虚拟双平面显示）
    if (isVirtualDual) {
        bgElements.push({
            type: 'line',
            x1: spineBoxWidth - 40, y1: spineY - 68,
            x2: spineBoxWidth - 20, y2: spineY - 68,
            stroke: '#fbbf24', strokeWidth: 1, strokeDasharray: '3,3'
        });
        bgElements.push({
            type: 'text',
            x: spineBoxWidth - 15, y: spineY - 64,
            text: '= VRF虚拟逃生',
            fontSize: 9, fill: '#fbbf24', fontWeight: 600
        });
    }

    // ===== 2. Spine 节点位置计算 =====
    const spinePositions = buildCompressedPositions(actualSpineCount);
    const spineGapCount = spinePositions.filter(p => p.type === 'gap').length;
    const normalSpineCount = spinePositions.filter(p => p.type === 'item').length;
    const availableSpineWidth = spineBoxWidth;
    const normalSpineWidth = spineGapCount > 0 && normalSpineCount > 0
        ? (availableSpineWidth - spineGapCount * LAYOUT.spineGapWidth) / normalSpineCount
        : availableSpineWidth / spinePositions.length;

    // 累加计算每个 spine 位置的中心 x
    const spineLayoutInfos = [];
    let currentSpineX = 200;
    for (const pos of spinePositions) {
        const width = pos.type === 'gap' ? LAYOUT.spineGapWidth : normalSpineWidth;
        const cx = currentSpineX + width / 2;
        spineLayoutInfos.push({ ...pos, cx, width });
        currentSpineX += width;
    }

    for (let vi = 0; vi < spinePositions.length; vi++) {
        const pos = spinePositions[vi];
        const info = spineLayoutInfos[vi];
        const cx = info.cx;

        if (pos.type === 'gap') {
            spineNodes.push({
                type: 'gap',
                count: pos.count,
                totalCount: actualSpineCount,
                x: cx - 60, y: spineY - 5,
                width: 120, height: 40
            });
            continue;
        }

        const idx = pos.idx;
        const spineW = LAYOUT.spineW;
        const spineH = LAYOUT.spineH;

        if (isVirtualDual) {
            // 虚拟双平面：一台物理机内VRF分区
            spineNodes.push({
                type: 'virtualSpine',
                idx,
                id: `spine_${idx}`,
                x: cx - spineW / 2,
                y: spineY - 25,
                width: spineW,
                height: spineH,
                p1x: cx - 50,
                p2x: cx + 50,
                bottomY: spineY - 25 + spineH,
                label: `Spine-${idx}`,
                tooltip: `<div class="mb-1 font-semibold">Spine-${idx}</div>物理交换机 (虚拟双平面)<br>平面1: VRF1 (蓝色)<br>平面2: VRF2 (橙色)<br>VRF逃生: 虚拟路径 (不占物理端口)<br>800G 端口`
            });
        } else if (isPhysicalDual) {
            // 物理双平面：独立P1/P2物理交换机
            spineNodes.push({
                type: 'physicalSpine',
                idx,
                id: `spine_${idx}`,
                x: cx - spineW / 2 - 30,
                y: spineY - 25,
                width: spineW * 0.7,
                height: spineH,
                p1x: cx - 30,
                p2x: cx + 30,
                bottomY: spineY - 25 + spineH,
                label: `Spine-${idx}`,
                tooltip: `<div class="mb-1 font-semibold">Spine-${idx}</div>物理双平面交换机<br>平面1 (蓝色) / 平面2 (橙色)<br>独立物理设备<br>800G 端口`
            });
        } else {
            // 单平面：仅蓝色
            spineNodes.push({
                type: 'singleSpine',
                idx,
                id: `spine_${idx}`,
                x: cx - spineW / 2,
                y: spineY - 25,
                width: spineW,
                height: spineH,
                p1x: cx,
                p2x: cx,  // 单平面只有一个连接点
                bottomY: spineY - 25 + spineH,
                label: `Spine-${idx}`,
                tooltip: `<div class="mb-1 font-semibold">Spine-${idx}</div>单平面交换机<br>800G 端口`
            });
        }
    }

    // ===== 3. POD 层 =====
    const visibleLeafGroupIds = new Set();

    for (let vi = 0; vi < podPositions.length; vi++) {
        const pos = podPositions[vi];
        const podInfo = podLayoutInfos[vi];
        const podX = podInfo.x;
        const podWidth = podInfo.width;

        // gap POD：省略占位符
        if (pos.type === 'gap') {
            const podBoxTop = leafY - 110;
            const podBoxHeight = serverY - leafY + 250;
            const podBoxCenterY = podBoxTop + podBoxHeight / 2;
            pods.push({
                podIndex: -1,
                leafNodes: [],
                serverNodes: [],
                bgRect: {
                    x: podX + 20, y: podBoxTop,
                    width: podWidth - 40,
                    height: podBoxHeight,
                    fill: 'rgba(30, 41, 59, 0.1)',
                    stroke: '#334155', strokeWidth: 1, rx: 16, strokeDasharray: '6,4'
                },
                podLabel: {
                    x: podX + podWidth / 2, y: podBoxCenterY - 11,
                    text: `\u2190 ${podCount} \u2192`,
                    fontSize: 18, fill: '#fbbf24', fontWeight: 'bold',
                    fontFamily: "'Inter','Microsoft YaHei',sans-serif",
                    textAnchor: 'middle'
                },
                podSubLabel: {
                    x: podX + podWidth / 2, y: podBoxCenterY + 11,
                    text: `共 ${podCount} 个POD`,
                    fontSize: 13, fill: '#94a3b8',
                    fontFamily: "'Inter','Microsoft YaHei',sans-serif",
                    textAnchor: 'middle'
                }
            });
            continue;
        }

        const p = pos.actualIndex;
        const podLayout = /** @type {PodLayout} */({
            podIndex: p,
            leafNodes: [],
            serverNodes: []
        });

        // POD 背景
        podLayout.bgRect = {
            x: podX + 20, y: leafY - 110,
            width: podWidth - 40,
            height: serverY - leafY + 250,
            fill: 'rgba(30, 41, 59, 0.2)',
            stroke: '#334155', strokeWidth: 1, rx: 16
        };
        podLayout.podLabel = {
            x: podX + 50, y: leafY - 70,
            text: `POD ${p + 1}`,
            fontSize: 16, fill: '#cbd5e1', fontWeight: 'bold',
            fontFamily: "'Inter','Microsoft YaHei',sans-serif"
        };
        const leafCountDisplay = isSinglePlane ? leafGroupsPerPod : leafGroupsPerPod * 2;
        podLayout.podSubLabel = {
            x: podX + 50, y: leafY - 48,
            text: `包含 ${leafCountDisplay}台 Leaf, 下联 ${Math.min(cm.serversPerPod, serverCount - p * cm.serversPerPod)}台 算力节点`,
            fontSize: 11, fill: '#64748b',
            fontFamily: "'Inter','Microsoft YaHei',sans-serif"
        };

        // Leaf 层
        const leafPositions = buildCompressedPositions(leafGroupsPerPod);
        const leafGapCount = leafPositions.filter(p => p.type === 'gap').length;
        const normalLeafCount = leafPositions.filter(p => p.type === 'item').length;
        const availableLeafWidth = podWidth - LAYOUT.podPadding * 2;
        const normalLeafWidth = leafGapCount > 0 && normalLeafCount > 0
            ? (availableLeafWidth - leafGapCount * LAYOUT.leafGapWidth) / normalLeafCount
            : availableLeafWidth / leafPositions.length;

        // 累加计算每个 leaf 位置的中心 x（相对于 POD 起点）
        const leafLayoutInfos = [];
        let currentLeafX = LAYOUT.podPadding / 2;
        for (const pos of leafPositions) {
            const width = pos.type === 'gap' ? LAYOUT.leafGapWidth : normalLeafWidth;
            const cx = currentLeafX + width / 2;
            leafLayoutInfos.push({ ...pos, cx, width });
            currentLeafX += width;
        }

        const leafNodes = [];

        for (let vi = 0; vi < leafPositions.length; vi++) {
            const pos = leafPositions[vi];
            const info = leafLayoutInfos[vi];
            const cx = podX + info.cx;

            if (pos.type === 'gap') {
                podLayout.leafNodes.push({
                    type: 'gap',
                    count: pos.count,
                    totalCount: leafGroupsPerPod,
                    x: cx - 55, y: leafY + 5,
                    width: 110, height: 40,
                    podIndex: p
                });
                continue;
            }

            const idx = pos.idx;
            const l1Id = `l1_${p}_${idx}`;
            const l2Id = `l2_${p}_${idx}`;

            visibleLeafGroupIds.add(idx);

            const node = {
                type: 'leafPair',
                groupIdx: idx,
                x: cx,
                y: leafY,
                l1Id,
                l2Id,
                l1Label: isSinglePlane ? `Leaf-${idx}` : `L1-${idx}`,
                l2Label: `L2-${idx}`,
                p1x: isSinglePlane ? cx : cx - 45,
                p2x: isSinglePlane ? cx : cx + 45,
                bottomY: leafY + 50,
                podIndex: p,
                tooltipL1: isSinglePlane
                    ? `<b>Leaf-${idx}</b><br>所在 POD: ${p + 1}<br>角色: Leaf (单平面)<br>上行: 32<br>下行: 32`
                    : `<b>L1-${idx}</b><br>所在 POD: ${p + 1}<br>角色: Leaf (平面1)<br>上行: 64<br>下行: 64`,
                tooltipL2: `<b>L2-${idx}</b><br>所在 POD: ${p + 1}<br>角色: Leaf (平面2)<br>上行: 64<br>下行: 64`
            };
            podLayout.leafNodes.push(node);
            leafNodes.push({ id: idx, p1x: isSinglePlane ? cx : cx - 45, p2x: isSinglePlane ? cx : cx + 45, y: leafY + 50, l1Id, l2Id });

            // 到 Spine 的连线
            spineNodes.forEach(sp => {
                if (sp.type === 'gap') return;

                if (isSinglePlane) {
                    // 单平面：仅蓝色连线，从Leaf中心到Spine中心
                    links.push({
                        x1: cx, y1: leafY,
                        x2: sp.p1x, y2: sp.bottomY,
                        color: '#3b82f6',
                        classes: `${l1Id} dev-${sp.id} ${sp.id}`
                    });
                } else {
                    // 双平面：蓝色+橙色连线
                    links.push({
                        x1: cx - 45, y1: leafY,
                        x2: sp.p1x, y2: sp.bottomY,
                        color: '#3b82f6',
                        classes: `${l1Id} dev-${sp.id} ${sp.id}`
                    });
                    links.push({
                        x1: cx + 45, y1: leafY,
                        x2: sp.p2x, y2: sp.bottomY,
                        color: '#f97316',
                        classes: `${l2Id} dev-${sp.id} ${sp.id}`
                    });
                }
            });
        }

        // Server 层
        const serverSpacing = (podWidth - LAYOUT.podPadding * 2) / LAYOUT.visualServers;
        const actualServersInPod = Math.min(cm.serversPerPod, serverCount - p * cm.serversPerPod);
        for (let s = 0; s < LAYOUT.visualServers; s++) {
            const cx = podX + LAYOUT.podPadding / 2 + serverSpacing * (s + 0.5);
            const isLast = (s === LAYOUT.visualServers - 1);
            const idx = isLast ? String(actualServersInPod) : String(s + 1);

            if (s === LAYOUT.visualServers - 2) {
                podLayout.serverNodes.push({
                    type: 'ellipsis',
                    x: cx, y: serverY + 40,
                    count: actualServersInPod
                });
                continue;
            }

            const srvId = `srv_${p}_${idx}`;
            const gpuPrefix = parts[0];

            podLayout.serverNodes.push({
                type: 'server',
                idx,
                x: cx - LAYOUT.serverW / 2,
                y: serverY,
                width: LAYOUT.serverW,
                height: LAYOUT.serverH,
                id: srvId,
                label: `算力节点 ${idx} (${gpuPrefix})`,
                tooltip: `<div class="mb-1 font-semibold">Server ${idx}</div>配置: ${gpuPrefix}<br>网卡: ${computeNicLabel}`,
                railCount
            });

            // Server 到 Leaf 的连线
            const portGroupSpacing = LAYOUT.serverW / (railCount + 1);
            for (let rail = 0; rail < railCount; rail++) {
                const portX = cx - LAYOUT.serverW / 2 + portGroupSpacing * (rail + 1);
                const portY = serverY;
                const targetLeafGroupIdx = (railCount === 8) ? (rail + 1) : Math.floor(rail * (8 / railCount)) + 1;
                const isTargetVisible = visibleLeafGroupIds.has(targetLeafGroupIdx);
                const targetLeaf = leafNodes.find(ln => ln.id === targetLeafGroupIdx);

                if (isTargetVisible && targetLeaf) {
                    const linkClasses = `${srvId} dev-${targetLeaf.l1Id} dev-${targetLeaf.l2Id}`;

                    if (isSinglePlane) {
                        // 单平面：仅蓝色连线，从Server端口到Leaf中心
                        links.push({
                            x1: portX, y1: portY - 14,
                            x2: targetLeaf.p1x, y2: targetLeaf.y,
                            color: '#3b82f6',
                            classes: linkClasses
                        });
                    } else {
                        // 双平面：蓝色+橙色连线
                        links.push({
                            x1: portX - 7, y1: portY - 14,
                            x2: targetLeaf.p1x, y2: targetLeaf.y,
                            color: '#3b82f6',
                            classes: linkClasses
                        });
                        links.push({
                            x1: portX + 7, y1: portY - 14,
                            x2: targetLeaf.p2x, y2: targetLeaf.y,
                            color: '#f97316',
                            classes: linkClasses
                        });
                    }
                }
            }
        }

        pods.push(podLayout);
    }

    return {
        dimensions: { width: canvasWidth, height: 1200 },
        bgElements,
        spineNodes,
        pods,
        links,
        visibleLeafGroupIds,
        architecture
    };
}

/* ===== js/svg-renderer.js ===== */

/**
 * svg-renderer.js - SVG 分层渲染引擎
 * 使用 DocumentFragment 批量插入，维护 bg/link/node 三层
 * 支持：虚拟双平面、物理双平面、单平面三种架构渲染
 */

const SVG_NS = 'http://www.w3.org/2000/svg';

/**
 * 创建 SVG 元素
 * @param {string} tag
 * @param {Object} attrs
 * @returns {SVGElement}
 */
function createSVG(tag, attrs = {}) {
    const el = document.createElementNS(SVG_NS, tag);
    for (const [k, v] of Object.entries(attrs)) {
        if (v !== undefined && v !== null) {
            el.setAttribute(k, String(v));
        }
    }
    return el;
}

/**
 * 批量设置属性
 * @param {SVGElement} el
 * @param {Object} attrs
 */
function setAttrs(el, attrs) {
    for (const [k, v] of Object.entries(attrs)) {
        if (v !== undefined && v !== null) {
            el.setAttribute(k, String(v));
        }
    }
}

/**
 * 创建文本元素
 * @param {number} x
 * @param {number} y
 * @param {string} text
 * @param {Object} attrs
 * @returns {SVGTextElement}
 */
function createText(x, y, text, attrs = {}) {
    const t = createSVG('text', { x, y, ...attrs });
    t.textContent = text;
    return t;
}

/**
 * 渲染背景层
 * @param {SVGElement} layer
 * @param {import('./layout-engine.js').TopologyLayout} layout
 */
function renderBgLayer(layer, layout) {
    const frag = document.createDocumentFragment();
    for (const item of layout.bgElements) {
        if (item.type === 'rect') {
            frag.appendChild(createSVG('rect', {
                x: item.x, y: item.y,
                width: item.width, height: item.height,
                fill: item.fill, stroke: item.stroke,
                'stroke-width': item.strokeWidth,
                'stroke-dasharray': item.strokeDasharray,
                rx: item.rx
            }));
        } else if (item.type === 'text') {
            frag.appendChild(createText(item.x, item.y, item.text, {
                'font-family': item.fontFamily,
                'font-size': item.fontSize,
                fill: item.fill,
                'font-weight': item.fontWeight
            }));
        } else if (item.type === 'line') {
            frag.appendChild(createSVG('line', {
                x1: item.x1, y1: item.y1,
                x2: item.x2, y2: item.y2,
                stroke: item.stroke,
                'stroke-width': item.strokeWidth,
                'stroke-dasharray': item.strokeDasharray
            }));
        }
    }

    // POD 背景
    for (const pod of layout.pods) {
        const r = pod.bgRect;
        const isGap = pod.podIndex === -1;
        frag.appendChild(createSVG('rect', {
            x: r.x, y: r.y, width: r.width, height: r.height,
            fill: r.fill, stroke: r.stroke, 'stroke-width': r.strokeWidth, rx: r.rx,
            'stroke-dasharray': r.strokeDasharray || (isGap ? '6,4' : undefined)
        }));
        frag.appendChild(createText(pod.podLabel.x, pod.podLabel.y, pod.podLabel.text, {
            'font-family': pod.podLabel.fontFamily,
            'font-size': pod.podLabel.fontSize,
            fill: pod.podLabel.fill,
            'font-weight': pod.podLabel.fontWeight,
            'text-anchor': pod.podLabel.textAnchor || 'start'
        }));
        frag.appendChild(createText(pod.podSubLabel.x, pod.podSubLabel.y, pod.podSubLabel.text, {
            'font-family': pod.podSubLabel.fontFamily,
            'font-size': pod.podSubLabel.fontSize,
            fill: pod.podSubLabel.fill,
            'text-anchor': pod.podSubLabel.textAnchor || 'start'
        }));
    }

    layer.innerHTML = '';
    layer.appendChild(frag);
}

/**
 * 渲染连线层
 * @param {SVGElement} layer
 * @param {import('./layout-engine.js').TopologyLayout} layout
 * @param {Object} linkStyle - { opacity: number, strokeWidth: number }
 */
function renderLinkLayer(layer, layout, linkStyle = {}) {
    const opacity = linkStyle.opacity ?? 0.15;
    const strokeWidth = linkStyle.strokeWidth ?? 1.5;
    const frag = document.createDocumentFragment();
    for (const link of layout.links) {
        const offset = Math.abs(link.y2 - link.y1) * 0.4;
        const d = `M ${link.x1} ${link.y1} C ${link.x1} ${link.y1 - offset}, ${link.x2} ${link.y2 + offset}, ${link.x2} ${link.y2}`;
        frag.appendChild(createSVG('path', {
            d, stroke: link.color, 'stroke-width': String(strokeWidth), fill: 'none',
            class: `link-line ${link.classes}`,
            style: `opacity:${opacity}`
        }));
    }
    layer.innerHTML = '';
    layer.appendChild(frag);
}

/**
 * 创建 Spine 层省略占位符
 * @param {SpineNode} node
 * @returns {DocumentFragment}
 */
function renderSpineGap(node) {
    const frag = document.createDocumentFragment();
    frag.appendChild(createSVG('rect', {
        x: node.x, y: node.y, width: node.width, height: node.height,
        rx: 8, fill: 'rgba(15,23,42,0.4)', stroke: '#334155',
        'stroke-width': 1, 'stroke-dasharray': '4,3'
    }));
    frag.appendChild(createText(node.x + node.width / 2, node.y + 20, `← ${node.totalCount} →`, {
        'font-size': 15, fill: '#fbbf24', 'font-weight': 'bold', 'text-anchor': 'middle'
    }));
    frag.appendChild(createText(node.x + node.width / 2, node.y + 36, 'Spine省略', {
        'font-size': 11, fill: '#94a3b8', 'text-anchor': 'middle'
    }));
    return frag;
}

/**
 * 创建虚拟双平面 Spine（VRF1/VRF2分区 + VRF逃生虚线）
 * @param {SpineNode} node
 * @returns {DocumentFragment}
 */
function renderVirtualSpine(node) {
    const frag = document.createDocumentFragment();
    const g = createSVG('g', {
        id: `dev-${node.id}`,
        class: `device-group dev-${node.id}`,
        'data-id': node.id,
        'data-tooltip': node.tooltip
    });

    const pad = 4;
    const gapW = 10;
    const vrfW = (node.width - pad * 2 - gapW) / 2;
    const topLabelH = 13;
    const portH = 10;
    const vrfX1 = node.x + pad;
    const vrfX2 = node.x + pad + vrfW + gapW;
    const vrfY = node.y + pad + topLabelH;
    const vrfH = node.height - pad * 2 - topLabelH - portH;
    const escapeCX = node.x + pad + vrfW + gapW / 2;

    // 物理机箱外框
    g.appendChild(createSVG('rect', {
        x: node.x, y: node.y, width: node.width, height: node.height,
        rx: 8, fill: '#0f172a', stroke: '#94a3b8', 'stroke-width': 2.5,
        filter: 'url(#shadow)'
    }));
    // 顶部金属高光
    g.appendChild(createSVG('line', {
        x1: node.x + 3, y1: node.y + 2,
        x2: node.x + node.width - 3, y2: node.y + 2,
        stroke: 'rgba(255,255,255,0.15)', 'stroke-width': 1
    }));
    // PHYSICAL 标签
    g.appendChild(createText(node.x + 6, node.y + 12, node.label || 'PHYSICAL', {
        'font-size': 7, fill: '#94a3b8', 'font-weight': 700, 'letter-spacing': 0.5
    }));

    // VRF1
    g.appendChild(createSVG('rect', {
        x: vrfX1, y: vrfY, width: vrfW, height: vrfH,
        rx: 4, fill: 'url(#grad-blue)', stroke: '#3b82f6',
        'stroke-width': 1, opacity: 0.95
    }));
    g.appendChild(createText(vrfX1 + vrfW / 2, vrfY + vrfH / 2 - 5, 'P1', {
        'font-size': 11, fill: '#fff', 'font-weight': 700, 'text-anchor': 'middle'
    }));
    g.appendChild(createText(vrfX1 + vrfW / 2, vrfY + vrfH / 2 + 10, 'VRF1', {
        'font-size': 7, fill: '#93c5fd', 'text-anchor': 'middle'
    }));

    // VRF2
    g.appendChild(createSVG('rect', {
        x: vrfX2, y: vrfY, width: vrfW, height: vrfH,
        rx: 4, fill: 'url(#grad-orange)', stroke: '#f97316',
        'stroke-width': 1, opacity: 0.95
    }));
    g.appendChild(createText(vrfX2 + vrfW / 2, vrfY + vrfH / 2 - 5, 'P2', {
        'font-size': 11, fill: '#fff', 'font-weight': 700, 'text-anchor': 'middle'
    }));
    g.appendChild(createText(vrfX2 + vrfW / 2, vrfY + vrfH / 2 + 10, 'VRF2', {
        'font-size': 7, fill: '#fdba74', 'text-anchor': 'middle'
    }));

    // VRF 逃生虚线
    g.appendChild(createSVG('line', {
        x1: escapeCX, y1: vrfY + 4, x2: escapeCX, y2: vrfY + vrfH - 4,
        stroke: '#fbbf24', 'stroke-width': 1, 'stroke-dasharray': '3,3', opacity: 0.5
    }));
    // → 箭头
    g.appendChild(createSVG('line', {
        x1: escapeCX - 3, y1: vrfY + vrfH / 2 - 10,
        x2: escapeCX + 3, y2: vrfY + vrfH / 2 - 10,
        stroke: '#fbbf24', 'stroke-width': 1.5
    }));
    g.appendChild(createSVG('polygon', {
        points: `${escapeCX + 3},${vrfY + vrfH / 2 - 12} ${escapeCX + 7},${vrfY + vrfH / 2 - 10} ${escapeCX + 3},${vrfY + vrfH / 2 - 8}`,
        fill: '#fbbf24'
    }));
    // ← 箭头
    g.appendChild(createSVG('line', {
        x1: escapeCX - 3, y1: vrfY + vrfH / 2 + 2,
        x2: escapeCX + 3, y2: vrfY + vrfH / 2 + 2,
        stroke: '#fbbf24', 'stroke-width': 1.5
    }));
    g.appendChild(createSVG('polygon', {
        points: `${escapeCX - 3},${vrfY + vrfH / 2} ${escapeCX - 7},${vrfY + vrfH / 2 + 2} ${escapeCX - 3},${vrfY + vrfH / 2 + 4}`,
        fill: '#fbbf24'
    }));
    // 逃生标签
    g.appendChild(createSVG('rect', {
        x: escapeCX - 15, y: vrfY + vrfH / 2 + 8,
        width: 30, height: 13, rx: 3,
        fill: 'rgba(251,191,36,0.12)', stroke: '#fbbf24', 'stroke-width': 0.5
    }));
    g.appendChild(createText(escapeCX, vrfY + vrfH / 2 + 18, 'VRF逃生', {
        'font-size': 6, fill: '#fbbf24', 'text-anchor': 'middle', 'font-weight': 700
    }));

    // 端口指示灯
    const portCount = 10;
    const portSpacing = (node.width - 20) / portCount;
    for (let i = 0; i < portCount; i++) {
        const px = node.x + 10 + i * portSpacing + portSpacing / 2 - 2;
        g.appendChild(createSVG('rect', {
            x: px, y: node.y + node.height - 8,
            width: 4, height: 4, fill: '#64748b',
            class: 'led-blink', rx: 0.5
        }));
    }

    frag.appendChild(g);
    return frag;
}

/**
 * 创建物理双平面 Spine（P1/P2独立物理交换机，无VRF分区）
 * @param {SpineNode} node
 * @returns {DocumentFragment}
 */
function renderPhysicalSpine(node) {
    const frag = document.createDocumentFragment();
    const g = createSVG('g', {
        id: `dev-${node.id}`,
        class: `device-group dev-${node.id}`,
        'data-id': node.id,
        'data-tooltip': node.tooltip
    });

    const w = node.width;
    const h = node.height;

    // P1 (蓝色) - 上半部分
    g.appendChild(createSVG('rect', {
        x: node.x, y: node.y, width: w, height: h / 2 - 2,
        rx: 6, fill: 'url(#grad-blue)', stroke: '#3b82f6',
        'stroke-width': 1.5, filter: 'url(#shadow)'
    }));
    g.appendChild(createText(node.x + w / 2, node.y + h / 4 - 2, `P1`, {
        'font-size': 10, fill: '#fff', 'font-weight': 700, 'text-anchor': 'middle'
    }));
    g.appendChild(createText(node.x + w / 2, node.y + h / 4 + 10, node.label || '', {
        'font-size': 6, fill: '#93c5fd', 'text-anchor': 'middle'
    }));

    // P2 (橙色) - 下半部分
    g.appendChild(createSVG('rect', {
        x: node.x, y: node.y + h / 2 + 2, width: w, height: h / 2 - 2,
        rx: 6, fill: 'url(#grad-orange)', stroke: '#f97316',
        'stroke-width': 1.5, filter: 'url(#shadow)'
    }));
    g.appendChild(createText(node.x + w / 2, node.y + h * 3 / 4 - 2, `P2`, {
        'font-size': 10, fill: '#fff', 'font-weight': 700, 'text-anchor': 'middle'
    }));
    g.appendChild(createText(node.x + w / 2, node.y + h * 3 / 4 + 10, node.label || '', {
        'font-size': 6, fill: '#fdba74', 'text-anchor': 'middle'
    }));

    // 分隔线
    g.appendChild(createSVG('line', {
        x1: node.x + 4, y1: node.y + h / 2,
        x2: node.x + w - 4, y2: node.y + h / 2,
        stroke: '#475569', 'stroke-width': 1, 'stroke-dasharray': '2,2'
    }));

    frag.appendChild(g);
    return frag;
}

/**
 * 创建单平面 Spine（仅蓝色，无平面分区）
 * @param {SpineNode} node
 * @returns {DocumentFragment}
 */
function renderSingleSpine(node) {
    const frag = document.createDocumentFragment();
    const g = createSVG('g', {
        id: `dev-${node.id}`,
        class: `device-group dev-${node.id}`,
        'data-id': node.id,
        'data-tooltip': node.tooltip
    });

    // 整体蓝色盒子
    g.appendChild(createSVG('rect', {
        x: node.x, y: node.y, width: node.width, height: node.height,
        rx: 8, fill: '#0f172a', stroke: '#3b82f6', 'stroke-width': 2.5,
        filter: 'url(#shadow)'
    }));
    // 顶部高光
    g.appendChild(createSVG('line', {
        x1: node.x + 3, y1: node.y + 2,
        x2: node.x + node.width - 3, y2: node.y + 2,
        stroke: 'rgba(255,255,255,0.15)', 'stroke-width': 1
    }));
    // 内部蓝色填充
    const pad = 6;
    g.appendChild(createSVG('rect', {
        x: node.x + pad, y: node.y + 14,
        width: node.width - pad * 2, height: node.height - 24,
        rx: 4, fill: 'url(#grad-blue)', stroke: '#3b82f6',
        'stroke-width': 1, opacity: 0.95
    }));
    // 标签
    g.appendChild(createText(node.x + 6, node.y + 12, node.label || 'SPINE', {
        'font-size': 7, fill: '#94a3b8', 'font-weight': 700, 'letter-spacing': 0.5
    }));
    g.appendChild(createText(node.x + node.width / 2, node.y + node.height / 2 - 2, '单平面', {
        'font-size': 10, fill: '#fff', 'font-weight': 700, 'text-anchor': 'middle'
    }));

    // 端口指示灯
    const portCount = 10;
    const portSpacing = (node.width - 20) / portCount;
    for (let i = 0; i < portCount; i++) {
        const px = node.x + 10 + i * portSpacing + portSpacing / 2 - 2;
        g.appendChild(createSVG('rect', {
            x: px, y: node.y + node.height - 8,
            width: 4, height: 4, fill: '#60a5fa',
            class: 'led-blink', rx: 0.5
        }));
    }

    frag.appendChild(g);
    return frag;
}

/**
 * 创建 Leaf 交换机
 * @param {import('./layout-engine.js').LeafNode} node
 * @param {'blue'|'orange'} planeType
 * @param {string} architecture
 * @returns {DocumentFragment}
 */
function renderLeafSwitch(node, planeType, architecture = 'virtual-dual-plane') {
    const frag = document.createDocumentFragment();
    const isSinglePlane = architecture === 'single-plane';
    const id = planeType === 'blue' ? node.l1Id : node.l2Id;
    const label = planeType === 'blue' ? node.l1Label : node.l2Label;
    const tooltip = planeType === 'blue' ? node.tooltipL1 : node.tooltipL2;
    const x = planeType === 'blue' ? node.x - 80 : node.x + 10;
    const width = 70;
    const height = 50;

    // 单平面模式下跳过橙色Leaf渲染
    if (isSinglePlane && planeType === 'orange') {
        return frag;
    }

    // 单平面模式下调整蓝色Leaf位置居中
    const leafX = isSinglePlane ? node.x - width / 2 : x;

    const g = createSVG('g', {
        id: `dev-${id}`,
        class: `device-group dev-${id}`,
        'data-id': id,
        'data-tooltip': tooltip
    });

    const fill = planeType === 'blue' ? 'url(#grad-blue)' : 'url(#grad-orange)';
    const stroke = planeType === 'blue' ? '#3b82f6' : '#f97316';

    g.appendChild(createSVG('rect', {
        x: leafX, y: node.y, width, height,
        rx: 6, fill, stroke, 'stroke-width': 1.5,
        filter: 'url(#shadow)'
    }));
    g.appendChild(createSVG('line', {
        x1: leafX + 2, y1: node.y + 2, x2: leafX + width - 2, y2: node.y + 2,
        stroke: 'rgba(255,255,255,0.2)', 'stroke-width': 1
    }));
    g.appendChild(createSVG('line', {
        x1: leafX + 4, y1: node.y + height / 2, x2: leafX + width - 4, y2: node.y + height / 2,
        stroke: 'rgba(0,0,0,0.3)', 'stroke-width': 1
    }));
    g.appendChild(createText(leafX + width / 2, node.y + height / 2 - 2, label, {
        'font-family': "'Inter','Microsoft YaHei',sans-serif",
        'font-size': 11, fill: '#ffffff', 'font-weight': 600,
        'text-anchor': 'middle', 'alignment-baseline': 'middle',
        'pointer-events': 'none'
    }));

    // 端口装饰
    const portCount = 8;
    const portSpacing = (width - 20) / portCount;
    const portFill = planeType === 'blue' ? '#60a5fa' : '#fdba74';
    for (let i = 0; i < portCount; i++) {
        const px = leafX + 10 + i * portSpacing + portSpacing / 2 - 2;
        g.appendChild(createSVG('rect', {
            x: px, y: node.y + height - 8,
            width: 4, height: 4, fill: portFill, class: 'led-blink'
        }));
    }

    frag.appendChild(g);
    return frag;
}

/**
 * 创建服务器
 * @param {import('./layout-engine.js').ServerNode} node
 * @param {string} architecture
 * @returns {DocumentFragment}
 */
function renderServer(node, architecture = 'virtual-dual-plane') {
    const isSinglePlane = architecture === 'single-plane';
    const frag = document.createDocumentFragment();
    const g = createSVG('g', {
        id: `dev-${node.id}`,
        class: `device-group dev-${node.id}`,
        'data-id': node.id,
        'data-tooltip': node.tooltip
    });

    g.appendChild(createSVG('rect', {
        x: node.x, y: node.y,
        width: node.width, height: node.height,
        rx: 8, fill: 'url(#grad-server)', stroke: '#38bdf8',
        'stroke-width': 1, filter: 'url(#shadow)'
    }));
    g.appendChild(createSVG('rect', {
        x: node.x + 10, y: node.y + 6,
        width: node.width - 20, height: 8,
        fill: 'url(#stripes)', rx: 1
    }));
    g.appendChild(createText(node.x + node.width / 2, node.y + node.height - 12, node.label, {
        'font-family': "'Inter','Microsoft YaHei',sans-serif",
        'font-size': 12, fill: '#e2e8f0', 'font-weight': 'bold',
        'text-anchor': 'middle', 'pointer-events': 'none'
    }));

    // GPU 槽位
    const slotWidth = (node.width - 40) / node.railCount;
    for (let i = 0; i < node.railCount; i++) {
        const slotX = node.x + 20 + i * slotWidth + 2;
        g.appendChild(createSVG('rect', {
            x: slotX, y: node.y + 25,
            width: slotWidth - 4, height: 25,
            fill: '#020617', stroke: '#334155', 'stroke-width': 1, rx: 2
        }));
        g.appendChild(createSVG('rect', {
            x: slotX + 4, y: node.y + 28,
            width: slotWidth - 12, height: 3,
            fill: '#06b6d4', opacity: 0.8
        }));
        g.appendChild(createText(slotX + slotWidth / 2, node.y + 40, `G${i + 1}`, {
            'font-size': 8, fill: '#64748b', 'text-anchor': 'middle'
        }));
    }

    frag.appendChild(g);
    return frag;
}

/**
 * 创建 LACP 标记
 * @param {number} cx
 * @param {number} cy
 * @returns {SVGElement}
 */
function createLACPBadge(cx, cy) {
    const g = createSVG('g', { class: 'pointer-events-none' });
    g.appendChild(createSVG('rect', {
        x: cx - 16, y: cy - 7, width: 32, height: 14,
        rx: 7, fill: '#1e293b', stroke: '#94a3b8', 'stroke-width': 1
    }));
    g.appendChild(createText(cx, cy + 3, 'LACP', {
        'font-size': 8, fill: '#cbd5e1', 'font-weight': 'bold', 'text-anchor': 'middle'
    }));
    return g;
}

/**
 * 渲染节点层
 * @param {SVGElement} layer
 * @param {import('./layout-engine.js').TopologyLayout} layout
 * @param {number} serverCount
 * @param {number} railCount
 * @param {Object} options
 */
function renderNodeLayer(layer, layout, serverCount, railCount, options = {}) {
    const architecture = layout.architecture || options.architecture || 'virtual-dual-plane';
    const isSinglePlane = architecture === 'single-plane';
    const frag = document.createDocumentFragment();

    // Spine 节点
    for (const sp of layout.spineNodes) {
        if (sp.type === 'gap') {
            frag.appendChild(renderSpineGap(sp));
        } else if (sp.type === 'virtualSpine') {
            frag.appendChild(renderVirtualSpine(sp));
        } else if (sp.type === 'physicalSpine') {
            frag.appendChild(renderPhysicalSpine(sp));
        } else if (sp.type === 'singleSpine') {
            frag.appendChild(renderSingleSpine(sp));
        }
    }

    // POD 节点
    for (const pod of layout.pods) {
        // Leaf
        for (const leaf of pod.leafNodes) {
            if (leaf.type === 'gap') {
                frag.appendChild(createSVG('rect', {
                    x: leaf.x, y: leaf.y, width: leaf.width, height: leaf.height,
                    rx: 8, fill: 'rgba(15,23,42,0.4)', stroke: '#334155',
                    'stroke-width': 1, 'stroke-dasharray': '4,3'
                }));
                frag.appendChild(createText(leaf.x + leaf.width / 2, leaf.y + 25, `← ${leaf.totalCount} →`, {
                    'font-size': 15, fill: '#fbbf24', 'font-weight': 'bold', 'text-anchor': 'middle'
                }));
            } else {
                frag.appendChild(renderLeafSwitch(leaf, 'blue', architecture));
                frag.appendChild(renderLeafSwitch(leaf, 'orange', architecture));
            }
        }

        // Server
        for (const srv of pod.serverNodes) {
            if (srv.type === 'ellipsis') {
                frag.appendChild(createText(srv.x, srv.y, `← ${srv.count} →`, {
                    'font-size': 15, fill: '#fbbf24', 'font-weight': 'bold', 'text-anchor': 'middle'
                }));
            } else if (srv.type === 'server') {
                frag.appendChild(renderServer(srv, architecture));

                // 网卡端口装饰
                const portGroupSpacing = srv.width / (railCount + 1);
                for (let rail = 0; rail < railCount; rail++) {
                    const portX = srv.x + portGroupSpacing * (rail + 1);
                    const portY = srv.y;
                    const targetLeafGroupIdx = (railCount === 8) ? (rail + 1) : Math.floor(rail * (8 / railCount)) + 1;
                    const isTargetVisible = layout.visibleLeafGroupIds.has(targetLeafGroupIdx);

                    if (isTargetVisible) {
                        if (isSinglePlane) {
                            // 单平面：仅蓝色端口
                            frag.appendChild(createSVG('rect', {
                                x: portX - 6, y: portY - 14, width: 12, height: 14,
                                fill: '#1e3a8a', rx: 1
                            }));
                            frag.appendChild(createText(portX, portY - 4, '1', {
                                'font-size': 8, fill: '#fff', 'text-anchor': 'middle'
                            }));
                        } else {
                            // 双平面：蓝色+橙色端口
                            frag.appendChild(createSVG('rect', {
                                x: portX - 12, y: portY - 14, width: 10, height: 14,
                                fill: '#1e3a8a', rx: 1
                            }));
                            frag.appendChild(createSVG('rect', {
                                x: portX + 2, y: portY - 14, width: 10, height: 14,
                                fill: '#c2410c', rx: 1
                            }));
                            frag.appendChild(createText(portX - 7, portY - 4, '1', {
                                'font-size': 8, fill: '#fff', 'text-anchor': 'middle'
                            }));
                            frag.appendChild(createText(portX + 7, portY - 4, '2', {
                                'font-size': 8, fill: '#fff', 'text-anchor': 'middle'
                            }));
                        }

                        if (rail === 0 || rail === railCount - 1) {
                            frag.appendChild(createLACPBadge(portX, portY - 40));
                        }
                    } else {
                        frag.appendChild(createSVG('rect', {
                            x: portX - 8, y: portY - 12, width: 16, height: 12,
                            fill: '#0f172a', stroke: '#334155', 'stroke-width': 0.5,
                            rx: 1, opacity: 0.6
                        }));
                        frag.appendChild(createText(portX, portY - 5, '·', {
                            'font-size': 7, fill: '#475569', 'text-anchor': 'middle'
                        }));
                    }
                }
            }
        }
    }

    layer.innerHTML = '';
    layer.appendChild(frag);
}

/**
 * 渲染完整拓扑
 * @param {import('./layout-engine.js').TopologyLayout} layout
 * @param {number} serverCount
 * @param {number} railCount
 * @param {Object} options
 */
function renderTopology(layout, serverCount, railCount, options = {}) {
    const bgLayer = document.getElementById('bgLayer');
    const linkLayer = document.getElementById('linkLayer');
    const nodeLayer = document.getElementById('nodeLayer');

    if (!bgLayer || !linkLayer || !nodeLayer) {
        console.error('SVG layers not found');
        return;
    }

    renderBgLayer(bgLayer, layout);
    renderLinkLayer(linkLayer, layout, options.linkStyle);
    renderNodeLayer(nodeLayer, layout, serverCount, railCount, options);
}

/**
 * 高亮指定设备的链路
 * @param {string} deviceId
 */
function highlightDevice(deviceId) {
    const svgGroup = document.getElementById('nodeLayer')?.parentElement;
    if (!svgGroup) return;
    svgGroup.classList.add('svg-dimmed');

    const links = document.querySelectorAll(`.link-line.${deviceId}`);
    links.forEach(link => {
        link.classList.add('highlight');
        const classes = Array.from(link.classList);
        classes.forEach(cls => {
            if (cls.startsWith('dev-')) {
                const target = document.getElementById(cls);
                if (target) target.classList.add('highlight-device');
            }
        });
    });

    const self = document.getElementById(`dev-${deviceId}`);
    if (self) self.classList.add('highlight-device');
}

/**
 * 重置所有高亮
 */
function resetHighlights() {
    const svgGroup = document.getElementById('nodeLayer')?.parentElement;
    if (svgGroup) svgGroup.classList.remove('svg-dimmed');

    document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
    document.querySelectorAll('.highlight-device').forEach(el => el.classList.remove('highlight-device'));
}

/**
 * 获取 SVG 序列化字符串（用于导出）
 * @returns {string}
 */
function serializeSVG() {
    const svg = document.getElementById('topologySvg');
    if (!svg) return '';
    return new XMLSerializer().serializeToString(svg);
}

/* ===== js/interaction.js ===== */

/**
 * interaction.js - 交互管理
 * 缩放、拖拽、高亮、Tooltip、事件委托
 */

const svgElement = () => document.getElementById('topologySvg');
const svgContainer = () => document.getElementById('svgContainer');
const tooltipEl = () => document.getElementById('tooltip');
const nodeLayer = () => document.getElementById('nodeLayer');

/** @type {number|null} */
let wheelRafId = null;

/**
 * 更新 viewBox
 */
function updateViewBox() {
    const vb = appState.viewBox;
    const svg = svgElement();
    if (svg) {
        svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
    }
}

/**
 * 适应屏幕
 */
function resetZoom() {
    const group = nodeLayer();
    if (!group) return;

    // 等待 DOM 渲染完成后获取 bbox
    requestAnimationFrame(() => {
        try {
            const bbox = group.getBBox();
            if (bbox.width === 0) return;
            const padding = 120;
            updateState({
                viewBox: {
                    x: bbox.x - padding,
                    y: bbox.y - padding,
                    w: bbox.width + padding * 2,
                    h: bbox.height + padding * 2
                }
            });
            updateViewBox();
        } catch (e) {
            console.warn('resetZoom getBBox failed:', e);
            updateState({ viewBox: { ...LAYOUT.viewBoxDefault } });
            updateViewBox();
        }
    });
}

/**
 * 缩放
 * @param {number} factor
 */
function scaleView(factor) {
    const vb = appState.viewBox;
    const centerX = vb.x + vb.w / 2;
    const centerY = vb.y + vb.h / 2;
    const newW = vb.w * factor;
    const newH = vb.h * factor;
    updateState({
        viewBox: {
            x: centerX - newW / 2,
            y: centerY - newH / 2,
            w: newW,
            h: newH
        }
    });
    updateViewBox();
}

function zoomIn() {
    scaleView(1 / appState.zoomFactor);
}

function zoomOut() {
    scaleView(appState.zoomFactor);
}

/**
 * 显示 Tooltip
 * @param {MouseEvent} evt
 * @param {string} html
 */
function showTooltip(evt, html) {
    const tt = tooltipEl();
    if (!tt) return;
    tt.innerHTML = html;
    tt.style.display = 'block';
    tt.style.left = (evt.pageX + 15) + 'px';
    tt.style.top = (evt.pageY + 15) + 'px';
    tt.style.opacity = '1';
}

/**
 * 隐藏 Tooltip
 */
function hideTooltip() {
    const tt = tooltipEl();
    if (!tt) return;
    tt.style.opacity = '0';
    setTimeout(() => {
        if (tt.style.opacity === '0') tt.style.display = 'none';
    }, 200);
}

/**
 * 滚轮缩放（带 requestAnimationFrame 节流）
 * @param {WheelEvent} e
 */
function onWheel(e) {
    e.preventDefault();
    if (wheelRafId !== null) return;

    wheelRafId = requestAnimationFrame(() => {
        wheelRafId = null;
        const container = svgContainer();
        if (!container) return;

        const mouseX = e.offsetX;
        const mouseY = e.offsetY;
        const rect = container.getBoundingClientRect();
        const vb = appState.viewBox;
        const viewX = vb.x + (mouseX / rect.width) * vb.w;
        const viewY = vb.y + (mouseY / rect.height) * vb.h;
        const factor = e.deltaY < 0 ? (1 / appState.zoomFactor) : appState.zoomFactor;
        const newW = vb.w * factor;
        const newH = vb.h * factor;

        updateState({
            viewBox: {
                x: viewX - (mouseX / rect.width) * newW,
                y: viewY - (mouseY / rect.height) * newH,
                w: newW,
                h: newH
            }
        });
        updateViewBox();
    });
}

/**
 * 鼠标按下
 * @param {MouseEvent} e
 */
function onMouseDown(e) {
    updateState({ isDragging: true, dragStart: { x: e.clientX, y: e.clientY } });
    const container = svgContainer();
    if (container) container.style.cursor = 'grabbing';
}

/**
 * 鼠标移动（全局）
 * @param {MouseEvent} e
 */
function onMouseMove(e) {
    if (!appState.isDragging) return;
    const dx = e.clientX - appState.dragStart.x;
    const dy = e.clientY - appState.dragStart.y;
    const container = svgContainer();
    if (!container) return;
    const rect = container.getBoundingClientRect();
    const vb = appState.viewBox;

    updateState({
        viewBox: {
            x: vb.x - dx * (vb.w / rect.width),
            y: vb.y - dy * (vb.h / rect.height),
            w: vb.w,
            h: vb.h
        },
        dragStart: { x: e.clientX, y: e.clientY }
    });
    updateViewBox();
}

/**
 * 鼠标松开
 */
function onMouseUp() {
    updateState({ isDragging: false });
    const container = svgContainer();
    if (container) container.style.cursor = 'grab';
}

/**
 * 事件委托：mouseover
 * @param {MouseEvent} e
 */
function onSvgMouseOver(e) {
    const devGroup = e.target.closest('.device-group');
    if (!devGroup) return;
    const text = devGroup.getAttribute('data-tooltip');
    const id = devGroup.getAttribute('data-id');
    if (text) showTooltip(e, text);
    if (id) highlightDevice(id);
}

/**
 * 事件委托：mouseout
 * @param {MouseEvent} e
 */
function onSvgMouseOut(e) {
    const devGroup = e.target.closest('.device-group');
    if (!devGroup) return;
    hideTooltip();
    resetHighlights();
}

/**
 * 事件委托：mousemove（Tooltip 跟随）
 * @param {MouseEvent} e
 */
function onSvgMouseMove(e) {
    const tt = tooltipEl();
    if (tt && tt.style.opacity === '1') {
        tt.style.left = (e.pageX + 15) + 'px';
        tt.style.top = (e.pageY + 15) + 'px';
    }
}

/**
 * 绑定所有交互事件
 */
function bindInteractions() {
    const container = svgContainer();
    const layer = nodeLayer();

    if (container) {
        container.addEventListener('wheel', onWheel, { passive: false });
        container.addEventListener('mousedown', onMouseDown);
    }

    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);

    if (layer) {
        layer.addEventListener('mouseover', onSvgMouseOver);
        layer.addEventListener('mouseout', onSvgMouseOut);
        layer.addEventListener('mousemove', onSvgMouseMove);
    }
}

/**
 * 解绑交互事件（清理用）
 */
function unbindInteractions() {
    const container = svgContainer();
    const layer = nodeLayer();

    if (container) {
        container.removeEventListener('wheel', onWheel);
        container.removeEventListener('mousedown', onMouseDown);
    }
    window.removeEventListener('mousemove', onMouseMove);
    window.removeEventListener('mouseup', onMouseUp);

    if (layer) {
        layer.removeEventListener('mouseover', onSvgMouseOver);
        layer.removeEventListener('mouseout', onSvgMouseOut);
        layer.removeEventListener('mousemove', onSvgMouseMove);
    }
}

            }
        }

    html += `<div>`;
    html += `<div class="stat-category flex justify-between">交换机 <span class="stat-total">共 ${totalSwitches} 台</span></div>`;

    html += `<div>`;
    html += `<div class="stat-category flex justify-between">线缆 <span class="stat-total">共 ${totalCables.toLocaleString()} 根</span></div>`;

        html += `<div class="font-tiny text-slate-500 pl-1">${cab.desc}</div>`;
    });
    html += `</div>`;

    return html;
}

/**
 * export.js - 导出功能
 * 支持 SVG 和 PNG 导出
 */

/**
 * 动态生成导出所需的关键 CSS 规则（使用当前连线样式设置）
 */
function getExportCSS() {
    const { opacity, strokeWidth } = appState.linkStyle;
    return `
        .link-line { opacity: ${opacity}; stroke-width: ${strokeWidth}; }
        .device-group { cursor: pointer; }
        .led-blink { animation: none; opacity: 1; }
        text { font-family: 'Inter','Microsoft YaHei',sans-serif; }
    `;
}

/**
 * 触发文件下载
 * @param {string} filename
 * @param {Blob|string} content
 */
function download(filename, content) {
    const a = document.createElement('a');
    if (content instanceof Blob) {
        a.href = URL.createObjectURL(content);
    } else {
        a.href = content;
    }
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
        document.body.removeChild(a);
        if (content instanceof Blob) URL.revokeObjectURL(a.href);
    }, 100);
}

/**
 * 获取带内联样式的 SVG 字符串
 * @returns {string}
 */
function getStyledSVGString() {
    const svg = document.getElementById('topologySvg');
    if (!svg) return '';

    // 克隆 SVG 以便修改
    const clone = svg.cloneNode(true);

    // 嵌入导出样式
    const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
    styleEl.textContent = getExportCSS();
    clone.insertBefore(styleEl, clone.firstChild);

    // 确保命名空间
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

    // 设置背景色
    clone.style.background = '#020617';

    return new XMLSerializer().serializeToString(clone);
}

/**
 * 导出 SVG
 */
function exportSVG() {
    const svgStr = getStyledSVGString();
    if (!svgStr) {
        alert('SVG 内容为空，无法导出');
        return;
    }
    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
    download(`拓扑图_${timestamp}.svg`, blob);
}

/**
 * 导出 PNG
 */
function exportPNG() {
    const svgStr = getStyledSVGString();
    if (!svgStr) {
        alert('SVG 内容为空，无法导出');
        return;
    }

    const svg = document.getElementById('topologySvg');
    const bbox = svg.getBBox ? svg.getBBox() : { width: 2800, height: 1600 };
    const width = Math.max(bbox.width, 2800);
    const height = Math.max(bbox.height, 1600);

    // 创建 canvas
    const canvas = document.createElement('canvas');
    const scale = 2; // 2x 高清导出
    canvas.width = width * scale;
    canvas.height = height * scale;
    const ctx = canvas.getContext('2d');
    if (!ctx) {
        alert('Canvas 初始化失败');
        return;
    }

    // 填充背景
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 绘制 SVG
    const img = new Image();
    const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);

        canvas.toBlob(blob => {
            if (!blob) {
                alert('PNG 生成失败');
                return;
            }
            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            download(`拓扑图_${timestamp}.png`, blob);
        }, 'image/png');
    };

    img.onerror = () => {
        URL.revokeObjectURL(url);
        alert('SVG 渲染失败，无法导出 PNG');
    };

    img.src = url;
}

/**
 * 绑定导出按钮事件
 */
function bindExportEvents() {
    const btnSvg = document.getElementById('btnExportSvg');
    const btnPng = document.getElementById('btnExportPng');

    if (btnSvg) btnSvg.addEventListener('click', exportSVG);
    if (btnPng) btnPng.addEventListener('click', exportPNG);
}
