<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智算中心参数面网络拓扑生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <style>
/* ==========================================
   CSS 变量体系
   ========================================== */
:root {
    --bg-body: #020617;
    --bg-sidebar: #0f172a;
    --bg-panel: rgba(15, 23, 42, 0.88);
    --bg-input: #0f172a;
    --border-color: #334155;
    --border-light: #475569;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-emerald: #10b981;
    --accent-amber: #fbbf24;
    --accent-orange: #f97316;
    --font-base: 'Inter', 'Microsoft YaHei', sans-serif;
    --font-mono: 'Consolas', 'Monaco', monospace;
    --sidebar-width: 280px;
    --sidebar-collapsed: 44px;
    --panel-width: 320px;
}

/* ==========================================
   基础与滚动条
   ========================================== */
*, *::before, *::after {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: var(--font-base);
    font-size: 12px;
    background: var(--bg-body);
    color: var(--text-primary);
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-sidebar); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ==========================================
   侧边栏
   ========================================== */
#sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-sidebar);
    border-right: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 10;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transition: width 0.3s ease, min-width 0.3s ease;
    overflow: hidden;
    flex-shrink: 0;
}

#sidebar.collapsed {
    width: var(--sidebar-collapsed);
    min-width: var(--sidebar-collapsed);
}

#sidebar .sidebar-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(37,99,235,0.1), transparent);
    pointer-events: none;
}

#sidebar.collapsed .sidebar-content,
#sidebar.collapsed .sidebar-header-text {
    opacity: 0;
    pointer-events: none;
}

.sidebar-content {
    transition: opacity 0.2s ease;
    white-space: nowrap;
}

.sidebar-header-text {
    transition: opacity 0.2s ease;
}

#sidebarToggle {
    position: absolute;
    right: -12px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    background: #1e293b;
    border: 1px solid var(--border-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    color: var(--text-secondary);
    transition: all 0.2s;
}

#sidebarToggle:hover {
    background: #334155;
    color: #e2e8f0;
    border-color: #64748b;
}

/* ==========================================
   主区域与背景网格
   ========================================== */
main {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-body);
}

.bg-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(#1e293b 1px, transparent 1px);
    background-size: 30px 30px;
    opacity: 0.3;
}

/* ==========================================
   工具栏
   ========================================== */
.toolbar {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 20;
    display: flex;
    gap: 8px;
}

.toolbar-group {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 4px;
    display: flex;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

.toolbar button {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.toolbar button:hover {
    background: #334155;
    color: #e2e8f0;
}

.toolbar-sep {
    width: 1px;
    background: var(--border-color);
    margin: 6px 4px;
}

/* ==========================================
   Tooltip
   ========================================== */
#tooltip {
    position: absolute;
    display: none;
    background: rgba(30, 41, 59, 0.95);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-light);
    color: #fff;
    font-size: 12px;
    border-radius: 8px;
    padding: 10px 14px;
    z-index: 30;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: 280px;
    transition: opacity 0.2s;
    line-height: 1.5;
}

/* ==========================================
   SVG 交互样式
   ========================================== */
svg { cursor: grab; }
svg:active { cursor: grabbing; }

.device-group {
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
}

.device-group:hover {
    filter: brightness(1.2);
}

.link-line {
    transition: opacity 0.3s ease, stroke-width 0.3s ease, filter 0.3s ease, stroke 0.3s ease;
    opacity: 0.15;
}

.link-line.highlight {
    opacity: 1 !important;
    stroke-width: 2.5px !important;
    filter: url(#glow);
    z-index: 10;
}

.svg-dimmed .link-line:not(.highlight) {
    opacity: 0.03 !important;
}

.svg-dimmed .device-group:not(.highlight-device) {
    opacity: 0.3;
    filter: grayscale(0.5);
    transition: opacity 0.3s, filter 0.3s;
}

/* LED 闪烁 */
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

.led-blink {
    animation: blink 2s infinite;
}

/* ==========================================
   字号体系
   ========================================== */
.font-title   { font-size: 16px; font-weight: 700; }
.font-section { font-size: 13px; font-weight: 600; }
.font-label   { font-size: 12px; font-weight: 500; }
.font-body    { font-size: 12px; }
.font-small   { font-size: 11px; }
.font-tiny    { font-size: 10px; }

/* ==========================================
   统计面板
   ========================================== */
.stat-tab {
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    background: #1e293b;
    color: var(--text-secondary);
}

.stat-tab.active {
    background: #2563eb;
    color: #fff;
}

.stat-tab:not(.active):hover {
    background: #334155;
    color: #e2e8f0;
}

.stat-category {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 0;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 2px;
}

.stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 2px 0;
    font-size: 11px;
}

.stat-model {
    color: #cbd5e1;
    font-family: var(--font-mono);
    font-size: 10px;
}

.stat-count {
    color: #38bdf8;
    font-weight: 700;
    font-size: 12px;
    min-width: 36px;
    text-align: right;
}

.stat-total {
    color: var(--accent-amber);
    font-weight: 700;
    font-size: 11px;
}

/* ==========================================
   浮动统计面板
   ========================================== */
#hwFloatPanel {
    position: absolute;
    top: 60px;
    right: 16px;
    width: var(--panel-width);
    max-height: calc(100vh - 100px);
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(71, 85, 105, 0.6);
    border-radius: 10px;
    z-index: 25;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 1px rgba(148,163,184,0.2);
    transition: width 0.3s ease, max-height 0.3s ease, opacity 0.2s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#hwFloatPanel.collapsed {
    width: 40px;
    max-height: 40px;
}

#hwFloatPanel .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid rgba(71, 85, 105, 0.4);
    flex-shrink: 0;
}

#hwFloatPanel.collapsed .panel-header {
    border-bottom: none;
    padding: 8px;
    justify-content: center;
}

#hwFloatPanel .panel-header .header-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-amber);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
}

#hwFloatPanel.collapsed .header-title span { display: none; }

#hwFloatPanel .panel-header .toggle-btn {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    color: var(--text-secondary);
    transition: all 0.2s;
    flex-shrink: 0;
}

#hwFloatPanel .panel-header .toggle-btn:hover {
    background: #334155;
    color: #e2e8f0;
}

#hwFloatPanel .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
}

#hwFloatPanel.collapsed .panel-body { display: none; }

/* ==========================================
   底部提示条
   ========================================== */
.hint-bar {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    pointer-events: none;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(71, 85, 105, 0.6);
    border-radius: 999px;
    padding: 6px 20px;
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.hint-bar .hint-sep {
    color: var(--border-color);
}

/* ==========================================
   表单控件
   ========================================== */
input[type="number"],
select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 8px 10px;
    color: #fff;
    font-size: 12px;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
}

input[type="number"]:focus,
select:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
}

/* ==========================================
   按钮
   ========================================== */
.btn-primary {
    width: 100%;
    background: linear-gradient(to right, #2563eb, #4f46e5);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 15px rgba(37,99,235,0.4);
}

.btn-primary:hover {
    background: linear-gradient(to right, #3b82f6, #6366f1);
    box-shadow: 0 0 25px rgba(37,99,235,0.6);
}

/* ==========================================
   工具类
   ========================================== */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.flex-1 { flex: 1; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 4px; }
.gap-2 { gap: 8px; }
.shrink-0 { flex-shrink: 0; }
.relative { position: relative; }
.overflow-hidden { overflow: hidden; }
.overflow-y-auto { overflow-y: auto; }
.hidden { display: none !important; }
.p-2 { padding: 8px; }
.p-4 { padding: 16px; }
.py-2 { padding-top: 8px; padding-bottom: 8px; }
.px-3 { padding-left: 12px; padding-right: 12px; }
.mb-1 { margin-bottom: 4px; }
.mb-2 { margin-bottom: 8px; }
.mt-1 { margin-top: 4px; }
.space-y-1 > * + * { margin-top: 4px; }
.space-y-4 > * + * { margin-top: 16px; }
.text-white { color: #fff; }
.text-slate-200 { color: #e2e8f0; }
.text-slate-300 { color: #cbd5e1; }
.text-slate-400 { color: #94a3b8; }
.text-slate-500 { color: #64748b; }
.text-emerald-400 { color: #34d399; }
.text-cyan-400 { color: #22d3ee; }
.text-amber-400 { color: #fbbf24; }
.bg-slate-800 { background: #1e293b; }
.rounded { border-radius: 6px; }
.rounded-md { border-radius: 6px; }
.rounded-lg { border-radius: 8px; }
.border { border: 1px solid #334155; }
.border-b { border-bottom: 1px solid #1e293b; }

    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen w-screen overflow-hidden flex">

    <!-- 侧边栏 -->
    <aside id="sidebar" class="bg-slate-900 border-r border-slate-800 flex flex-col z-10 shadow-2xl shrink-0 relative">
        <div class="sidebar-gradient"></div>

        <!-- 折叠切换按钮 -->
        <div id="sidebarToggle" role="button" aria-label="切换侧边栏">
            <svg id="toggleIcon" xmlns="http://www.w3.org/2000/svg" class="shrink-0" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
            </svg>
        </div>

        <div class="p-4 border-b border-slate-800 relative z-10 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="shrink-0 text-blue-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                <line x1="6" y1="6" x2="6.01" y2="6"></line>
                <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>
            <span class="sidebar-header-text font-title text-white">智算拓扑生成器</span>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-4 relative z-10 sidebar-content">
            <div>
                <label class="block font-label text-slate-300 mb-1">算力服务器数量</label>
                <select id="serverCount" class="w-full bg-slate-950 border border-slate-700 rounded-md p-2 text-white font-body focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                    <option value="64">64 台</option>
                    <option value="128" selected>128 台</option>
                    <option value="256">256 台</option>
                    <option value="512">512 台</option>
                    <option value="1024">1024 台</option>
                </select>
                <p class="font-tiny text-slate-500 mt-1">为保证渲染性能，将展示典型结构代表</p>
            </div>

            <div>
                <label class="block font-label text-slate-300 mb-1">GPU规格 / 网卡配置</label>
                <select id="gpuType" class="w-full bg-slate-950 border border-slate-700 rounded-md p-2 text-white font-body focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                    <option value="A800_4">NVIDIA A800 (4-Rail)</option>
                    <option value="H800_8">NVIDIA H800 (8-Rail)</option>
                    <option value="B300_8" selected>NVIDIA B300 (8-Rail, 8x 800G)</option>
                </select>
            </div>

            <div>
                <label class="block font-label text-slate-300 mb-1">组网架构</label>
                <select id="architecture" class="w-full bg-slate-950 border border-slate-700 rounded-md p-2 text-white font-body focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                    <option value="ruijie-dual" selected>锐捷虚拟双平面 (去堆叠Bond/VRF逃生)</option>
                </select>
            </div>

            <button id="btnGenerate" class="btn-primary">重新生成拓扑</button>

            <!-- 硬件测算结果 -->
            <div>
                <h3 class="font-section text-slate-200 mb-2 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" class="text-emerald-400 shrink-0" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                    硬件测算结果
                </h3>
                <div id="summaryPanel" class="font-small text-slate-400 space-y-1 leading-relaxed">
                    正在初始化...
                </div>
            </div>
        </div>
    </aside>

    <!-- 主区域 -->
    <main class="flex-1 relative overflow-hidden">
        <div class="bg-grid"></div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="toolbar-group">
                <button id="btnResetZoom" title="适应屏幕">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                </button>
                <div class="toolbar-sep"></div>
                <button id="btnZoomIn" title="放大">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                </button>
                <button id="btnZoomOut" title="缩小">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7" /></svg>
                </button>
            </div>
            <div class="toolbar-group">
                <button id="btnExportSvg" title="导出 SVG">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                </button>
                <button id="btnExportPng" title="导出 PNG">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                </button>
                <div class="toolbar-sep"></div>
                <button id="btnResetSettings" title="重置默认配置">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>
        </div>

        <!-- Tooltip -->
        <div id="tooltip"></div>

        <!-- SVG 容器 -->
        <div id="svgContainer" class="w-full h-full relative cursor-grab">
            <svg id="topologySvg" class="w-full h-full" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <!-- 阴影效果 -->
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
                    </filter>

                    <!-- 发光效果 (用于高亮连线) -->
                    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>

                    <!-- Plane 1 (Blue) 设备渐变 -->
                    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#2563eb"/>
                        <stop offset="100%" stop-color="#1e3a8a"/>
                    </linearGradient>

                    <!-- Plane 2 (Orange) 设备渐变 -->
                    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ea580c"/>
                        <stop offset="100%" stop-color="#7c2d12"/>
                    </linearGradient>

                    <!-- Server (Dark Steel) 设备渐变 -->
                    <linearGradient id="grad-server" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#1e293b"/>
                        <stop offset="100%" stop-color="#0f172a"/>
                    </linearGradient>

                    <!-- LACP 聚合标记图案 -->
                    <pattern id="stripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                        <rect width="4" height="8" fill="rgba(255,255,255,0.1)"></rect>
                    </pattern>
                </defs>
                <g id="bgLayer"></g>
                <g id="linkLayer"></g>
                <g id="nodeLayer"></g>

/* ===== js/state.js ===== */

/**

/**
 * storage.js - 配置持久化

 */

const STORAGE_KEY = 'aidc-topology-settings';

/**
 * 获取默认配置
 * @returns {Object}
 */
function getDefaults() {
    return {
        serverCount: 128,
        gpuType: 'B300_8',
        currentStatsTab: 'compute',
        viewBox: { ...LAYOUT.viewBoxDefault },
        settings: {
            sidebarCollapsed: false,
            statsPanelCollapsed: false
        }
    };
}

/**
 * 保存当前配置到 localStorage
 */
function saveSettings() {
    try {
        const payload = {
            serverCount: appState.serverCount,
            gpuType: appState.gpuType,
            currentStatsTab: appState.currentStatsTab,
            viewBox: { ...appState.viewBox },
            settings: { ...appState.settings }
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    } catch (e) {
        console.warn('Failed to save settings:', e);
    }
}

/**
 * 从 localStorage 加载配置
 * @returns {boolean} 是否成功加载
 */
function loadSettings() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;

        const parsed = JSON.parse(raw);
        const defaults = getDefaults();

        // 合并并校验
        const serverCount = Math.min(2048, Math.max(1, Number(parsed.serverCount) || defaults.serverCount));
        const gpuType = ['A800_4', 'H800_8', 'B300_8'].includes(parsed.gpuType)
            ? parsed.gpuType
            : defaults.gpuType;
        const currentStatsTab = ['compute', 'storage'].includes(parsed.currentStatsTab)
            ? parsed.currentStatsTab
            : defaults.currentStatsTab;

        updateState({
            serverCount,
            gpuType,
            currentStatsTab,
            viewBox: parsed.viewBox || { ...defaults.viewBox },
            settings: {
                sidebarCollapsed: !!parsed.settings?.sidebarCollapsed,
                statsPanelCollapsed: !!parsed.settings?.statsPanelCollapsed
            }
        });

        return true;
    } catch (e) {
        console.warn('Failed to load settings:', e);
        return false;
    }
}

/**
 * 重置为默认配置
 */
function resetSettings() {
    try {
        localStorage.removeItem(STORAGE_KEY);
    } catch (e) {
        console.warn('Failed to clear settings:', e);
    }

    const defaults = getDefaults();
    updateState({
        serverCount: defaults.serverCount,
        gpuType: defaults.gpuType,
        currentStatsTab: defaults.currentStatsTab,
        viewBox: { ...defaults.viewBox },
        cachedHardwareData: null,
        cachedServerCount: null,
        settings: { ...defaults.settings }
    });

    // 同步 UI
    const serverInput = document.getElementById('serverCount');
    const gpuSelect = document.getElementById('gpuType');
    if (serverInput) serverInput.value = String(defaults.serverCount);
    if (gpuSelect) gpuSelect.value = defaults.gpuType;

    // 重置面板状态
    const sidebar = document.getElementById('sidebar');
    const hwPanel = document.getElementById('hwFloatPanel');
    if (sidebar) sidebar.classList.remove('collapsed');
    if (hwPanel) hwPanel.classList.remove('collapsed');

    // 触发重新生成
    return defaults;
}

/**

function bindResetButton(onReset) {

/**

let saveTimer = null;
function debouncedSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(saveSettings, 500);
}

/* ===== js/hardware-engine.js ===== */

/**
 * hardware-engine.js - B300 网络设备硬件计算引擎
 * 纯函数设计，输入确定则输出确定，支持 Memoization 缓存
 */

/** @typedef {{ role: string, model: string, count: number, desc: string }} SwitchItem */
/** @typedef {{ conn: string, model: string, count: number, desc: string }} ModuleItem */
/** @typedef {{ conn: string, model: string, count: number, desc: string }} CableItem */
/** @typedef {{ networkType: string, podCount: number, serversPerPod: number, leafSwitches: number, spineSwitches: number, coreSwitches: number, [key:string]: any }} ComputeMeta */
/** @typedef {{ storageNodes: number, totalStorageDownlink: number, storageLeaf: number, storageSpine: number }} StorageMeta */
/** @typedef {{ switches: SwitchItem[], modules: ModuleItem[], cables: CableItem[], meta: ComputeMeta }} ComputeSection */
/** @typedef {{ switches: SwitchItem[], modules: ModuleItem[], cables: CableItem[], meta: StorageMeta }} StorageSection */
/** @typedef {{ compute: ComputeSection, storage: StorageSection|null }} HardwareResult */

// Memoization 缓存 Map
const _cache = new Map();

/**
 * 计算下一个 2 的幂
 * @param {number} n
 * @returns {number}
 */
function nextPowerOf2(n) {
    if (n <= 0) return 1;
    return Math.pow(2, Math.ceil(Math.log2(n)));
}

/**
 * 生成缓存键
 * @param {number} serverCount
 * @param {string} gpuType
 * @returns {string}
 */
function _cacheKey(serverCount, gpuType) {
    return `${gpuType}::${serverCount}`;
}

/**
 * 计算 B300 网络设备硬件清单
 * @param {number} serverCount
 * @param {string} gpuType - GPU 规格键，如 'B300_8'
 * @returns {HardwareResult}
 */
function calcHardware(serverCount, gpuType = 'B300_8') {
    const key = _cacheKey(serverCount, gpuType);
    if (_cache.has(key)) {
        return _cache.get(key);
    }

    const gpuSpec = GPU_SPECS[gpuType] || GPU_SPECS.B300_8;
    const swSpec = SWITCH_SPECS['RG-S6990-128QC2XS'];
    const result = { compute: /** @type {ComputeSection} */(null), storage: /** @type {StorageSection|null} */(null) };

    // ===== 计算网 =====
    const downlinksPerServer = gpuSpec.downlinksPerServer;
    const leafDownlinkPorts = gpuSpec.leafDownlinkPorts;
    const serversPerLeaf = leafDownlinkPorts / downlinksPerServer;

    // Leaf 数量
    let leafSwitches = Math.ceil(serverCount / serversPerLeaf);
    if (leafSwitches % 2 !== 0) leafSwitches += 1;

    // Spine / Core 数量
    let spineSwitches = 0;
    let coreSwitches = 0;
    let networkType = '';

    if (serverCount <= ARCHITECTURE.TWO_TIER_MAX) {
        spineSwitches = nextPowerOf2(Math.ceil(leafSwitches / 2));
        networkType = 'Two-Tier (Leaf-Spine)';
    } else {
        spineSwitches = leafSwitches;
        coreSwitches = nextPowerOf2(Math.ceil(spineSwitches / 2));
        networkType = 'Three-Tier (Leaf-Spine-Core)';
    }

    // 计算网交换机列表
    const computeSwitches = /** @type {SwitchItem[]} */([]);
    computeSwitches.push({
        role: 'Leaf',
        model: 'RG-S6990-128QC2XS',
        count: leafSwitches,
        desc: `${leafDownlinkPorts}下行+${leafDownlinkPorts}上行 400G`
    });
    computeSwitches.push({
        role: 'Spine',
        model: 'RG-S6990-128QC2XS',
        count: spineSwitches,
        desc: `${leafDownlinkPorts * 2} 400G全互联`
    });
    if (coreSwitches > 0) {
        computeSwitches.push({
            role: 'Core',
            model: 'RG-S6990-128QC2XS',
            count: coreSwitches,
            desc: '核心层汇聚'
        });
    }

    // 计算网光模块
    const computeModules = /** @type {ModuleItem[]} */([]);
    const ct = MODULES_TABLE.compute;
    // Spine↔Leaf: 双端计算
    const spineLeafModuleCount = leafSwitches * leafDownlinkPorts * 2;
    computeModules.push({ conn: 'Spine↔Leaf', model: ct.spineLeaf.model, count: spineLeafModuleCount, desc: ct.spineLeaf.desc });
    // Server↔Leaf: 交换机侧
    const serverLeafModuleCount = serverCount * downlinksPerServer;
    computeModules.push({ conn: 'Server↔Leaf', model: ct.serverLeafSw.model, count: serverLeafModuleCount, desc: ct.serverLeafSw.desc });
    // Server↔Leaf: 服务器侧 (800G分支模块, 每台配8个)
    const serverSideModuleCount = serverCount * 8;
    computeModules.push({ conn: 'Server↔Leaf', model: ct.serverLeafSrv.model, count: serverSideModuleCount, desc: ct.serverLeafSrv.desc });

    // 计算网线缆
    const computeCables = /** @type {CableItem[]} */([]);
    const cab = MODULES_TABLE.cables;
    computeCables.push({ conn: 'Spine↔Leaf', model: cab.spineLeafCompute.model, count: leafSwitches * leafDownlinkPorts, desc: cab.spineLeafCompute.desc });
    computeCables.push({ conn: 'Server↔Leaf', model: cab.serverLeafCompute.model, count: serverCount * downlinksPerServer, desc: cab.serverLeafCompute.desc });

    // POD 划分
    let podCount = 1;
    let serversPerPod = serverCount;
    if (serverCount <= 32) { podCount = 1; serversPerPod = serverCount; }
    else if (serverCount <= 64) { podCount = 2; serversPerPod = 32; }
    else if (serverCount <= 128) { podCount = 2; serversPerPod = 64; }
    else if (serverCount <= 256) { podCount = Math.ceil(serverCount / 32); serversPerPod = 32; }
    else { podCount = Math.ceil(serverCount / 64); serversPerPod = 64; }

    result.compute = {
        switches: computeSwitches,
        modules: computeModules,
        cables: computeCables,
        meta: {
            networkType,
            podCount,
            serversPerPod,
            leafSwitches,
            spineSwitches,
            coreSwitches
        }
    };

    // ===== 存储网 (serverCount >= 32) =====
    if (serverCount >= 32) {
        const storageNodes = Math.ceil(serverCount * STORAGE_RATIO.nodes / STORAGE_RATIO.base);
        const totalStorageDownlink = serverCount * STORAGE_RATIO.serverPorts + storageNodes * STORAGE_RATIO.storageNodePorts;

        let storageLeaf = Math.ceil(totalStorageDownlink / leafDownlinkPorts);
        if (storageLeaf % 2 !== 0) storageLeaf += 1;

        let storageSpine = Math.max(2, nextPowerOf2(Math.ceil(storageLeaf / 2)));

        const storageSwitches = /** @type {SwitchItem[]} */([]);
        storageSwitches.push({
            role: 'Leaf',
            model: 'RG-S6990-128QC2XS',
            count: storageLeaf,
            desc: `${leafDownlinkPorts}下行+${leafDownlinkPorts}上行 400G`
        });
        storageSwitches.push({
            role: 'Spine',
            model: 'RG-S6990-128QC2XS',
            count: storageSpine,
            desc: `${leafDownlinkPorts * 2} 400G全互联`
        });

        const storageModules = /** @type {ModuleItem[]} */([]);
        const st = MODULES_TABLE.storage;
        const storageLeafSpineModuleCount = storageLeaf * leafDownlinkPorts * 2;
        storageModules.push({ conn: 'Spine↔Leaf', model: st.spineLeaf.model, count: storageLeafSpineModuleCount, desc: st.spineLeaf.desc });
        storageModules.push({ conn: 'Server↔Leaf', model: st.serverLeaf.model, count: totalStorageDownlink, desc: st.serverLeaf.desc });

        const storageCables = /** @type {CableItem[]} */([]);
        storageCables.push({ conn: 'Spine↔Leaf', model: cab.spineLeafStorage.model, count: storageLeaf * leafDownlinkPorts, desc: cab.spineLeafStorage.desc });
        storageCables.push({ conn: 'Server↔Leaf', model: cab.serverLeafStorage.model, count: totalStorageDownlink, desc: cab.serverLeafStorage.desc });

        result.storage = {
            switches: storageSwitches,
            modules: storageModules,
            cables: storageCables,
            meta: {
                storageNodes,
                totalStorageDownlink,
                storageLeaf,
                storageSpine
            }
        };
    }

    _cache.set(key, result);
    return result;
}

/**
 * 清除硬件计算缓存
 */
function clearHardwareCache() {
    _cache.clear();
}

/**
 * 获取缓存统计（调试用）
 * @returns {{ size: number, keys: string[] }}
 */
function getCacheStats() {
    return { size: _cache.size, keys: Array.from(_cache.keys()) };
}

/* ===== js/layout-engine.js ===== */

/**
 * layout-engine.js - 布局计算引擎
 * 负责坐标计算、POD 划分、压缩显示策略
 * 输出纯数据结构，供 svg-renderer.js 消费
 */

/** @typedef {{ type: 'rect'|'text', [key:string]: any }} BgElement */
/** @typedef {{ type: 'virtualSpine'|'gap', idx?: number, count?: number, x: number, y: number, width: number, height: number, id?: string, label?: string, tooltip?: string, p1x?: number, p2x?: number, bottomY?: number }} SpineNode */
/** @typedef {{ type: 'leafPair'|'gap', groupIdx?: number, count?: number, x: number, y: number, l1Id: string, l2Id: string, l1Label: string, l2Label: string, p1x: number, p2x: number, bottomY: number, podIndex: number, tooltipL1: string, tooltipL2: string }} LeafNode */
/** @typedef {{ type: 'server'|'gap'|'ellipsis', idx?: string, x: number, y: number, width: number, height: number, id: string, label: string, tooltip: string, railCount: number }} ServerNode */
/** @typedef {{ x1: number, y1: number, x2: number, y2: number, color: string, classes: string }} LinkSegment */
/** @typedef {{ podIndex: number, bgRect: Object, podLabel: Object, podSubLabel: Object, leafNodes: LeafNode[], serverNodes: ServerNode[] }} PodLayout */
/** @typedef {{ dimensions: {width:number,height:number}, bgElements: BgElement[], spineNodes: SpineNode[], pods: PodLayout[], links: LinkSegment[], visibleLeafGroupIds: Set<number> }} TopologyLayout */

/**
 * 构建压缩显示位置数组
 * @param {number} totalCount
 * @returns {Array<{type:'item'|'gap', idx?:number, count?:number}>}
 */
function buildCompressedPositions(totalCount) {
    if (totalCount <= 3) {
        return Array.from({ length: totalCount }, (_, i) => ({ type: 'item', idx: i + 1 }));
    }
    return [
        { type: 'item', idx: 1 },
        { type: 'item', idx: 2 },
        { type: 'gap', count: totalCount - 3 },
        { type: 'item', idx: totalCount }
    ];
}

/**
 * 计算拓扑布局
 * @param {number} serverCount
 * @param {string} gpuType
 * @returns {TopologyLayout}
 */
function calcLayout(serverCount, gpuType) {
    const parts = gpuType.split('_');
    const railCount = parseInt(parts[1]) || 8;

    const hwData = calcHardware(serverCount, gpuType);
    const cm = hwData.compute.meta;
    const actualSpineCount = cm.spineSwitches;
    const podCount = cm.podCount;
    const leafPairsPerPod = Math.ceil(cm.leafSwitches / podCount / 2);

    const spineY = LAYOUT.spineY;
    const leafY = LAYOUT.leafY;
    const serverY = LAYOUT.serverY;
    const canvasWidth = Math.max(LAYOUT.baseCanvasWidth, podCount * LAYOUT.podWidthFactor);
    const spineBoxWidth = canvasWidth - LAYOUT.spineBoxPadding;
    const podWidth = spineBoxWidth / podCount;

    /** @type {BgElement[]} */
    const bgElements = [];
    /** @type {SpineNode[]} */
    const spineNodes = [];
    /** @type {LinkSegment[]} */
    const links = [];
    /** @type {PodLayout[]} */
    const pods = [];

    // ===== 1. Spine 层背景 =====
    bgElements.push({
        type: 'rect',
        x: 200, y: spineY - 80,
        width: spineBoxWidth, height: 180,
        fill: 'rgba(15, 23, 42, 0.5)',
        stroke: '#475569', strokeWidth: 2, strokeDasharray: '6,4', rx: 12
    });
    bgElements.push({
        type: 'text',
        x: 230, y: spineY - 52,
        text: `核心层 (Spine) — 物理单机·虚拟双平面 [${actualSpineCount}台]`,
        fontSize: 16, fill: '#94a3b8', fontWeight: 'bold',
        fontFamily: "'Inter','Microsoft YaHei',sans-serif"
    });
    // VRF逃生图例
    bgElements.push({
        type: 'line',
        x1: spineBoxWidth - 40, y1: spineY - 68,
        x2: spineBoxWidth - 20, y2: spineY - 68,
        stroke: '#fbbf24', strokeWidth: 1, strokeDasharray: '3,3'
    });
    bgElements.push({
        type: 'text',
        x: spineBoxWidth - 15, y: spineY - 64,
        text: '= VRF虚拟逃生',
        fontSize: 9, fill: '#fbbf24', fontWeight: 600
    });

    // ===== 2. Spine 节点位置计算 =====
    const spinePositions = buildCompressedPositions(actualSpineCount);
    const spineSpacing = spineBoxWidth / (spinePositions.length + 1);

    for (let vi = 0; vi < spinePositions.length; vi++) {
        const cx = 200 + spineSpacing * (vi + 1);
        const pos = spinePositions[vi];

        if (pos.type === 'gap') {
            spineNodes.push({
                type: 'gap',
                count: pos.count,
                x: cx - 60, y: spineY - 5,
                width: 120, height: 40
            });
            continue;
        }

        const idx = pos.idx;
        const spineW = LAYOUT.spineW;
        const spineH = LAYOUT.spineH;

        spineNodes.push({
            type: 'virtualSpine',
            idx,
            id: `spine_${idx}`,
            x: cx - spineW / 2,
            y: spineY - 25,
            width: spineW,
            height: spineH,
            p1x: cx - 50,
            p2x: cx + 50,
            bottomY: spineY - 25 + spineH,
            label: `Spine-${idx}`,
            tooltip: `<div class="mb-1 font-semibold">Spine-${idx}</div>物理交换机 (虚拟双平面)<br>平面1: VRF1 (蓝色)<br>平面2: VRF2 (橙色)<br>VRF逃生: 虚拟路径 (不占物理端口)<br>800G 端口`
        });
    }

    // ===== 3. POD 层 =====
    const visibleLeafGroupIds = new Set();

    for (let p = 0; p < podCount; p++) {
        const podX = 200 + p * podWidth;
        const podLayout = /** @type {PodLayout} */({
            podIndex: p,
            leafNodes: [],
            serverNodes: []
        });

        // POD 背景
        podLayout.bgRect = {
            x: podX + 20, y: leafY - 110,
            width: podWidth - 40,
            height: serverY - leafY + 250,
            fill: 'rgba(30, 41, 59, 0.2)',
            stroke: '#334155', strokeWidth: 1, rx: 16
        };
        podLayout.podLabel = {
            x: podX + 50, y: leafY - 70,
            text: `POD ${p + 1}`,
            fontSize: 16, fill: '#cbd5e1', fontWeight: 'bold',
            fontFamily: "'Inter','Microsoft YaHei',sans-serif"
        };
        podLayout.podSubLabel = {
            x: podX + 50, y: leafY - 48,
            text: `包含 ${leafPairsPerPod * 2}台 Leaf, 下联 ${Math.min(cm.serversPerPod, serverCount - p * cm.serversPerPod)}台 算力节点`,
            fontSize: 11, fill: '#64748b',
            fontFamily: "'Inter','Microsoft YaHei',sans-serif"
        };

        // Leaf 层
        const leafPositions = buildCompressedPositions(leafPairsPerPod);
        const leafSpacing = (podWidth - LAYOUT.podPadding * 2) / leafPositions.length;
        const leafNodes = [];

        for (let vi = 0; vi < leafPositions.length; vi++) {
            const cx = podX + LAYOUT.podPadding / 2 + leafSpacing * (vi + 0.5);
            const pos = leafPositions[vi];

            if (pos.type === 'gap') {
                podLayout.leafNodes.push({
                    type: 'gap',
                    count: pos.count,
                    x: cx - 55, y: leafY + 5,
                    width: 110, height: 40,
                    podIndex: p
                });
                continue;
            }

            const idx = pos.idx;
            const l1Id = `l1_${p}_${idx}`;
            const l2Id = `l2_${p}_${idx}`;

            visibleLeafGroupIds.add(idx);

            const node = {
                type: 'leafPair',
                groupIdx: idx,
                x: cx,
                y: leafY,
                l1Id,
                l2Id,
                l1Label: `L1-${idx}`,
                l2Label: `L2-${idx}`,
                p1x: cx - 45,
                p2x: cx + 45,
                bottomY: leafY + 50,
                podIndex: p,
                tooltipL1: `<b>L1-${idx}</b><br>所在 POD: ${p + 1}<br>角色: Leaf (平面1)<br>上行: 64<br>下行: 64`,
                tooltipL2: `<b>L2-${idx}</b><br>所在 POD: ${p + 1}<br>角色: Leaf (平面2)<br>上行: 64<br>下行: 64`
            };
            podLayout.leafNodes.push(node);
            leafNodes.push({ id: idx, p1x: cx - 45, p2x: cx + 45, y: leafY + 50, l1Id, l2Id });

            // 到 Spine 的连线
            spineNodes.forEach(sp => {
                if (sp.type !== 'virtualSpine') return;
                links.push({
                    x1: cx - 45, y1: leafY,
                    x2: sp.p1x, y2: sp.bottomY,
                    color: '#3b82f6',
                    classes: `${l1Id} dev-spine_${sp.id} spine_${sp.id}`
                });
                links.push({
                    x1: cx + 45, y1: leafY,
                    x2: sp.p2x, y2: sp.bottomY,
                    color: '#f97316',
                    classes: `${l2Id} dev-spine_${sp.id} spine_${sp.id}`
                });
            });
        }

        // Server 层
        const serverSpacing = (podWidth - LAYOUT.podPadding * 2) / LAYOUT.visualServers;
        const actualServersInPod = Math.min(cm.serversPerPod, serverCount - p * cm.serversPerPod);
        for (let s = 0; s < LAYOUT.visualServers; s++) {
            const cx = podX + LAYOUT.podPadding / 2 + serverSpacing * (s + 0.5);
            const isLast = (s === LAYOUT.visualServers - 1);
            const idx = isLast ? String(actualServersInPod) : String(s + 1);

            if (s === LAYOUT.visualServers - 2) {
                podLayout.serverNodes.push({
                    type: 'ellipsis',
                    x: cx, y: serverY + 40,
                    text: '...... 省略部分节点 ......'
                });
                continue;
            }

            const srvId = `srv_${p}_${idx}`;
            const gpuPrefix = parts[0];

            podLayout.serverNodes.push({
                type: 'server',
                idx,
                x: cx - LAYOUT.serverW / 2,
                y: serverY,
                width: LAYOUT.serverW,
                height: LAYOUT.serverH,
                id: srvId,
                label: `算力节点 ${idx} (${gpuPrefix})`,
                tooltip: `<div class="mb-1 font-semibold">Server ${idx}</div>配置: ${gpuPrefix}<br>网卡: ${railCount}x CX8`,
                railCount
            });

            // Server 到 Leaf 的连线
            const portGroupSpacing = LAYOUT.serverW / (railCount + 1);
            for (let rail = 0; rail < railCount; rail++) {
                const portX = cx - LAYOUT.serverW / 2 + portGroupSpacing * (rail + 1);
                const portY = serverY;
                const targetLeafGroupIdx = (railCount === 8) ? (rail + 1) : Math.floor(rail * (8 / railCount)) + 1;
                const isTargetVisible = visibleLeafGroupIds.has(targetLeafGroupIdx);
                const targetLeaf = leafNodes.find(ln => ln.id === targetLeafGroupIdx);

                if (isTargetVisible && targetLeaf) {
                    const linkClasses = `${srvId} dev-${targetLeaf.l1Id} dev-${targetLeaf.l2Id}`;
                    links.push({
                        x1: portX - 7, y1: portY - 14,
                        x2: targetLeaf.p1x, y2: targetLeaf.y,
                        color: '#3b82f6',
                        classes: linkClasses
                    });
                    links.push({
                        x1: portX + 7, y1: portY - 14,
                        x2: targetLeaf.p2x, y2: targetLeaf.y,
                        color: '#f97316',
                        classes: linkClasses
                    });
                }
            }
        }

        pods.push(podLayout);
    }

    return {
        dimensions: { width: canvasWidth, height: 1200 },
        bgElements,
        spineNodes,
        pods,
        links,
        visibleLeafGroupIds
    };
}

/* ===== js/svg-renderer.js ===== */

/**
 * svg-renderer.js - SVG 分层渲染引擎
 * 使用 DocumentFragment 批量插入，维护 bg/link/node 三层
 */

const SVG_NS = 'http://www.w3.org/2000/svg';

/**
 * 创建 SVG 元素
 * @param {string} tag
 * @param {Object} attrs
 * @returns {SVGElement}
 */
function createSVG(tag, attrs = {}) {
    const el = document.createElementNS(SVG_NS, tag);
    for (const [k, v] of Object.entries(attrs)) {
        if (v !== undefined && v !== null) {
            el.setAttribute(k, String(v));
        }
    }
    return el;
}

/**
 * 批量设置属性
 * @param {SVGElement} el
 * @param {Object} attrs
 */
function setAttrs(el, attrs) {
    for (const [k, v] of Object.entries(attrs)) {
        if (v !== undefined && v !== null) {
            el.setAttribute(k, String(v));
        }
    }
}

/**
 * 创建文本元素
 * @param {number} x
 * @param {number} y
 * @param {string} text
 * @param {Object} attrs
 * @returns {SVGTextElement}
 */
function createText(x, y, text, attrs = {}) {
    const t = createSVG('text', { x, y, ...attrs });
    t.textContent = text;
    return t;
}

/**
 * 渲染背景层
 * @param {SVGElement} layer
 * @param {import('./layout-engine.js').TopologyLayout} layout
 */
function renderBgLayer(layer, layout) {
    const frag = document.createDocumentFragment();
    for (const item of layout.bgElements) {
        if (item.type === 'rect') {
            frag.appendChild(createSVG('rect', {
                x: item.x, y: item.y,
                width: item.width, height: item.height,
                fill: item.fill, stroke: item.stroke,
                'stroke-width': item.strokeWidth,
                'stroke-dasharray': item.strokeDasharray,
                rx: item.rx
            }));
        } else if (item.type === 'text') {
            frag.appendChild(createText(item.x, item.y, item.text, {
                'font-family': item.fontFamily,
                'font-size': item.fontSize,
                fill: item.fill,
                'font-weight': item.fontWeight
            }));
        } else if (item.type === 'line') {
            frag.appendChild(createSVG('line', {
                x1: item.x1, y1: item.y1,
                x2: item.x2, y2: item.y2,
                stroke: item.stroke,
                'stroke-width': item.strokeWidth,
                'stroke-dasharray': item.strokeDasharray
            }));
        }
    }

    // POD 背景
    for (const pod of layout.pods) {
        const r = pod.bgRect;
        frag.appendChild(createSVG('rect', {
            x: r.x, y: r.y, width: r.width, height: r.height,
            fill: r.fill, stroke: r.stroke, 'stroke-width': r.strokeWidth, rx: r.rx
        }));
        frag.appendChild(createText(pod.podLabel.x, pod.podLabel.y, pod.podLabel.text, {
            'font-family': pod.podLabel.fontFamily,
            'font-size': pod.podLabel.fontSize,
            fill: pod.podLabel.fill,
            'font-weight': pod.podLabel.fontWeight
        }));
        frag.appendChild(createText(pod.podSubLabel.x, pod.podSubLabel.y, pod.podSubLabel.text, {
            'font-family': pod.podSubLabel.fontFamily,
            'font-size': pod.podSubLabel.fontSize,
            fill: pod.podSubLabel.fill
        }));
    }

    layer.innerHTML = '';
    layer.appendChild(frag);
}

/**
 * 渲染连线层
 * @param {SVGElement} layer
 * @param {import('./layout-engine.js').TopologyLayout} layout
 */
function renderLinkLayer(layer, layout) {
    const frag = document.createDocumentFragment();
    for (const link of layout.links) {
        const offset = Math.abs(link.y2 - link.y1) * 0.4;
        const d = `M ${link.x1} ${link.y1} C ${link.x1} ${link.y1 - offset}, ${link.x2} ${link.y2 + offset}, ${link.x2} ${link.y2}`;
        frag.appendChild(createSVG('path', {
            d, stroke: link.color, 'stroke-width': '1.5', fill: 'none',
            class: `link-line ${link.classes}`
        }));
    }
    layer.innerHTML = '';
    layer.appendChild(frag);
}

/**
 * 创建 Spine 层省略占位符
 * @param {SpineNode} node
 * @returns {DocumentFragment}
 */
function renderSpineGap(node) {
    const frag = document.createDocumentFragment();
    frag.appendChild(createSVG('rect', {
        x: node.x, y: node.y, width: node.width, height: node.height,
        rx: 8, fill: 'rgba(15,23,42,0.4)', stroke: '#334155',
        'stroke-width': 1, 'stroke-dasharray': '4,3'
    }));
    frag.appendChild(createText(node.x + node.width / 2, node.y + 20, `← x${node.count} →`, {
        'font-size': 13, fill: '#64748b', 'font-weight': 'bold', 'text-anchor': 'middle'
    }));
    frag.appendChild(createText(node.x + node.width / 2, node.y + 36, 'Spine省略', {
        'font-size': 9, fill: '#475569', 'text-anchor': 'middle'
    }));
    return frag;
}

/**
 * 创建虚拟双平面 Spine
 * @param {SpineNode} node
 * @returns {DocumentFragment}
 */
function renderVirtualSpine(node) {
    const frag = document.createDocumentFragment();
    const g = createSVG('g', {
        id: `dev-${node.id}`,
        class: `device-group dev-${node.id}`,
        'data-id': node.id,
        'data-tooltip': node.tooltip
    });

    const pad = 4;
    const gapW = 10;
    const vrfW = (node.width - pad * 2 - gapW) / 2;
    const topLabelH = 13;
    const portH = 10;
    const vrfX1 = node.x + pad;
    const vrfX2 = node.x + pad + vrfW + gapW;
    const vrfY = node.y + pad + topLabelH;
    const vrfH = node.height - pad * 2 - topLabelH - portH;
    const escapeCX = node.x + pad + vrfW + gapW / 2;

    // 物理机箱外框
    g.appendChild(createSVG('rect', {
        x: node.x, y: node.y, width: node.width, height: node.height,
        rx: 8, fill: '#0f172a', stroke: '#94a3b8', 'stroke-width': 2.5,
        filter: 'url(#shadow)'
    }));
    // 顶部金属高光
    g.appendChild(createSVG('line', {
        x1: node.x + 3, y1: node.y + 2,
        x2: node.x + node.width - 3, y2: node.y + 2,
        stroke: 'rgba(255,255,255,0.15)', 'stroke-width': 1
    }));
    // PHYSICAL 标签
    g.appendChild(createText(node.x + 6, node.y + 12, node.label || 'PHYSICAL', {
        'font-size': 7, fill: '#94a3b8', 'font-weight': 700, 'letter-spacing': 0.5
    }));

    // VRF1
    g.appendChild(createSVG('rect', {
        x: vrfX1, y: vrfY, width: vrfW, height: vrfH,
        rx: 4, fill: 'url(#grad-blue)', stroke: '#3b82f6',
        'stroke-width': 1, opacity: 0.95
    }));
    g.appendChild(createText(vrfX1 + vrfW / 2, vrfY + vrfH / 2 - 5, 'P1', {
        'font-size': 11, fill: '#fff', 'font-weight': 700, 'text-anchor': 'middle'
    }));
    g.appendChild(createText(vrfX1 + vrfW / 2, vrfY + vrfH / 2 + 10, 'VRF1', {
        'font-size': 7, fill: '#93c5fd', 'text-anchor': 'middle'
    }));

    // VRF2
    g.appendChild(createSVG('rect', {
        x: vrfX2, y: vrfY, width: vrfW, height: vrfH,
        rx: 4, fill: 'url(#grad-orange)', stroke: '#f97316',
        'stroke-width': 1, opacity: 0.95
    }));
    g.appendChild(createText(vrfX2 + vrfW / 2, vrfY + vrfH / 2 - 5, 'P2', {
        'font-size': 11, fill: '#fff', 'font-weight': 700, 'text-anchor': 'middle'
    }));
    g.appendChild(createText(vrfX2 + vrfW / 2, vrfY + vrfH / 2 + 10, 'VRF2', {
        'font-size': 7, fill: '#fdba74', 'text-anchor': 'middle'
    }));

    // VRF 逃生虚线
    g.appendChild(createSVG('line', {
        x1: escapeCX, y1: vrfY + 4, x2: escapeCX, y2: vrfY + vrfH - 4,
        stroke: '#fbbf24', 'stroke-width': 1, 'stroke-dasharray': '3,3', opacity: 0.5
    }));
    // → 箭头
    g.appendChild(createSVG('line', {
        x1: escapeCX - 3, y1: vrfY + vrfH / 2 - 10,
        x2: escapeCX + 3, y2: vrfY + vrfH / 2 - 10,
        stroke: '#fbbf24', 'stroke-width': 1.5
    }));
    g.appendChild(createSVG('polygon', {
        points: `${escapeCX + 3},${vrfY + vrfH / 2 - 12} ${escapeCX + 7},${vrfY + vrfH / 2 - 10} ${escapeCX + 3},${vrfY + vrfH / 2 - 8}`,
        fill: '#fbbf24'
    }));
    // ← 箭头
    g.appendChild(createSVG('line', {
        x1: escapeCX - 3, y1: vrfY + vrfH / 2 + 2,
        x2: escapeCX + 3, y2: vrfY + vrfH / 2 + 2,
        stroke: '#fbbf24', 'stroke-width': 1.5
    }));
    g.appendChild(createSVG('polygon', {
        points: `${escapeCX - 3},${vrfY + vrfH / 2} ${escapeCX - 7},${vrfY + vrfH / 2 + 2} ${escapeCX - 3},${vrfY + vrfH / 2 + 4}`,
        fill: '#fbbf24'
    }));
    // 逃生标签
    g.appendChild(createSVG('rect', {
        x: escapeCX - 15, y: vrfY + vrfH / 2 + 8,
        width: 30, height: 13, rx: 3,
        fill: 'rgba(251,191,36,0.12)', stroke: '#fbbf24', 'stroke-width': 0.5
    }));
    g.appendChild(createText(escapeCX, vrfY + vrfH / 2 + 18, 'VRF逃生', {
        'font-size': 6, fill: '#fbbf24', 'text-anchor': 'middle', 'font-weight': 700
    }));

    // 端口指示灯
    const portCount = 10;
    const portSpacing = (node.width - 20) / portCount;
    for (let i = 0; i < portCount; i++) {
        const px = node.x + 10 + i * portSpacing + portSpacing / 2 - 2;
        g.appendChild(createSVG('rect', {
            x: px, y: node.y + node.height - 8,
            width: 4, height: 4, fill: '#64748b',
            class: 'led-blink', rx: 0.5
        }));
    }

    frag.appendChild(g);
    return frag;
}

/**
 * 创建 Leaf 交换机
 * @param {import('./layout-engine.js').LeafNode} node
 * @param {'blue'|'orange'} planeType
 * @returns {DocumentFragment}
 */
function renderLeafSwitch(node, planeType) {
    const frag = document.createDocumentFragment();
    const id = planeType === 'blue' ? node.l1Id : node.l2Id;
    const label = planeType === 'blue' ? node.l1Label : node.l2Label;
    const tooltip = planeType === 'blue' ? node.tooltipL1 : node.tooltipL2;
    const x = planeType === 'blue' ? node.x - 80 : node.x + 10;
    const width = 70;
    const height = 50;

    const g = createSVG('g', {
        id: `dev-${id}`,
        class: `device-group dev-${id}`,
        'data-id': id,
        'data-tooltip': tooltip
    });

    const fill = planeType === 'blue' ? 'url(#grad-blue)' : 'url(#grad-orange)';
    const stroke = planeType === 'blue' ? '#3b82f6' : '#f97316';

    g.appendChild(createSVG('rect', {
        x, y: node.y, width, height,
        rx: 6, fill, stroke, 'stroke-width': 1.5,
        filter: 'url(#shadow)'
    }));
    g.appendChild(createSVG('line', {
        x1: x + 2, y1: node.y + 2, x2: x + width - 2, y2: node.y + 2,
        stroke: 'rgba(255,255,255,0.2)', 'stroke-width': 1
    }));
    g.appendChild(createSVG('line', {
        x1: x + 4, y1: node.y + height / 2, x2: x + width - 4, y2: node.y + height / 2,
        stroke: 'rgba(0,0,0,0.3)', 'stroke-width': 1
    }));
    g.appendChild(createText(x + width / 2, node.y + height / 2 - 2, label, {
        'font-family': "'Inter','Microsoft YaHei',sans-serif",
        'font-size': 11, fill: '#ffffff', 'font-weight': 600,
        'text-anchor': 'middle', 'alignment-baseline': 'middle',
        'pointer-events': 'none'
    }));

    // 端口装饰
    const portCount = 8;
    const portSpacing = (width - 20) / portCount;
    const portFill = planeType === 'blue' ? '#60a5fa' : '#fdba74';
    for (let i = 0; i < portCount; i++) {
        const px = x + 10 + i * portSpacing + portSpacing / 2 - 2;
        g.appendChild(createSVG('rect', {
            x: px, y: node.y + height - 8,
            width: 4, height: 4, fill: portFill, class: 'led-blink'
        }));
    }

    frag.appendChild(g);
    return frag;
}

/**
 * 创建服务器
 * @param {import('./layout-engine.js').ServerNode} node
 * @returns {DocumentFragment}
 */
function renderServer(node) {
    const frag = document.createDocumentFragment();
    const g = createSVG('g', {
        id: `dev-${node.id}`,
        class: `device-group dev-${node.id}`,
        'data-id': node.id,
        'data-tooltip': node.tooltip
    });

    g.appendChild(createSVG('rect', {
        x: node.x, y: node.y,
        width: node.width, height: node.height,
        rx: 8, fill: 'url(#grad-server)', stroke: '#38bdf8',
        'stroke-width': 1, filter: 'url(#shadow)'
    }));
    g.appendChild(createSVG('rect', {
        x: node.x + 10, y: node.y + 6,
        width: node.width - 20, height: 8,
        fill: 'url(#stripes)', rx: 1
    }));
    g.appendChild(createText(node.x + node.width / 2, node.y + node.height - 12, node.label, {
        'font-family': "'Inter','Microsoft YaHei',sans-serif",
        'font-size': 12, fill: '#e2e8f0', 'font-weight': 'bold',
        'text-anchor': 'middle', 'pointer-events': 'none'
    }));

    // GPU 槽位
    const slotWidth = (node.width - 40) / node.railCount;
    for (let i = 0; i < node.railCount; i++) {
        const slotX = node.x + 20 + i * slotWidth + 2;
        g.appendChild(createSVG('rect', {
            x: slotX, y: node.y + 25,
            width: slotWidth - 4, height: 25,
            fill: '#020617', stroke: '#334155', 'stroke-width': 1, rx: 2
        }));
        g.appendChild(createSVG('rect', {
            x: slotX + 4, y: node.y + 28,
            width: slotWidth - 12, height: 3,
            fill: '#06b6d4', opacity: 0.8
        }));
        g.appendChild(createText(slotX + slotWidth / 2, node.y + 40, `G${i + 1}`, {
            'font-size': 8, fill: '#64748b', 'text-anchor': 'middle'
        }));
    }

    frag.appendChild(g);
    return frag;
}

/**
 * 创建 LACP 标记
 * @param {number} cx
 * @param {number} cy
 * @returns {SVGElement}
 */
function createLACPBadge(cx, cy) {
    const g = createSVG('g', { class: 'pointer-events-none' });
    g.appendChild(createSVG('rect', {
        x: cx - 16, y: cy - 7, width: 32, height: 14,
        rx: 7, fill: '#1e293b', stroke: '#94a3b8', 'stroke-width': 1
    }));
    g.appendChild(createText(cx, cy + 3, 'LACP', {
        'font-size': 8, fill: '#cbd5e1', 'font-weight': 'bold', 'text-anchor': 'middle'
    }));
    return g;
}

/**
 * 渲染节点层
 * @param {SVGElement} layer
 * @param {import('./layout-engine.js').TopologyLayout} layout
 * @param {number} serverCount
 * @param {number} railCount
 */
function renderNodeLayer(layer, layout, serverCount, railCount) {
    const frag = document.createDocumentFragment();

    // Spine 节点
    for (const sp of layout.spineNodes) {
        if (sp.type === 'gap') {
            frag.appendChild(renderSpineGap(sp));
        } else {
            frag.appendChild(renderVirtualSpine(sp));
        }
    }

    // POD 节点
    for (const pod of layout.pods) {
        // Leaf
        for (const leaf of pod.leafNodes) {
            if (leaf.type === 'gap') {
                frag.appendChild(createSVG('rect', {
                    x: leaf.x, y: leaf.y, width: leaf.width, height: leaf.height,
                    rx: 8, fill: 'rgba(15,23,42,0.4)', stroke: '#334155',
                    'stroke-width': 1, 'stroke-dasharray': '4,3'
                }));
                frag.appendChild(createText(leaf.x + leaf.width / 2, leaf.y + 25, `← x${leaf.count} →`, {
                    'font-size': 13, fill: '#64748b', 'font-weight': 'bold', 'text-anchor': 'middle'
                }));
            } else {
                frag.appendChild(renderLeafSwitch(leaf, 'blue'));
                frag.appendChild(renderLeafSwitch(leaf, 'orange'));
            }
        }

        // Server
        for (const srv of pod.serverNodes) {
            if (srv.type === 'ellipsis') {
                frag.appendChild(createText(srv.x, srv.y, srv.text, {
                    'font-size': 14, fill: '#475569', 'font-weight': 'bold', 'text-anchor': 'middle'
                }));
            } else if (srv.type === 'server') {
                frag.appendChild(renderServer(srv));

                // 网卡端口装饰
                const portGroupSpacing = srv.width / (railCount + 1);
                for (let rail = 0; rail < railCount; rail++) {
                    const portX = srv.x + portGroupSpacing * (rail + 1);
                    const portY = srv.y;
                    const targetLeafGroupIdx = (railCount === 8) ? (rail + 1) : Math.floor(rail * (8 / railCount)) + 1;
                    const isTargetVisible = layout.visibleLeafGroupIds.has(targetLeafGroupIdx);

                    if (isTargetVisible) {
                        frag.appendChild(createSVG('rect', {
                            x: portX - 12, y: portY - 14, width: 10, height: 14,
                            fill: '#1e3a8a', rx: 1
                        }));
                        frag.appendChild(createSVG('rect', {
                            x: portX + 2, y: portY - 14, width: 10, height: 14,
                            fill: '#c2410c', rx: 1
                        }));
                        frag.appendChild(createText(portX - 7, portY - 4, '1', {
                            'font-size': 8, fill: '#fff', 'text-anchor': 'middle'
                        }));
                        frag.appendChild(createText(portX + 7, portY - 4, '2', {
                            'font-size': 8, fill: '#fff', 'text-anchor': 'middle'
                        }));

                        if (rail === 0 || rail === railCount - 1) {
                            frag.appendChild(createLACPBadge(portX, portY - 40));
                        }
                    } else {
                        frag.appendChild(createSVG('rect', {
                            x: portX - 8, y: portY - 12, width: 16, height: 12,
                            fill: '#0f172a', stroke: '#334155', 'stroke-width': 0.5,
                            rx: 1, opacity: 0.6
                        }));
                        frag.appendChild(createText(portX, portY - 5, '·', {
                            'font-size': 7, fill: '#475569', 'text-anchor': 'middle'
                        }));
                    }
                }
            }
        }
    }

    layer.innerHTML = '';
    layer.appendChild(frag);
}

/**
 * 渲染完整拓扑
 * @param {import('./layout-engine.js').TopologyLayout} layout
 * @param {number} serverCount
 * @param {number} railCount
 */
function renderTopology(layout, serverCount, railCount) {
    const bgLayer = document.getElementById('bgLayer');
    const linkLayer = document.getElementById('linkLayer');
    const nodeLayer = document.getElementById('nodeLayer');

    if (!bgLayer || !linkLayer || !nodeLayer) {
        console.error('SVG layers not found');
        return;
    }

    renderBgLayer(bgLayer, layout);
    renderLinkLayer(linkLayer, layout);
    renderNodeLayer(nodeLayer, layout, serverCount, railCount);
}

/**
 * 高亮指定设备的链路
 * @param {string} deviceId
 */
function highlightDevice(deviceId) {
    const svgGroup = document.getElementById('nodeLayer')?.parentElement;
    if (!svgGroup) return;
    svgGroup.classList.add('svg-dimmed');

    const links = document.querySelectorAll(`.link-line.${deviceId}`);
    links.forEach(link => {
        link.classList.add('highlight');
        const classes = Array.from(link.classList);
        classes.forEach(cls => {
            if (cls.startsWith('dev-')) {
                const target = document.getElementById(cls);
                if (target) target.classList.add('highlight-device');
            }
        });
    });

    const self = document.getElementById(`dev-${deviceId}`);
    if (self) self.classList.add('highlight-device');
}

/**
 * 重置所有高亮
 */
function resetHighlights() {
    const svgGroup = document.getElementById('nodeLayer')?.parentElement;
    if (svgGroup) svgGroup.classList.remove('svg-dimmed');

    document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
    document.querySelectorAll('.highlight-device').forEach(el => el.classList.remove('highlight-device'));
}

/**
 * 获取 SVG 序列化字符串（用于导出）
 * @returns {string}
 */
function serializeSVG() {
    const svg = document.getElementById('topologySvg');
    if (!svg) return '';
    return new XMLSerializer().serializeToString(svg);
}

/* ===== js/interaction.js ===== */

/**
 * interaction.js - 交互管理
 * 缩放、拖拽、高亮、Tooltip、事件委托
 */

const svgElement = () => document.getElementById('topologySvg');
const svgContainer = () => document.getElementById('svgContainer');
const tooltipEl = () => document.getElementById('tooltip');
const nodeLayer = () => document.getElementById('nodeLayer');

/** @type {number|null} */
let wheelRafId = null;

/**
 * 更新 viewBox
 */
function updateViewBox() {
    const vb = appState.viewBox;
    const svg = svgElement();
    if (svg) {
        svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
    }
}

/**
 * 适应屏幕
 */
function resetZoom() {
    const group = nodeLayer();
    if (!group) return;

    // 等待 DOM 渲染完成后获取 bbox
    requestAnimationFrame(() => {
        try {
            const bbox = group.getBBox();
            if (bbox.width === 0) return;
            const padding = 120;
            updateState({
                viewBox: {
                    x: bbox.x - padding,
                    y: bbox.y - padding,
                    w: bbox.width + padding * 2,
                    h: bbox.height + padding * 2
                }
            });
            updateViewBox();
        } catch (e) {
            console.warn('resetZoom getBBox failed:', e);
            updateState({ viewBox: { ...LAYOUT.viewBoxDefault } });
            updateViewBox();
        }
    });
}

/**
 * 缩放
 * @param {number} factor
 */
function scaleView(factor) {
    const vb = appState.viewBox;
    const centerX = vb.x + vb.w / 2;
    const centerY = vb.y + vb.h / 2;
    const newW = vb.w * factor;
    const newH = vb.h * factor;
    updateState({
        viewBox: {
            x: centerX - newW / 2,
            y: centerY - newH / 2,
            w: newW,
            h: newH
        }
    });
    updateViewBox();
}

function zoomIn() {
    scaleView(1 / appState.zoomFactor);
}

function zoomOut() {
    scaleView(appState.zoomFactor);
}

/**
 * 显示 Tooltip
 * @param {MouseEvent} evt
 * @param {string} html
 */
function showTooltip(evt, html) {
    const tt = tooltipEl();
    if (!tt) return;
    tt.innerHTML = html;
    tt.style.display = 'block';
    tt.style.left = (evt.pageX + 15) + 'px';
    tt.style.top = (evt.pageY + 15) + 'px';
    tt.style.opacity = '1';
}

/**
 * 隐藏 Tooltip
 */
function hideTooltip() {
    const tt = tooltipEl();
    if (!tt) return;
    tt.style.opacity = '0';
    setTimeout(() => {
        if (tt.style.opacity === '0') tt.style.display = 'none';
    }, 200);
}

/**
 * 滚轮缩放（带 requestAnimationFrame 节流）
 * @param {WheelEvent} e
 */
function onWheel(e) {
    e.preventDefault();
    if (wheelRafId !== null) return;

    wheelRafId = requestAnimationFrame(() => {
        wheelRafId = null;
        const container = svgContainer();
        if (!container) return;

        const mouseX = e.offsetX;
        const mouseY = e.offsetY;
        const rect = container.getBoundingClientRect();
        const vb = appState.viewBox;
        const viewX = vb.x + (mouseX / rect.width) * vb.w;
        const viewY = vb.y + (mouseY / rect.height) * vb.h;
        const factor = e.deltaY < 0 ? (1 / appState.zoomFactor) : appState.zoomFactor;
        const newW = vb.w * factor;
        const newH = vb.h * factor;

        updateState({
            viewBox: {
                x: viewX - (mouseX / rect.width) * newW,
                y: viewY - (mouseY / rect.height) * newH,
                w: newW,
                h: newH
            }
        });
        updateViewBox();
    });
}

/**
 * 鼠标按下
 * @param {MouseEvent} e
 */
function onMouseDown(e) {
    updateState({ isDragging: true, dragStart: { x: e.clientX, y: e.clientY } });
    const container = svgContainer();
    if (container) container.style.cursor = 'grabbing';
}

/**
 * 鼠标移动（全局）
 * @param {MouseEvent} e
 */
function onMouseMove(e) {
    if (!appState.isDragging) return;
    const dx = e.clientX - appState.dragStart.x;
    const dy = e.clientY - appState.dragStart.y;
    const container = svgContainer();
    if (!container) return;
    const rect = container.getBoundingClientRect();
    const vb = appState.viewBox;

    updateState({
        viewBox: {
            x: vb.x - dx * (vb.w / rect.width),
            y: vb.y - dy * (vb.h / rect.height),
            w: vb.w,
            h: vb.h
        },
        dragStart: { x: e.clientX, y: e.clientY }
    });
    updateViewBox();
}

/**
 * 鼠标松开
 */
function onMouseUp() {
    updateState({ isDragging: false });
    const container = svgContainer();
    if (container) container.style.cursor = 'grab';
}

/**
 * 事件委托：mouseover
 * @param {MouseEvent} e
 */
function onSvgMouseOver(e) {
    const devGroup = e.target.closest('.device-group');
    if (!devGroup) return;
    const text = devGroup.getAttribute('data-tooltip');
    const id = devGroup.getAttribute('data-id');
    if (text) showTooltip(e, text);
    if (id) highlightDevice(id);
}

/**
 * 事件委托：mouseout
 * @param {MouseEvent} e
 */
function onSvgMouseOut(e) {
    const devGroup = e.target.closest('.device-group');
    if (!devGroup) return;
    hideTooltip();
    resetHighlights();
}

/**
 * 事件委托：mousemove（Tooltip 跟随）
 * @param {MouseEvent} e
 */
function onSvgMouseMove(e) {
    const tt = tooltipEl();
    if (tt && tt.style.opacity === '1') {
        tt.style.left = (e.pageX + 15) + 'px';
        tt.style.top = (e.pageY + 15) + 'px';
    }
}

/**
 * 绑定所有交互事件
 */
function bindInteractions() {
    const container = svgContainer();
    const layer = nodeLayer();

    if (container) {
        container.addEventListener('wheel', onWheel, { passive: false });
        container.addEventListener('mousedown', onMouseDown);
    }

    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);

    if (layer) {
        layer.addEventListener('mouseover', onSvgMouseOver);
        layer.addEventListener('mouseout', onSvgMouseOut);
        layer.addEventListener('mousemove', onSvgMouseMove);
    }
}

/**
 * 解绑交互事件（清理用）
 */
function unbindInteractions() {
    const container = svgContainer();
    const layer = nodeLayer();

    if (container) {
        container.removeEventListener('wheel', onWheel);
        container.removeEventListener('mousedown', onMouseDown);
    }
    window.removeEventListener('mousemove', onMouseMove);
    window.removeEventListener('mouseup', onMouseUp);

    if (layer) {
        layer.removeEventListener('mouseover', onSvgMouseOver);
        layer.removeEventListener('mouseout', onSvgMouseOut);
        layer.removeEventListener('mousemove', onSvgMouseMove);
    }
}

/**
 * 渲染统计区块
 * @param {string} title
 * @param {Object} section
 * @returns {string}
 */
function renderStatsSection(title, section) {
    let html = '';

    // 架构摘要
    if (section.meta) {
        html += `<div class="p-2 bg-slate-800/60 rounded border border-slate-700/50 font-small text-slate-400 space-y-1">`;
        if (section.meta.networkType) {
            html += `<div class="flex justify-between"><span>网络架构:</span><span class="text-emerald-400 font-semibold">${section.meta.networkType}</span></div>`;
        }
        if (section.meta.podCount) {
            html += `<div class="flex justify-between"><span>POD 数量:</span><span class="text-white">${section.meta.podCount} 个 (${section.meta.serversPerPod}台/POD)</span></div>`;
        }
        if (section.meta.storageNodes !== undefined) {
            html += `<div class="flex justify-between"><span>存储节点:</span><span class="text-white">${section.meta.storageNodes} 台</span></div>`;
            html += `<div class="flex justify-between"><span>存储下行端口:</span><span class="text-white">${section.meta.totalStorageDownlink} 个</span></div>`;
        }
        html += `</div>`;
    }

    // 交换机
    const totalSwitches = section.switches.reduce((s, i) => s + i.count, 0);
    html += `<div>`;
    html += `<div class="stat-category flex justify-between">交换机 <span class="stat-total">共 ${totalSwitches} 台</span></div>`;
    section.switches.forEach(sw => {
        html += `<div class="stat-row"><span><span class="text-slate-300">${sw.role}</span> <span class="stat-model">${sw.model}</span></span><span class="stat-count">${sw.count}</span></div>`;
    });
    html += `</div>`;

    // 光模块
    const totalModules = section.modules.reduce((s, i) => s + i.count, 0);
    html += `<div>`;
    html += `<div class="stat-category flex justify-between">光模块 <span class="stat-total">共 ${totalModules.toLocaleString()} 只</span></div>`;
    section.modules.forEach(mod => {
        html += `<div class="stat-row"><span><span class="text-slate-300">${mod.conn}</span> <span class="stat-model">${mod.model}</span></span><span class="stat-count">${mod.count.toLocaleString()}</span></div>`;
        html += `<div class="font-tiny text-slate-500 pl-1">${mod.desc}</div>`;
    });
    html += `</div>`;

    // 线缆
    const totalCables = section.cables.reduce((s, i) => s + i.count, 0);
    html += `<div>`;
    html += `<div class="stat-category flex justify-between">线缆 <span class="stat-total">共 ${totalCables.toLocaleString()} 根</span></div>`;
    section.cables.forEach(cab => {
        html += `<div class="stat-row"><span><span class="text-slate-300">${cab.conn}</span> <span class="stat-model">${cab.model}</span></span><span class="stat-count">${cab.count.toLocaleString()}</span></div>`;
        html += `<div class="font-tiny text-slate-500 pl-1">${cab.desc}</div>`;
    });
    html += `</div>`;

    return html;
}

/**
