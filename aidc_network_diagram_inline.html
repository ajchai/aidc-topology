<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智算中心参数面网络拓扑生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <style>
/* ==========================================
   CSS 变量体系
   ========================================== */
:root {
    --bg-body: #020617;
    --bg-sidebar: #0f172a;
    --bg-panel: rgba(15, 23, 42, 0.88);
    --bg-input: #0f172a;
    --border-color: #334155;
    --border-light: #475569;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-emerald: #10b981;
    --accent-amber: #fbbf24;
    --accent-orange: #f97316;
    --font-base: 'Inter', 'Microsoft YaHei', sans-serif;
    --font-mono: 'Consolas', 'Monaco', monospace;
    --sidebar-width: 280px;
    --sidebar-collapsed: 44px;
    --panel-width: 320px;
}

/* ==========================================
   基础与滚动条
   ========================================== */
*, *::before, *::after {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: var(--font-base);
    font-size: 12px;
    background: var(--bg-body);
    color: var(--text-primary);
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-sidebar); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ==========================================
   侧边栏
   ========================================== */
#sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-sidebar);
    border-right: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 10;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transition: width 0.3s ease, min-width 0.3s ease;
    overflow: hidden;
    flex-shrink: 0;
}

#sidebar.collapsed {
    width: var(--sidebar-collapsed);
    min-width: var(--sidebar-collapsed);
}

#sidebar .sidebar-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(37,99,235,0.1), transparent);
    pointer-events: none;
}

#sidebar.collapsed .sidebar-content,
#sidebar.collapsed .sidebar-header-text {
    opacity: 0;
    pointer-events: none;
}

.sidebar-content {
    transition: opacity 0.2s ease;
    white-space: nowrap;
}

.sidebar-header-text {
    transition: opacity 0.2s ease;
}

#sidebarToggle {
    position: absolute;
    right: -12px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    background: #1e293b;
    border: 1px solid var(--border-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    color: var(--text-secondary);
    transition: all 0.2s;
}

#sidebarToggle:hover {
    background: #334155;
    color: #e2e8f0;
    border-color: #64748b;
}

/* ==========================================
   主区域与背景网格
   ========================================== */
main {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-body);
}

.bg-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(#1e293b 1px, transparent 1px);
    background-size: 30px 30px;
    opacity: 0.3;
}

/* ==========================================
   工具栏
   ========================================== */
.toolbar {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 20;
    display: flex;
    gap: 8px;
}

.toolbar-group {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 4px;
    display: flex;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

.toolbar button {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.toolbar button:hover {
    background: #334155;
    color: #e2e8f0;
}

.toolbar-sep {
    width: 1px;
    background: var(--border-color);
    margin: 6px 4px;
}

/* ==========================================
   Tooltip
   ========================================== */
#tooltip {
    position: absolute;
    display: none;
    background: rgba(30, 41, 59, 0.95);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-light);
    color: #fff;
    font-size: 12px;
    border-radius: 8px;
    padding: 10px 14px;
    z-index: 30;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: 280px;
    transition: opacity 0.2s;
    line-height: 1.5;
}

/* ==========================================
   SVG 交互样式
   ========================================== */
svg { cursor: grab; }
svg:active { cursor: grabbing; }

.device-group {
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
}

.device-group:hover {
    filter: brightness(1.2);
}

.link-line {
    transition: opacity 0.3s ease, stroke-width 0.3s ease, filter 0.3s ease, stroke 0.3s ease;
}

.link-line.highlight {
    opacity: 1 !important;
    stroke-width: 2.5px !important;
    filter: url(#glow);
    z-index: 10;
}

.svg-dimmed .link-line:not(.highlight) {
    opacity: 0.03 !important;
}

.svg-dimmed .device-group:not(.highlight-device) {
    opacity: 0.3;
    filter: grayscale(0.5);
    transition: opacity 0.3s, filter 0.3s;
}

/* LED 闪烁 */
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

.led-blink {
    animation: blink 2s infinite;
}

/* ==========================================
   侧边栏配置分组
   ========================================== */
.config-group {
    border-left: 3px solid;
    padding-left: 12px;
    margin-bottom: 24px;
}

.config-group.compute {
    border-color: var(--accent-blue);
}

.config-group.storage {
    border-color: var(--accent-emerald);
}

.config-group.network {
    border-color: var(--accent-amber);
}

.config-group-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
}

.config-group.compute .config-group-header {
    color: var(--accent-blue);
}

.config-group.storage .config-group-header {
    color: var(--accent-emerald);
}

.config-group.network .config-group-header {
    color: var(--accent-amber);
}

.config-group-header svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    opacity: 0.85;
}

.config-group-body {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.config-item {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.config-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 0;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 52px;
}

.config-control {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 6px;
}

.config-hint {
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.7;
    margin-top: 2px;
    width: 100%;
    flex-basis: 100%;
}

.config-select,
.config-input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: 5px;
    padding: 5px 8px;
    color: #fff;
    font-size: 11px;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
}

.config-select:focus,
.config-input:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
}

.config-group-result {
    margin-top: 20px;
}

/* ==========================================
   Range 滑块控件
   ========================================== */
.config-range {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border-color);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
}

.config-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-amber);
    border: 2px solid var(--bg-sidebar);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
}

.config-range::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    box-shadow: 0 0 6px rgba(251, 191, 36, 0.5);
}

.config-range::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-amber);
    border: 2px solid var(--bg-sidebar);
    cursor: pointer;
}

.range-value {
    font-size: 10px;
    color: var(--accent-amber);
    font-weight: 600;
    min-width: 28px;
    text-align: right;
    flex-shrink: 0;
    font-family: var(--font-mono);
}

/* ==========================================
   字号体系
   ========================================== */
.font-title   { font-size: 16px; font-weight: 700; }
.font-section { font-size: 13px; font-weight: 600; }
.font-label   { font-size: 12px; font-weight: 500; }
.font-body    { font-size: 12px; }
.font-small   { font-size: 11px; }
.font-tiny    { font-size: 10px; }

/* ==========================================
   统计面板
   ========================================== */
.stat-tab {
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    background: #1e293b;
    color: var(--text-secondary);
}

.stat-tab.active {
    background: #2563eb;
    color: #fff;
}

.stat-tab:not(.active):hover {
    background: #334155;
    color: #e2e8f0;
}

.stat-category {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 0;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 2px;
}

.stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 2px 0;
    font-size: 11px;
}

.stat-model {
    color: #cbd5e1;
    font-family: var(--font-mono);
    font-size: 10px;
}

.stat-count {
    color: #38bdf8;
    font-weight: 700;
    font-size: 12px;
    min-width: 36px;
    text-align: right;
}

.stat-total {
    color: var(--accent-amber);
    font-weight: 700;
    font-size: 11px;
}

/* ==========================================
   浮动统计面板
   ========================================== */
#hwFloatPanel {
    position: absolute;
    top: 60px;
    right: 16px;
    width: var(--panel-width);
    max-height: calc(100vh - 100px);
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(71, 85, 105, 0.6);
    border-radius: 10px;
    z-index: 25;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 1px rgba(148,163,184,0.2);
    transition: width 0.3s ease, max-height 0.3s ease, opacity 0.2s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#hwFloatPanel.collapsed {
    width: 40px;
    max-height: 40px;
}

#hwFloatPanel .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid rgba(71, 85, 105, 0.4);
    flex-shrink: 0;
}

#hwFloatPanel.collapsed .panel-header {
    border-bottom: none;
    padding: 8px;
    justify-content: center;
}

#hwFloatPanel .panel-header .header-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-amber);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
}

#hwFloatPanel.collapsed .header-title span { display: none; }

#hwFloatPanel .panel-header .toggle-btn {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    color: var(--text-secondary);
    transition: all 0.2s;
    flex-shrink: 0;
}

#hwFloatPanel .panel-header .toggle-btn:hover {
    background: #334155;
    color: #e2e8f0;
}

#hwFloatPanel .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
}

#hwFloatPanel.collapsed .panel-body { display: none; }

/* ==========================================
   底部提示条
   ========================================== */
.hint-bar {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    pointer-events: none;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(71, 85, 105, 0.6);
    border-radius: 999px;
    padding: 6px 20px;
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.hint-bar .hint-sep {
    color: var(--border-color);
}

/* ==========================================
   表单控件
   ========================================== */
input[type="number"],
select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 8px 10px;
    color: #fff;
    font-size: 12px;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
}

input[type="number"]:focus,
select:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
}

/* ==========================================
   按钮
   ========================================== */
#btnGenerate {
    margin: 16px 0;
}

.btn-primary {
    width: 100%;
    background: linear-gradient(to right, #2563eb, #4f46e5);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 15px rgba(37,99,235,0.4);
}

.btn-primary:hover {
    background: linear-gradient(to right, #3b82f6, #6366f1);
    box-shadow: 0 0 25px rgba(37,99,235,0.6);
}

/* ==========================================
   工具类
   ========================================== */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.flex-1 { flex: 1; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 4px; }
.gap-2 { gap: 8px; }
.shrink-0 { flex-shrink: 0; }
.relative { position: relative; }
.overflow-hidden { overflow: hidden; }
.overflow-y-auto { overflow-y: auto; }
.hidden { display: none !important; }
.p-2 { padding: 8px; }
.p-4 { padding: 16px; }
.py-2 { padding-top: 8px; padding-bottom: 8px; }
.px-3 { padding-left: 12px; padding-right: 12px; }
.mb-1 { margin-bottom: 4px; }
.mb-2 { margin-bottom: 8px; }
.mt-1 { margin-top: 4px; }
.space-y-1 > * + * { margin-top: 4px; }
.space-y-4 > * + * { margin-top: 16px; }
.text-white { color: #fff; }
.text-slate-200 { color: #e2e8f0; }
.text-slate-300 { color: #cbd5e1; }
.text-slate-400 { color: #94a3b8; }
.text-slate-500 { color: #64748b; }
.text-emerald-400 { color: #34d399; }
.text-cyan-400 { color: #22d3ee; }
.text-amber-400 { color: #fbbf24; }
.bg-slate-800 { background: #1e293b; }
.rounded { border-radius: 6px; }
.rounded-md { border-radius: 6px; }
.rounded-lg { border-radius: 8px; }
.border { border: 1px solid #334155; }
.border-b { border-bottom: 1px solid #1e293b; }

    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen w-screen overflow-hidden flex">

    <!-- 侧边栏-->
    <aside id="sidebar" class="bg-slate-900 border-r border-slate-800 flex flex-col z-10 shadow-2xl shrink-0 relative">
        <div class="sidebar-gradient"></div>

        <!-- 折叠切换按钮 -->
        <div id="sidebarToggle" role="button" aria-label="切换侧边栏>
            <svg id="toggleIcon" xmlns="http://www.w3.org/2000/svg" class="shrink-0" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
            </svg>
        </div>

        <div class="p-4 border-b border-slate-800 relative z-10 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="shrink-0 text-blue-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                <line x1="6" y1="6" x2="6.01" y2="6"></line>
                <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>
            <span class="sidebar-header-text font-title text-white">智算拓扑生成器/span>
        </div>

        <div class="flex-1 overflow-y-auto p-4 relative z-10 sidebar-content">

            <!-- 算力服务器-->
            <div class="config-group compute">
                <div class="config-group-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                        <rect x="9" y="9" width="6" height="6"></rect>
                        <line x1="9" y1="1" x2="9" y2="4"></line>
                        <line x1="15" y1="1" x2="15" y2="4"></line>
                        <line x1="9" y1="20" x2="9" y2="23"></line>
                        <line x1="15" y1="20" x2="15" y2="23"></line>
                        <line x1="20" y1="9" x2="23" y2="9"></line>
                        <line x1="20" y1="14" x2="23" y2="14"></line>
                        <line x1="1" y1="9" x2="4" y2="9"></line>
                        <line x1="1" y1="14" x2="4" y2="14"></line>
                    </svg>
                    <span>算力服务器/span>
                </div>
                <div class="config-group-body">
                    <div class="config-item">
                        <label class="config-label">数量</label>
                        <div class="config-control">
                            <select id="serverCount" class="config-select">
                                <option value="64">64 台</option>
                                <option value="128" selected>128 台</option>
                                <option value="256">256 台</option>
                                <option value="512">512 台</option>
                                <option value="1024">1024 台</option>
                            </select>
                        </div>
                        <p class="config-hint">展示典型结构代表</p>
                    </div>
                    <div class="config-item">
                        <label class="config-label">GPU 规格</label>
                        <div class="config-control">
                            <select id="gpuType" class="config-select">
                                <option value="B300_SXM6" selected>8×B300 SXM6</option>
                                <option value="B200_SXM6">8×B200 SXM6</option>
                                <option value="H200_SXM5">8×H200 SXM5</option>
                            </select>
                        </div>
                    </div>
                    <div class="config-item">
                        <label class="config-label">算力网卡</label>
                        <div class="config-control">
                            <select id="computeNic" class="config-select">
                                <option value="CX8_800G" selected>8×CX8 800G</option>
                                <option value="CX8_2x400G">8×CX8 2×400G</option>
                                <option value="CX7_400G">8×CX7 400G</option>
                            </select>
                        </div>
                    </div>
                    <div class="config-item">
                        <label class="config-label">存储网卡</label>
                        <div class="config-control">
                            <select id="serverStorageNic" class="config-select">
                                <option value="BF3_2x200G">BF3 2×200G</option>
                                <option value="CX7_2x200G">CX7 2×200G</option>
                                <option value="CX7_400G" selected>CX7 400G</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 存储服务器-->
            <div class="config-group storage">
                <div class="config-group-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                    </svg>
                    <span>存储服务器/span>
                </div>
                <div class="config-group-body">
                    <div class="config-item">
                        <label class="config-label">数量</label>
                        <div class="config-control">
                            <input id="storageServerCount" type="number" min="0" max="1024" step="1" value="12" class="config-input" />
                        </div>
                        <p class="config-hint">自动推荐，可手动调整</p>
                    </div>

            architecture: appState.architecture,
            switchModel: appState.switchModel,
            currentStatsTab: appState.currentStatsTab,
            linkStyle: { ...appState.linkStyle },
            viewBox: { ...appState.viewBox },
            settings: { ...appState.settings }
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    } catch (e) {
        console.warn('Failed to save settings:', e);
    }
}

/**
 * 从 localStorage 加载配置
 * @returns {boolean} 是否成功加载
 */
function loadSettings() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;

        const parsed = JSON.parse(raw);
        const defaults = getDefaults();

        // 合并并校验
        const serverCount = Math.min(2048, Math.max(1, Number(parsed.serverCount) || defaults.serverCount));
        const gpuType = ['B300_SXM6', 'B200_SXM6', 'H200_SXM5'].includes(parsed.gpuType)
            ? parsed.gpuType
            : defaults.gpuType;
        const computeNic = VALID_COMPUTE_NIC_TYPES.includes(parsed.computeNic)
            ? parsed.computeNic
            : defaults.computeNic;
        const serverStorageNic = VALID_NIC_TYPES.includes(parsed.serverStorageNic)
            ? parsed.serverStorageNic
            : defaults.serverStorageNic;
        const storageServerCount = Math.min(1024, Math.max(0, Number(parsed.storageServerCount) ?? defaults.storageServerCount));
        const storageNic = VALID_NIC_TYPES.includes(parsed.storageNic)
            ? parsed.storageNic
            : defaults.storageNic;
        const storageNicCount = VALID_NIC_COUNTS.includes(Number(parsed.storageNicCount))
            ? Number(parsed.storageNicCount)
            : defaults.storageNicCount;
        const architecture = VALID_ARCHITECTURES.includes(parsed.architecture)
            ? parsed.architecture
            : defaults.architecture;
        const switchModel = VALID_SWITCH_MODELS.includes(parsed.switchModel)
            ? parsed.switchModel
            : defaults.switchModel;
        const currentStatsTab = ['compute', 'storage'].includes(parsed.currentStatsTab)
            ? parsed.currentStatsTab
            : defaults.currentStatsTab;
        const linkStyle = {
            opacity: Math.min(1, Math.max(0.03, Number(parsed.linkStyle?.opacity) ?? defaults.linkStyle.opacity)),
            strokeWidth: Math.min(4, Math.max(0.5, Number(parsed.linkStyle?.strokeWidth) ?? defaults.linkStyle.strokeWidth))
        };

        updateState({
            serverCount,
            gpuType,
            computeNic,
            serverStorageNic,
            storageServerCount,
            storageNic,
            storageNicCount,
            architecture,
            switchModel,
            currentStatsTab,
            linkStyle,
            viewBox: parsed.viewBox || { ...defaults.viewBox },
            settings: {
                sidebarCollapsed: !!parsed.settings?.sidebarCollapsed,
                statsPanelCollapsed: !!parsed.settings?.statsPanelCollapsed
            }
        });

        return true;
    } catch (e) {
        console.warn('Failed to load settings:', e);
        return false;
    }
}

/**
 * 重置为默认配置
 */
function resetSettings() {
    try {
        localStorage.removeItem(STORAGE_KEY);
    } catch (e) {
        console.warn('Failed to clear settings:', e);
    }

    const defaults = getDefaults();
    updateState({
        serverCount: defaults.serverCount,
        gpuType: defaults.gpuType,
        computeNic: defaults.computeNic,
        serverStorageNic: defaults.serverStorageNic,
        storageServerCount: defaults.storageServerCount,
        storageNic: defaults.storageNic,
        storageNicCount: defaults.storageNicCount,
        architecture: defaults.architecture,
        switchModel: defaults.switchModel,
        currentStatsTab: defaults.currentStatsTab,
        linkStyle: { ...defaults.linkStyle },
        viewBox: { ...defaults.viewBox },
        cachedHardwareData: null,
        cachedServerCount: null,
        settings: { ...defaults.settings }
    });

    // 同步 UI
    const serverInput = document.getElementById('serverCount');
    const gpuSelect = document.getElementById('gpuType');
    const computeNicSelect = document.getElementById('computeNic');
    const serverStorageNicSelect = document.getElementById('serverStorageNic');
    const storageServerCountInput = document.getElementById('storageServerCount');
    const storageNicSelect = document.getElementById('storageNic');
    const storageNicCountSelect = document.getElementById('storageNicCount');
    const architectureSelect = document.getElementById('architecture');

    if (serverInput) serverInput.value = String(defaults.serverCount);
    if (gpuSelect) gpuSelect.value = defaults.gpuType;
    if (computeNicSelect) computeNicSelect.value = defaults.computeNic;
    if (serverStorageNicSelect) serverStorageNicSelect.value = defaults.serverStorageNic;
    if (storageServerCountInput) storageServerCountInput.value = String(defaults.storageServerCount);
    if (storageNicSelect) storageNicSelect.value = defaults.storageNic;
    if (storageNicCountSelect) storageNicCountSelect.value = String(defaults.storageNicCount);
    if (architectureSelect) architectureSelect.value = defaults.architecture;

    const switchModelSelect = document.getElementById('switchModel');
    if (switchModelSelect) switchModelSelect.value = defaults.switchModel;

    // 重置连线样式控件
    const linkOpacityRange = document.getElementById('linkOpacity');
    const linkOpacityVal = document.getElementById('linkOpacityVal');
    const linkStrokeWidthRange = document.getElementById('linkStrokeWidth');
    const linkStrokeWidthVal = document.getElementById('linkStrokeWidthVal');

    if (linkOpacityRange) linkOpacityRange.value = String(defaults.linkStyle.opacity);
    if (linkOpacityVal) linkOpacityVal.textContent = Math.round(defaults.linkStyle.opacity * 100) + '%';
    if (linkStrokeWidthRange) linkStrokeWidthRange.value = String(defaults.linkStyle.strokeWidth);
    if (linkStrokeWidthVal) linkStrokeWidthVal.textContent = defaults.linkStyle.strokeWidth.toFixed(1);

    // 重置面板状态
    const sidebar = document.getElementById('sidebar');
    const hwPanel = document.getElementById('hwFloatPanel');
    if (sidebar) sidebar.classList.remove('collapsed');
    if (hwPanel) hwPanel.classList.remove('collapsed');

    // 触发重新生成
    return defaults;
}

/**
 * 绑定重置按钮
 * @param {Function} onReset - 重置后的回调
 */
function bindResetButton(onReset) {
    const btn = document.getElementById('btnResetSettings');
    if (!btn) return;

    btn.addEventListener('click', () => {
        if (confirm('确定要重置为默认配置吗？')) {
