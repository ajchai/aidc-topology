    const tabCompute = document.getElementById('tabCompute');
    const tabStorage = document.getElementById('tabStorage');

    if (sidebarToggle) sidebarToggle.addEventListener('click', toggleSidebar);
    if (statsHeader) statsHeader.addEventListener('click', toggleStatsPanel);
    if (tabCompute) tabCompute.addEventListener('click', () => switchStatsTab('compute'));
    if (tabStorage) tabStorage.addEventListener('click', () => switchStatsTab('storage'));
}

/* ===== js/export.js ===== */

/**
 * export.js - 导出功能
 * 支持 SVG 和 PNG 导出
 */

/**
 * 导出所需的关键 CSS 规则（嵌入 SVG 以确保 canvas 渲染正确）
 */
const EXPORT_CSS = `
    .link-line { opacity: 0.15; }
    .device-group { cursor: pointer; }
    .led-blink { animation: none; opacity: 1; }
    text { font-family: 'Inter','Microsoft YaHei',sans-serif; }
`;

/**
 * 触发文件下载
 * @param {string} filename
 * @param {Blob|string} content
 */
function download(filename, content) {
    const a = document.createElement('a');
    if (content instanceof Blob) {
        a.href = URL.createObjectURL(content);
    } else {
        a.href = content;
    }
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
        document.body.removeChild(a);
        if (content instanceof Blob) URL.revokeObjectURL(a.href);
    }, 100);
}

/**
 * 获取带内联样式的 SVG 字符串
 * @returns {string}
 */
function getStyledSVGString() {
    const svg = document.getElementById('topologySvg');
    if (!svg) return '';

    // 克隆 SVG 以便修改
    const clone = svg.cloneNode(true);

    // 嵌入导出样式
    const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
    styleEl.textContent = EXPORT_CSS;
    clone.insertBefore(styleEl, clone.firstChild);

    // 确保命名空间
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

    // 设置背景色
    clone.style.background = '#020617';

    return new XMLSerializer().serializeToString(clone);
}

/**
 * 导出 SVG
 */
function exportSVG() {
    const svgStr = getStyledSVGString();
    if (!svgStr) {
        alert('SVG 内容为空，无法导出');
        return;
    }
    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
    download(`拓扑图_${timestamp}.svg`, blob);
}

/**
 * 导出 PNG
 */
function exportPNG() {
    const svgStr = getStyledSVGString();
    if (!svgStr) {
        alert('SVG 内容为空，无法导出');
        return;
    }

    const svg = document.getElementById('topologySvg');
    const bbox = svg.getBBox ? svg.getBBox() : { width: 2800, height: 1600 };
    const width = Math.max(bbox.width, 2800);
    const height = Math.max(bbox.height, 1600);

    // 创建 canvas
    const canvas = document.createElement('canvas');
    const scale = 2; // 2x 高清导出
    canvas.width = width * scale;
    canvas.height = height * scale;
    const ctx = canvas.getContext('2d');
    if (!ctx) {
        alert('Canvas 初始化失败');
        return;
    }

    // 填充背景
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 绘制 SVG
    const img = new Image();
    const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);

        canvas.toBlob(blob => {
            if (!blob) {
                alert('PNG 生成失败');
                return;
            }
            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            download(`拓扑图_${timestamp}.png`, blob);
        }, 'image/png');
    };

    img.onerror = () => {
        URL.revokeObjectURL(url);
        alert('SVG 渲染失败，无法导出 PNG');
    };

    img.src = url;
}

/**
 * 绑定导出按钮事件
 */
function bindExportEvents() {
    const btnSvg = document.getElementById('btnExportSvg');
    const btnPng = document.getElementById('btnExportPng');

    if (btnSvg) btnSvg.addEventListener('click', exportSVG);
    if (btnPng) btnPng.addEventListener('click', exportPNG);
}

/* ===== js/app.js ===== */

/**
 * app.js - 主入口
 * 整合所有模块，完成初始化与事件绑定
 */

/** 是否正在生成中 */
let isGenerating = false;

/**
 * 校验并规范化 serverCount
 * @param {string|number} value
 * @returns {number}
 */
const VALID_SERVER_COUNTS = [64, 128, 256, 512, 1024];

function normalizeServerCount(value) {
    const num = parseInt(String(value), 10);
    if (VALID_SERVER_COUNTS.includes(num)) return num;
    return 128; // 默认值
}

/**
 * 主生成函数
 */
async function generateTopology() {
    if (isGenerating) return;
    isGenerating = true;

    try {
        const serverCountInput = document.getElementById('serverCount');
        const gpuSelect = document.getElementById('gpuType');

        if (!serverCountInput || !gpuSelect) {
            console.error('Required DOM elements not found');
            return;
        }

        const rawCount = serverCountInput.value;
        const serverCount = normalizeServerCount(rawCount);
        const gpuType = gpuSelect.value;
        const gpuSpec = GPU_SPECS[gpuType] || GPU_SPECS.B300_8;
        const railCount = gpuSpec.railCount;

        // 同步输入框（如果输入了非法值）
        if (String(serverCount) !== String(rawCount)) {
            serverCountInput.value = String(serverCount);
        }

        // 更新状态
        updateState({
            serverCount,
            gpuType,
            railCount,
            cachedHardwareData: null
        });

        // 计算硬件
        const hwData = calcHardware(serverCount, gpuType);
        updateState({ cachedHardwareData: hwData, cachedServerCount: serverCount });

        // 计算布局
        const layout = calcLayout(serverCount, gpuType);

        // 渲染
        renderTopology(layout, serverCount, railCount);

        // 更新统计面板
        renderSummary(serverCount, gpuType, railCount, hwData);

        // 重置高亮
        resetHighlights();

        // 适应屏幕
        requestAnimationFrame(() => {
            resetZoom();
        });

        // 保存配置
        debouncedSave();

    } catch (err) {
        console.error('generateTopology failed:', err);
        const summaryPanel = document.getElementById('summaryPanel');
        if (summaryPanel) {
            summaryPanel.innerHTML = `<div class="p-2 text-red-400">生成失败: ${err.message}</div>`;
        }
    } finally {
        isGenerating = false;
    }
}

/**
 * 绑定工具栏事件
 */
function bindToolbarEvents() {
    const btnGenerate = document.getElementById('btnGenerate');
    const btnResetZoom = document.getElementById('btnResetZoom');
    const btnZoomIn = document.getElementById('btnZoomIn');
    const btnZoomOut = document.getElementById('btnZoomOut');

    if (btnGenerate) btnGenerate.addEventListener('click', generateTopology);
    if (btnResetZoom) btnResetZoom.addEventListener('click', resetZoom);
    if (btnZoomIn) btnZoomIn.addEventListener('click', zoomIn);
    if (btnZoomOut) btnZoomOut.addEventListener('click', zoomOut);
}

/**
 * 绑定输入框事件（回车触发生成）
 */
function bindInputEvents() {
    const serverCountSelect = document.getElementById('serverCount');
    const gpuSelect = document.getElementById('gpuType');

    if (serverCountSelect) {
        serverCountSelect.addEventListener('change', generateTopology);
    }

    if (gpuSelect) {
        gpuSelect.addEventListener('change', generateTopology);
    }
}

/**
 * 同步 UI 到状态（加载配置后）
 */
function syncUIFromState() {
    const serverCountInput = document.getElementById('serverCount');
    const gpuSelect = document.getElementById('gpuType');
    const sidebar = document.getElementById('sidebar');
    const hwPanel = document.getElementById('hwFloatPanel');

    if (serverCountInput) serverCountInput.value = String(appState.serverCount);
    if (gpuSelect) gpuSelect.value = appState.gpuType;

    // 恢复面板折叠状态
    const icon = document.getElementById('toggleIcon');
    if (sidebar) {
        sidebar.classList.toggle('collapsed', appState.settings.sidebarCollapsed);
    }
    if (icon) {
        if (appState.settings.sidebarCollapsed) {
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>';
        } else {
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>';
        }
    }
    if (hwPanel) {
        hwPanel.classList.toggle('collapsed', appState.settings.statsPanelCollapsed);
    }

    // 恢复标签状态
    const tab = appState.currentStatsTab;
    document.querySelectorAll('.stat-tab').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
    });
}

/**
 * 初始化
 */
function init() {
    // 1. 加载持久化配置
    const loaded = loadSettings();

    // 2. 同步 UI
    syncUIFromState();

    // 3. 绑定事件
    bindToolbarEvents();
    bindInputEvents();
    bindInteractions();
    bindStatsPanelEvents();
    bindExportEvents();
    bindResetButton(() => {
        clearHardwareCache();
        generateTopology();
    });

    // 4. 初始生成
    generateTopology();

    // 5. 窗口 resize 处理（简单防抖）
    let resizeTimer = null;
    window.addEventListener('resize', () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            // 可选：resize 时重置 zoom
            // resetZoom();
        }, 300);
    });

    // 6. 页面卸载前保存
    window.addEventListener('beforeunload', () => {
        debouncedSave();
    });

    console.log('[AIDCTopology] Initialized', loaded ? '(settings loaded)' : '(defaults)');
}

// DOMReady 后启动
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
