<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智算中心参数面网络拓扑生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; font-size: 12px; }
        
        svg { cursor: grab; }
        svg:active { cursor: grabbing; }
        
        .device-group { cursor: pointer; transition: transform 0.2s; }
        .device-group:hover { filter: brightness(1.2); }
        
        /* 连线基础样式与过渡动画 */
        .link-line {
            transition: opacity 0.3s ease, stroke-width 0.3s ease, filter 0.3s ease, stroke 0.3s ease;
            opacity: 0.15;
        }
        
        /* 高亮时的状态 */
        .link-line.highlight {
            opacity: 1 !important;
            stroke-width: 2.5px !important;
            filter: url(#glow);
            z-index: 10;
        }
        
        /* 其他未被高亮的线进一步变暗 */
        .svg-dimmed .link-line:not(.highlight) {
            opacity: 0.03 !important;
        }
        .svg-dimmed .device-group:not(.highlight-device) {
            opacity: 0.3;
            filter: grayscale(0.5);
            transition: opacity 0.3s, filter 0.3s;
        }

        /* 硬件指示灯动画 */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .led-blink { animation: blink 2s infinite; }

        /* ===== 字号统一体系 ===== */
        .font-title { font-size: 16px; font-weight: 700; }
        .font-section { font-size: 13px; font-weight: 600; }
        .font-label { font-size: 12px; font-weight: 500; }
        .font-body { font-size: 12px; }
        .font-small { font-size: 11px; }
        .font-tiny { font-size: 10px; }

        /* 硬件统计表样式 */
        .stat-tab { padding: 3px 10px; font-size: 11px; font-weight: 600; border-radius: 5px; cursor: pointer; transition: all 0.2s; }
        .stat-tab.active { background: #2563eb; color: #fff; }
        .stat-tab:not(.active) { background: #1e293b; color: #94a3b8; }
        .stat-tab:not(.active):hover { background: #334155; color: #e2e8f0; }
        .stat-category { font-size: 11px; color: #94a3b8; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 3px 0; border-bottom: 1px solid #334155; margin-bottom: 2px; }
        .stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 2px 0; font-size: 11px; }
        .stat-row .stat-model { color: #cbd5e1; font-family: 'Consolas', 'Monaco', monospace; font-size: 10px; }
        .stat-row .stat-count { color: #38bdf8; font-weight: 700; font-size: 12px; min-width: 36px; text-align: right; }
        .stat-total { color: #fbbf24; font-weight: 700; font-size: 11px; }

        /* ===== 侧边栏折叠样式 ===== */
        #sidebar {
            width: 280px;
            min-width: 280px;
            transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease;
            overflow: hidden;
        }
        #sidebar.collapsed {
            width: 44px;
            min-width: 44px;
        }
        #sidebar.collapsed .sidebar-content {
            opacity: 0;
            pointer-events: none;
        }
        #sidebar.collapsed .sidebar-header-text {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }
        .sidebar-content {
            transition: opacity 0.2s ease;
            white-space: nowrap;
        }
        .sidebar-header-text {
            transition: opacity 0.2s ease, width 0.2s ease;
        }
        #sidebarToggle {
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            color: #94a3b8;
            transition: all 0.2s;
        }
        #sidebarToggle:hover {
            background: #334155;
            color: #e2e8f0;
            border-color: #64748b;
        }

        /* 浮动统计面板 */
        #hwFloatPanel {
            position: absolute;
            top: 60px;
            right: 16px;
            width: 320px;
            max-height: calc(100vh - 100px);
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(71, 85, 105, 0.6);
            border-radius: 10px;
            z-index: 25;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 1px rgba(148,163,184,0.2);
            transition: width 0.3s ease, max-height 0.3s ease, opacity 0.2s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #hwFloatPanel.collapsed {
            width: 40px;
            max-height: 40px;
        }
        #hwFloatPanel .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(71, 85, 105, 0.4);
            flex-shrink: 0;
        }
        #hwFloatPanel.collapsed .panel-header {
            border-bottom: none;
            padding: 8px;
            justify-content: center;
        }
        #hwFloatPanel .panel-header .header-title {
            font-size: 12px;
            font-weight: 700;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        #hwFloatPanel.collapsed .header-title span { display: none; }
        #hwFloatPanel .panel-header .toggle-btn {
            width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 5px;
            color: #94a3b8;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        #hwFloatPanel .panel-header .toggle-btn:hover { background: #334155; color: #e2e8f0; }
        #hwFloatPanel .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }
        #hwFloatPanel.collapsed .panel-body { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen w-screen overflow-hidden flex">

    <aside id="sidebar" class="bg-slate-900 border-r border-slate-800 flex flex-col z-10 shadow-2xl shrink-0 relative">

                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                <line x1="6" y1="6" x2="6.01" y2="6"></line>

            </svg>

        <div class="flex-1 overflow-y-auto p-4 space-y-4 relative z-10 sidebar-content">

                <label class="block font-label text-slate-300 mb-1.5">算力服务器数量</label>

            <div>

                <select id="gpuType" class="w-full bg-slate-950 border border-slate-700 rounded-md p-2 text-white font-body focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                    <option value="A800_4">NVIDIA A800 (4-Rail)</option>
                    <option value="H800_8">NVIDIA H800 (8-Rail)</option>
                    <option value="B300_8" selected>NVIDIA B300 (8-Rail, 8x 800G)</option>

            <div>
                <label class="block font-label text-slate-300 mb-1.5">组网架构</label>
                <select id="architecture" class="w-full bg-slate-950 border border-slate-700 rounded-md p-2 text-white font-body focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                    <option value="ruijie-dual" selected>锐捷虚拟双平面 (去堆叠Bond/VRF逃生)</option>
                </select>
            </div>
            
            <button onclick="generateTopology()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-section py-2.5 px-4 rounded-md transition-all shadow-[0_0_15px_rgba(37,99,235,0.4)] hover:shadow-[0_0_25px_rgba(37,99,235,0.6)]">
                重新生成拓扑

            <!-- 硬件测算结果 -->
            <div>
                <h3 class="font-section text-slate-200 mb-2 flex items-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                    硬件测算结果
                </h3>
                <div id="summaryPanel" class="font-small text-slate-400 space-y-1.5 leading-relaxed">
                    正在初始化...
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 relative overflow-hidden bg-slate-950">
        <!-- 背景网格 -->
        <div class="absolute inset-0 pointer-events-none" style="background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; opacity: 0.3;"></div>

        <div class="absolute top-4 right-4 z-20 flex gap-2">
            <div class="bg-slate-900/80 backdrop-blur border border-slate-700 rounded-lg p-1 shadow-2xl flex">
                <button onclick="resetZoom()" class="hover:bg-slate-700 p-2 rounded-md text-slate-300 transition-colors" title="适应屏幕">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                </button>
                <div class="w-px bg-slate-700 my-1.5 mx-0.5"></div>
                <button onclick="zoomIn()" class="hover:bg-slate-700 p-2 rounded-md text-slate-300 transition-colors" title="放大">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>

                </button>

        <div id="tooltip" class="absolute hidden bg-slate-800/95 backdrop-blur border border-slate-600 text-white font-small rounded-lg p-2.5 z-30 pointer-events-none shadow-2xl max-w-xs transition-opacity duration-200"></div>

        <div id="svgContainer" class="w-full h-full relative cursor-grab">
            <svg id="topologySvg" class="w-full h-full" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <!-- 阴影效果 -->
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">

                    <!-- Plane 1 (Blue) 设备渐变 -->

                    <!-- Plane 2 (Orange) 设备渐变 -->
                    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ea580c"/>
                        <stop offset="100%" stop-color="#7c2d12"/>
                    </linearGradient>

                    <!-- Server (Dark Steel) 设备渐变 -->
                    <linearGradient id="grad-server" x1="0%" y1="0%" x2="100%" y2="100%">

                        <stop offset="100%" stop-color="#0f172a"/>

                    <!-- LACP 聚合标记图案 -->

                    </pattern>

                <g id="svgGroup"></g>
            </svg>
        </div>

        <!-- 底部操作提示浮动条 -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-20 pointer-events-none">
            <div class="bg-slate-900/70 backdrop-blur border border-slate-700/60 rounded-full px-5 py-1.5 font-small text-slate-400 flex items-center gap-4 shadow-lg">
                <span class="flex items-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"/></svg>悬停设备查看链路</span>
                <span class="text-slate-600">|</span>
                <span class="flex items-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11"/></svg>滚轮缩放</span>
                <span class="text-slate-600">|</span>
                <span class="flex items-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>拖拽平移</span>
            </div>
        </div>

        <!-- 网络设备统计信息浮动面板 -->
        <div id="hardwareStatsContainer" class="hidden">
            <div id="hwFloatPanel">

                    <div class="header-title">

                            <path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11.707 4.707a1 1 0 00-1.414-1.414L10 9.586 8.707 8.293a1 1 0 00-1.414 0l-2 2a1 1 0 101.414 1.414L8 10.414l1.293 1.293a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />

            </div>

    <script>
        // ==========================================
        // B300 硬件统计计算引擎 (移植自 b300-network-calc skill)
        // ==========================================

        // 辅助函数: 向上取整到最近的2的幂
        function nextPowerOf2(n) {
            if (n <= 0) return 1;
            return Math.pow(2, Math.ceil(Math.log2(n)));
        }

        // B300 硬件统计计算
        function calcB300Hardware(serverCount) {
            const result = { compute: null, storage: null };

            // ===== 计算网 =====
            // B300: 8x CX8 NIC (800G), 每个800G split为2x400G = 16条下行链路
            const downlinksPerServer = 16; // 8 NIC * 2 (800G→2*400G)
            const leafDownlinkPorts = 64;  // RG-S6990-128QC2XS: 64下行400G端口
            const serversPerLeaf = leafDownlinkPorts / downlinksPerServer; // 4

            // Leaf 数量
            let leafSwitches = Math.ceil(serverCount / serversPerLeaf);
            if (leafSwitches % 2 !== 0) leafSwitches += 1; // 凑偶

            // Spine / Core 数量
            let spineSwitches = 0;
            let coreSwitches = 0;
            let networkType = '';

            if (serverCount <= 512) {
                // Two-Tier
                spineSwitches = nextPowerOf2(Math.ceil(leafSwitches / 2));
                networkType = 'Two-Tier (Leaf-Spine)';
            } else {
                // Three-Tier
                spineSwitches = leafSwitches; // 1:1
                coreSwitches = nextPowerOf2(Math.ceil(spineSwitches / 2));
                networkType = 'Three-Tier (Leaf-Spine-Core)';
            }

            // 计算网交换机列表
            const computeSwitches = [];
            computeSwitches.push({ role: 'Leaf', model: 'RG-S6990-128QC2XS', count: leafSwitches, desc: `${leafDownlinkPorts}下行+${leafDownlinkPorts}上行 400G` });
            computeSwitches.push({ role: 'Spine', model: 'RG-S6990-128QC2XS', count: spineSwitches, desc: `${leafDownlinkPorts * 2} 400G全互联` });
            if (coreSwitches > 0) {
                computeSwitches.push({ role: 'Core', model: 'RG-S6990-128QC2XS', count: coreSwitches, desc: '核心层汇聚' });
            }

            // 计算网光模块 (简化口径 Caliber B)
            const computeModules = [];
            // Spine↔Leaf: 双端计算, 400G-Q112-DR4-L
            const spineLeafModuleCount = leafSwitches * leafDownlinkPorts * 2;
            computeModules.push({ conn: 'Spine↔Leaf', model: '400G-Q112-DR4-L', count: spineLeafModuleCount, desc: '双端, 单模' });
            // Server↔Leaf: 交换机侧, 400G-Q112-VR4-MM850
            const serverLeafModuleCount = serverCount * downlinksPerServer;
            computeModules.push({ conn: 'Server↔Leaf', model: '400G-Q112-VR4-MM850', count: serverLeafModuleCount, desc: '交换机侧, 多模' });
            // Server↔Leaf: 服务器侧, 800G-OSFP-RHS-2VR4-MM850 (800G分支模块, 每个拆为2×400G)
            const serverSideModuleCount = serverCount * 8; // 每台B300配8个800G分支模块
            computeModules.push({ conn: 'Server↔Leaf', model: '800G-OSFP-RHS-2VR4-MM850', count: serverSideModuleCount, desc: '服务器侧, 多模分支' });

            // 计算网线缆
            const computeCables = [];
            // Spine↔Leaf: MPO16-MPO16-SM-50M
            computeCables.push({ conn: 'Spine↔Leaf', model: 'MPO16-MPO16-SM-50M', count: leafSwitches * leafDownlinkPorts, desc: '单模, 50m' });
            // Server↔Leaf: MPO-MPO-OM4-30M
            computeCables.push({ conn: 'Server↔Leaf', model: 'MPO-MPO-OM4-30M', count: serverCount * downlinksPerServer, desc: '多模OM4, 30m' });

            // POD 划分
            let podCount = 1;
            let serversPerPod = serverCount;
            if (serverCount <= 32) { podCount = 1; serversPerPod = serverCount; }
            else if (serverCount <= 64) { podCount = 2; serversPerPod = 32; }
            else if (serverCount <= 128) { podCount = 2; serversPerPod = 64; } // 双平面
            else if (serverCount <= 256) { podCount = Math.ceil(serverCount / 32); serversPerPod = 32; }
            else { podCount = Math.ceil(serverCount / 64); serversPerPod = 64; }

            result.compute = {
                switches: computeSwitches,
                modules: computeModules,
                cables: computeCables,
                meta: {
                    networkType,
                    podCount,
                    serversPerPod,
                    leafSwitches,
                    spineSwitches,
                    coreSwitches
                }
            };

            // ===== 存储网 (serverCount >= 32) =====
            if (serverCount >= 32) {
                // 存储节点: GPU:Storage = 1024:96
                const storageNodes = Math.ceil(serverCount * 96 / 1024);
                // 下行总端口: 每台B300 1个400G存储端口 + 每台存储节点 2个400G存储端口
                const totalStorageDownlink = serverCount * 1 + storageNodes * 2;

                // 存储 Leaf
                let storageLeaf = Math.ceil(totalStorageDownlink / leafDownlinkPorts);
                if (storageLeaf % 2 !== 0) storageLeaf += 1;

                // 存储 Spine (最少2台)
                let storageSpine = Math.max(2, nextPowerOf2(Math.ceil(storageLeaf / 2)));

                const storageSwitches = [];
                storageSwitches.push({ role: 'Leaf', model: 'RG-S6990-128QC2XS', count: storageLeaf, desc: `${leafDownlinkPorts}下行+${leafDownlinkPorts}上行 400G` });
                storageSwitches.push({ role: 'Spine', model: 'RG-S6990-128QC2XS', count: storageSpine, desc: `${leafDownlinkPorts * 2} 400G全互联` });

                // 存储光模块
                const storageModules = [];
                const storageLeafSpineModuleCount = storageLeaf * leafDownlinkPorts * 2;
                storageModules.push({ conn: 'Spine↔Leaf', model: '400G-Q112-DR4-L', count: storageLeafSpineModuleCount, desc: '双端, 单模' });
                storageModules.push({ conn: 'Server↔Leaf', model: '400G-Q112-VR4-MM850', count: totalStorageDownlink, desc: '交换机侧, 多模' });

                // 存储线缆
                const storageCables = [];
                storageCables.push({ conn: 'Spine↔Leaf', model: 'MPO-MPO-OM4-50M', count: storageLeaf * leafDownlinkPorts, desc: '多模OM4, 50m' });
                storageCables.push({ conn: 'Server↔Leaf', model: 'MPO-MPO-OM4-30M', count: totalStorageDownlink, desc: '多模OM4, 30m' });

                result.storage = {
                    switches: storageSwitches,
                    modules: storageModules,
                    cables: storageCables,
                    meta: {
                        storageNodes,
                        totalStorageDownlink,
                        storageLeaf,
                        storageSpine
                    }
                };
            }

            return result;
        }

        // ==========================================
        // 原有拓扑生成逻辑

        const svgElement = document.getElementById('topologySvg');
        const svgGroup = document.getElementById('svgGroup');
        const svgContainer = document.getElementById('svgContainer');
        const tooltip = document.getElementById('tooltip');
        
        let viewBox = { x: 0, y: 0, w: 2800, h: 1600 };
        let isDragging = false;
        let startPoint = { x: 0, y: 0 };
        const zoomFactor = 1.15;
        
        function updateViewBox() {
            svgElement.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
        }

        function resetZoom() {
            const bbox = svgGroup.getBBox();
            if(bbox.width === 0) return;
            const padding = 120;
            viewBox = {
                x: bbox.x - padding,
                y: bbox.y - padding,
                w: bbox.width + padding * 2,
                h: bbox.height + padding * 2
            };
            updateViewBox();
        }

        function zoomIn() { scaleView(1 / zoomFactor); }
        function zoomOut() { scaleView(zoomFactor); }

        function scaleView(factor) {
            const centerX = viewBox.x + viewBox.w / 2;
            const centerY = viewBox.y + viewBox.h / 2;
            viewBox.w *= factor; viewBox.h *= factor;
            viewBox.x = centerX - viewBox.w / 2;
            viewBox.y = centerY - viewBox.h / 2;
            updateViewBox();
        }

        /* 鼠标拖拽平移与滚轮缩放 */
        svgContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const mouseX = e.offsetX; const mouseY = e.offsetY;
            const rect = svgContainer.getBoundingClientRect();
            const viewX = viewBox.x + (mouseX / rect.width) * viewBox.w;
            const viewY = viewBox.y + (mouseY / rect.height) * viewBox.h;

            const factor = e.deltaY < 0 ? (1 / zoomFactor) : zoomFactor;
            viewBox.w *= factor; viewBox.h *= factor;
            viewBox.x = viewX - (mouseX / rect.width) * viewBox.w;
            viewBox.y = viewY - (mouseY / rect.height) * viewBox.h;
            updateViewBox();
        });

        svgContainer.addEventListener('mousedown', (e) => {
            isDragging = true; svgContainer.style.cursor = 'grabbing';
            startPoint = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startPoint.x;
            const dy = e.clientY - startPoint.y;
            const rect = svgContainer.getBoundingClientRect();
            viewBox.x -= dx * (viewBox.w / rect.width);
            viewBox.y -= dy * (viewBox.h / rect.height);
            startPoint = { x: e.clientX, y: e.clientY };
            updateViewBox();
        });

        window.addEventListener('mouseup', () => { 
            isDragging = false; 
            svgContainer.style.cursor = 'grab';
        });

        function generateTopology() {
            const serverCount = parseInt(document.getElementById('serverCount').value);
            const gpuSetting = document.getElementById('gpuType').value;
            const parts = gpuSetting.split('_');
            const gpuType = parts[0];
            const railCount = parseInt(parts[1]); // 网卡数量/轨道数

            let bgHtml = '';
            let linesHtml = '';
            let nodesHtml = '';

            const blueColor = "#3b82f6";
            const orangeColor = "#f97316";
            
            // 架构常量 (基于截图：64台一个POD)
            const serversPerPod = 64;
            const podCount = Math.ceil(serverCount / serversPerPod);
            const leafPairsPerPod = 8; // 固定8对Leaf

            // 布局坐标
            const spineY = 150;
            const leafY = 480;
            const serverY = 880;
            const canvasWidth = Math.max(2800, podCount * 1400);

            // ==========================================
            // 1. 绘制 Spine 层 (Virtual Dual Plane)
            //    物理一台Spine，虚拟出VRF1/VRF2双平面
            //    VRF之间通过虚拟逃生路径互联（不占用物理端口）
            // ==========================================
            const spineBoxWidth = canvasWidth - 400;
            bgHtml += `<rect x="200" y="${spineY - 80}" width="${spineBoxWidth}" height="180" fill="rgba(15, 23, 42, 0.5)" stroke="#475569" stroke-width="2" stroke-dasharray="6,4" rx="12"></rect>`;
            bgHtml += `<text x="230" y="${spineY - 52}" font-family="'Inter','Microsoft YaHei',sans-serif" font-size="16" fill="#94a3b8" font-weight="bold">核心层 (Spine) — 物理单机·虚拟双平面</text>`;
            // VRF逃生图例
            bgHtml += `<line x1="${spineBoxWidth - 40}" y1="${spineY - 68}" x2="${spineBoxWidth - 20}" y2="${spineY - 68}" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"></line>`;
            bgHtml += `<text x="${spineBoxWidth - 15}" y="${spineY - 64}" font-size="9" fill="#fbbf24" font-weight="600">= VRF虚拟逃生</text>`;

            const visualSpines = 6; 
            const spineSpacing = spineBoxWidth / (visualSpines + 1);
            let spineNodes = [];

            const spineW = 200;  // 物理机箱宽度
            const spineH = 85;  // 物理机箱高度

            for (let i = 0; i < visualSpines; i++) {
                const cx = 200 + spineSpacing * (i + 1);
                const isLast = (i === visualSpines - 1);
                const idx = isLast ? "64" : (i + 1);

                if (i === visualSpines - 2) {
                    nodesHtml += `<text x="${cx}" y="${spineY + 20}" font-size="16" fill="#475569" text-anchor="middle" font-weight="bold">......</text>`;
                    continue;
                }

                // 记录连线坐标 (VRF1/VRF2底部中心)
                const pad = 4, gapW = 10;
                const vrfW = (spineW - pad * 2 - gapW) / 2;
                spineNodes.push({ id: idx, p1x: cx - 50, p2x: cx + 50, y: spineY - 25 + spineH });

                // 绘制虚拟双平面 Spine (一台物理机箱含VRF1/VRF2)
                nodesHtml += createVirtualSpine(
                    cx - spineW / 2, spineY - 25, spineW, spineH,
                    `Spine-${idx}`, `spine_${idx}`,
                    `<div class="mb-1 font-semibold">Spine-${idx}</div>物理交换机 (虚拟双平面)<br>平面1: VRF1 (蓝色)<br>平面2: VRF2 (橙色)<br>VRF逃生: 虚拟路径 (不占物理端口)<br>800G 端口`
                );
            }

            // ==========================================
            // 2. 绘制 Leaf 层 和 Server 层
            // ==========================================
            const podWidth = spineBoxWidth / podCount;

            for (let p = 0; p < podCount; p++) {
                const podX = 200 + p * podWidth;
                
                // POD 背景框
                bgHtml += `<rect x="${podX + 20}" y="${leafY - 110}" width="${podWidth - 40}" height="${serverY - leafY + 250}" fill="rgba(30, 41, 59, 0.2)" stroke="#334155" stroke-width="1" rx="16"></rect>`;
                bgHtml += `<text x="${podX + 50}" y="${leafY - 70}" font-family="'Inter','Microsoft YaHei',sans-serif" font-size="16" fill="#cbd5e1" font-weight="bold">POD ${p+1}</text>`;
                bgHtml += `<text x="${podX + 50}" y="${leafY - 48}" font-family="'Inter','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">包含 16台 Leaf, 下联 64台 算力节点</text>`;

                // Leaf 层 (压缩显示: 仅展示第1组、第2组、省略符、最后一组)
                let leafNodes = [];
                const visualLeafPositions = [];
                if (leafPairsPerPod <= 3) {
                    for (let i = 1; i <= leafPairsPerPod; i++) visualLeafPositions.push({ type: 'switch', groupIdx: i });
                } else {
                    visualLeafPositions.push({ type: 'switch', groupIdx: 1 });
                    visualLeafPositions.push({ type: 'switch', groupIdx: 2 });
                    visualLeafPositions.push({ type: 'gap', count: leafPairsPerPod - 3 });
                    visualLeafPositions.push({ type: 'switch', groupIdx: leafPairsPerPod });
                }
                const leafVisualCount = visualLeafPositions.length;
                const leafSpacing = (podWidth - 100) / leafVisualCount;

                // 记录可见的 leaf group id 集合, 用于服务器连线过滤
                const visibleLeafGroupIds = new Set(visualLeafPositions.filter(v => v.type === 'switch').map(v => v.groupIdx));

                for (let vi = 0; vi < leafVisualCount; vi++) {
                    const cx = podX + 50 + leafSpacing * (vi + 0.5);
                    const pos = visualLeafPositions[vi];

                    if (pos.type === 'gap') {
                        // 绘制省略占位符 (带虚线边框)
                        nodesHtml += `<rect x="${cx-55}" y="${leafY+5}" width="110" height="40" rx="8" fill="rgba(15,23,42,0.4)" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"></rect>`;
                        nodesHtml += `<text x="${cx}" y="${leafY+30}" font-size="13" fill="#64748b" font-weight="bold" text-anchor="middle">← x${pos.count} →</text>`;
                        continue;
                    }

                    const idx = pos.groupIdx;
                    const l1Id = `l1_${p}_${idx}`;
                    const l2Id = `l2_${p}_${idx}`;

                    // 两台Leaf交换机间距20px (cx-80到cx+10)
                    leafNodes.push({ id: idx, p1x: cx - 45, p2x: cx + 45, y: leafY + 50 });

                    // 绘制交换机 (L1左移10px, L2右移10px, 间距20px)
                    nodesHtml += createSwitch(cx - 80, leafY, 70, 50, 'blue', `L1-${idx}`, l1Id, `<b>L1-${idx}</b><br>所在 POD: ${p+1}<br>角色: Leaf (平面1)<br>上行: 64<br>下行: 64`);
                    nodesHtml += createSwitch(cx + 10, leafY, 70, 50, 'orange', `L2-${idx}`, l2Id, `<b>L2-${idx}</b><br>所在 POD: ${p+1}<br>角色: Leaf (平面2)<br>上行: 64<br>下行: 64`);

                    // 绘制到 Spine 的线 (局部展示以防太乱)
                    if (p === 0 && idx === 1) {
                        nodesHtml += `<text x="${cx - 90}" y="${(leafY + spineY)/2}" font-size="11" fill="#94a3b8" transform="rotate(-30, ${cx - 90}, ${(leafY + spineY)/2})">全互联收敛网络</text>`;
                    }

                    spineNodes.forEach(sp => {
                        // 平面1连平面1 (从L1顶部中心出发)
                        linesHtml += createCableCurve(cx - 45, leafY, sp.p1x, sp.y, blueColor, `${l1Id} dev-spine_${sp.id} spine_${sp.id}`);
                        // 平面2连平面2 (从L2顶部中心出发)
                        linesHtml += createCableCurve(cx + 45, leafY, sp.p2x, sp.y, orangeColor, `${l2Id} dev-spine_${sp.id} spine_${sp.id}`);
                    });
                }

                // Server 层
                const visualServers = 3;
                const serverSpacing = (podWidth - 100) / visualServers;

                for (let s = 0; s < visualServers; s++) {
                    const cx = podX + 50 + serverSpacing * (s + 0.5);
                    const isLast = (s === visualServers - 1);
                    const idx = isLast ? "64" : (s + 1);

                    if (s === visualServers - 2) {
                        nodesHtml += `<text x="${cx}" y="${serverY + 40}" font-size="14" fill="#475569" font-weight="bold" text-anchor="middle">...... 省略部分节点 ......</text>`;
                        continue;
                    }

                    const srvId = `srv_${p}_${idx}`;
                    const serverWidth = 280;
                    
                    // 绘制服务器
                    nodesHtml += createServer(cx - serverWidth/2, serverY, serverWidth, 80, railCount, `算力节点 ${idx} (${gpuType})`, srvId, `<div class="mb-1 font-semibold">Server ${idx}</div>配置: ${gpuType}<br>网卡: ${railCount}x CX8`);

                    // 绘制服务器到 Leaf 的网卡连线与 Bond 结构
                    const portGroupSpacing = serverWidth / (railCount + 1);
                    
                    for (let rail = 0; rail < railCount; rail++) {
                        const portX = cx - serverWidth/2 + portGroupSpacing * (rail + 1);
                        const portY = serverY;
                        
                        // 寻址对应的 Leaf group index (1-based)
                        const targetLeafGroupIdx = (railCount === 8) ? (rail + 1) : Math.floor(rail * (8 / railCount)) + 1;
                        const isTargetVisible = visibleLeafGroupIds.has(targetLeafGroupIdx);
                        const targetLeaf = leafNodes.find(ln => ln.id === targetLeafGroupIdx);

                        if (isTargetVisible && targetLeaf) {
                            // 可见 Leaf: 绘制完整的双端口指示和连线
                            nodesHtml += `<rect x="${portX - 12}" y="${portY - 14}" width="10" height="14" fill="#1e3a8a" rx="1"></rect>`;
                            nodesHtml += `<rect x="${portX + 2}" y="${portY - 14}" width="10" height="14" fill="#c2410c" rx="1"></rect>`;
                            nodesHtml += `<text x="${portX - 7}" y="${portY - 4}" font-size="8" fill="#fff" text-anchor="middle">1</text>`;
                            nodesHtml += `<text x="${portX + 7}" y="${portY - 4}" font-size="8" fill="#fff" text-anchor="middle">2</text>`;

                            const l1Id = `l1_${p}_${targetLeaf.id}`;
                            const l2Id = `l2_${p}_${targetLeaf.id}`;

                            // 线条 ID 中包含源和两个目标，以实现联动高亮
                            const linkClasses = `${srvId} dev-${l1Id} dev-${l2Id}`;
                            
                            // 连接 L1 (连线终点为Leaf底部, 即targetLeaf.y)
                            linesHtml += createCableCurve(portX - 7, portY - 14, targetLeaf.p1x, targetLeaf.y, blueColor, linkClasses);
                            // 连接 L2
                            linesHtml += createCableCurve(portX + 7, portY - 14, targetLeaf.p2x, targetLeaf.y, orangeColor, linkClasses);

                            // 绘制 LACP 聚合气泡框 (为了不拥挤，只在首尾可见轨画)
                            if (rail === 0 || rail === railCount - 1) {
                                nodesHtml += createLACPBadge(portX, portY - 40);
                            }
                        } else {
                            // 不可见 Leaf: 仅绘制灰色缩略端口指示 (暗示隐藏连线)
                            nodesHtml += `<rect x="${portX - 8}" y="${portY - 12}" width="16" height="12" fill="#0f172a" stroke="#334155" stroke-width="0.5" rx="1" opacity="0.6"></rect>`;
                            nodesHtml += `<text x="${portX}" y="${portY - 5}" font-size="7" fill="#475569" text-anchor="middle">·</text>`;
                        }
                    }
                }
            }

            // 更新左侧侧边栏统计
            const hwData = calcB300Hardware(serverCount);
            const cm = hwData.compute.meta;

            document.getElementById('summaryPanel').innerHTML = `
                <div class="p-2.5 bg-slate-800 rounded border border-slate-700">
                    <div class="flex justify-between mb-1"><span class="text-slate-400">总算力节点:</span> <span class="text-white font-semibold">${serverCount} 台</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">GPU 芯片:</span> <span class="text-cyan-400 font-semibold">${serverCount * 8} 颗</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">网络平面:</span> <span class="text-white">2 (蓝色/橙色)</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Rail (轨道):</span> <span class="text-white">${railCount} 轨独立</span></div>
                </div>
                <div class="p-2.5 bg-slate-800 rounded border border-slate-700 mt-1.5">
                    <div class="flex justify-between mb-1"><span class="text-slate-400">网络架构:</span> <span class="text-emerald-400 font-semibold">${cm.networkType}</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">划分 POD 数:</span> <span class="text-white">${cm.podCount} 个 (${cm.serversPerPod}台/POD)</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">Leaf 交换机:</span> <span class="text-white">${cm.leafSwitches} 台</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">Spine 交换机:</span> <span class="text-white">${cm.spineSwitches} 台</span></div>
                    ${cm.coreSwitches > 0 ? `<div class="flex justify-between mb-1"><span class="text-slate-400">Core 交换机:</span> <span class="text-white">${cm.coreSwitches} 台</span></div>` : ''}
                    <div class="flex justify-between"><span class="text-slate-400">核心架构:</span> <span class="text-emerald-400">去堆叠 Bond</span></div>
                </div>
            `;

            // 网络设备统计信息
            const statsContainer = document.getElementById('hardwareStatsContainer');
            if (gpuType === 'B300') {
                statsContainer.classList.remove('hidden');
                renderHardwareStats(hwData);
            } else {
                statsContainer.classList.add('hidden');
            }

            // 先渲染背景(最底层)，再渲染线条(光缆层)，最后渲染节点(设备层)，以防止线条遮挡设备
            svgGroup.innerHTML = bgHtml + linesHtml + nodesHtml;
            setTimeout(resetZoom, 50);
        }

        // 事件委托：处理悬停高亮和 Tooltip
        svgGroup.addEventListener('mouseover', (e) => {
            const devGroup = e.target.closest('.device-group');
            if (devGroup) {
                const text = devGroup.getAttribute('data-tooltip');
                const id = devGroup.getAttribute('data-id');
                if (text) showTooltip(e, text);
                if (id) highlightPaths(id);
            }
        });

        svgGroup.addEventListener('mouseout', (e) => {
            const devGroup = e.target.closest('.device-group');
            if (devGroup) {
                hideTooltip();
                resetHighlights();
            }
        });

        // 确保 Tooltip 在设备内部移动时紧跟鼠标
        svgGroup.addEventListener('mousemove', (e) => {
            if (tooltip.style.opacity === '1') {
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
            }
        });

        window.onload = () => {
            generateTopology();
            
            // 绑定窗口调整大小事件
            window.addEventListener('resize', () => {
                // 可选：防抖动重绘或仅仅调整 viewBox
            });
        };

    </script>
</body>
</html>
