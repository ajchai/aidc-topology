<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智算中心参数面网络拓扑生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        body { font-family: 'Inter', sans-serif; }
        
        svg { cursor: grab; }
        svg:active { cursor: grabbing; }
        
        .device-group { cursor: pointer; transition: transform 0.2s; }
        .device-group:hover { filter: brightness(1.2); }
        
        /* 连线基础样式与过渡动画 */
        .link-line {
            transition: opacity 0.3s ease, stroke-width 0.3s ease, filter 0.3s ease, stroke 0.3s ease;
            opacity: 0.15; /* 默认低透明度，降低视觉干扰 */
        }
        
        /* 高亮时的状态 */
        .link-line.highlight {
            opacity: 1 !important;
            stroke-width: 2.5px !important;
            filter: url(#glow); /* 增加发光滤镜 */
            z-index: 10;
        }
        
        /* 其他未被高亮的线进一步变暗 */
        .svg-dimmed .link-line:not(.highlight) {
            opacity: 0.03 !important;
        }
        .svg-dimmed .device-group:not(.highlight-device) {
            opacity: 0.3;
            filter: grayscale(0.5);
            transition: opacity 0.3s, filter 0.3s;
        }

        /* 硬件指示灯动画 */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .led-blink { animation: blink 2s infinite; }

        /* 硬件统计表样式 */
        .stat-tab { padding: 4px 12px; font-size: 11px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .stat-tab.active { background: #2563eb; color: #fff; }
        .stat-tab:not(.active) { background: #1e293b; color: #94a3b8; }
        .stat-tab:not(.active):hover { background: #334155; color: #e2e8f0; }
        .stat-category { font-size: 10px; color: #94a3b8; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 4px 0; border-bottom: 1px solid #334155; margin-bottom: 2px; }
        .stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 2px 0; font-size: 10px; }
        .stat-row .stat-model { color: #cbd5e1; font-family: 'Consolas', 'Monaco', monospace; font-size: 9px; }
        .stat-row .stat-count { color: #38bdf8; font-weight: 700; font-size: 11px; min-width: 40px; text-align: right; }
        .stat-total { color: #fbbf24; font-weight: 700; font-size: 10px; }

        /* 浮动统计面板 */
        #hwFloatPanel {
            position: absolute;
            top: 70px;
            right: 20px;
            width: 340px;
            max-height: calc(100vh - 120px);
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(71, 85, 105, 0.6);
            border-radius: 12px;
            z-index: 25;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 1px rgba(148,163,184,0.2);
            transition: width 0.3s ease, max-height 0.3s ease, opacity 0.2s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #hwFloatPanel.collapsed {
            width: 44px;
            max-height: 44px;
        }
        #hwFloatPanel .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(71, 85, 105, 0.4);
            flex-shrink: 0;
        }
        #hwFloatPanel.collapsed .panel-header {
            border-bottom: none;
            padding: 10px;
            justify-content: center;
        }
        #hwFloatPanel .panel-header .header-title {
            font-size: 12px;
            font-weight: 700;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        #hwFloatPanel.collapsed .header-title span { display: none; }
        #hwFloatPanel .panel-header .toggle-btn {
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
            color: #94a3b8;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        #hwFloatPanel .panel-header .toggle-btn:hover { background: #334155; color: #e2e8f0; }
        #hwFloatPanel .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
        }
        #hwFloatPanel.collapsed .panel-body { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen w-screen overflow-hidden flex">

    <aside class="w-80 bg-slate-900 border-r border-slate-800 flex flex-col z-10 shadow-2xl shrink-0 relative">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-900/10 to-transparent pointer-events-none"></div>
        <div class="p-6 border-b border-slate-800 relative z-10">
            <h1 class="text-xl font-bold text-white flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                    <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                    <line x1="6" y1="6" x2="6.01" y2="6"></line>
                    <line x1="6" y1="18" x2="6.01" y2="18"></line>
                </svg>
                智算拓扑生成器
            </h1>
            <p class="text-xs text-slate-400 mt-2 tracking-wide">AI Data Center Network</p>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-6 relative z-10">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">算力服务器数量</label>
                <input type="number" id="serverCount" value="128" min="1" max="1024" class="w-full bg-slate-950 border border-slate-700 rounded-md p-2.5 text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                <p class="text-[10px] text-slate-500 mt-1">为保证渲染性能，将展示典型结构代表</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">GPU规格 / 网卡配置</label>
                <select id="gpuType" class="w-full bg-slate-950 border border-slate-700 rounded-md p-2.5 text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                    <option value="A800_4">NVIDIA A800 (4-Rail)</option>
                    <option value="H800_8">NVIDIA H800 (8-Rail)</option>
                    <option value="B300_8" selected>NVIDIA B300 (8-Rail, 8x 800G)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">组网架构</label>
                <select id="architecture" class="w-full bg-slate-950 border border-slate-700 rounded-md p-2.5 text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                    <option value="ruijie-dual" selected>锐捷虚拟双平面 (去堆叠Bond/VRF逃生)</option>
                </select>
            </div>
            
            <button onclick="generateTopology()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium py-3 px-4 rounded-md transition-all shadow-[0_0_15px_rgba(37,99,235,0.4)] hover:shadow-[0_0_25px_rgba(37,99,235,0.6)]">
                重新生成拓扑
            </button>

            <!-- 硬件测算结果 -->
            <div>
                <h3 class="text-sm font-semibold text-slate-200 mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                    硬件测算结果
                </h3>
                <div id="summaryPanel" class="text-xs text-slate-400 space-y-2 leading-relaxed">
                    正在初始化...
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 relative overflow-hidden bg-slate-950">
        <!-- 背景网格 -->
        <div class="absolute inset-0 pointer-events-none" style="background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; opacity: 0.3;"></div>

        <div class="absolute top-6 right-6 z-20 flex gap-3">
            <div class="bg-slate-900/80 backdrop-blur border border-slate-700 rounded-lg p-1 shadow-2xl flex">
                <button onclick="resetZoom()" class="hover:bg-slate-700 p-2.5 rounded-md text-slate-300 transition-colors" title="适应屏幕">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                </button>
                <div class="w-px bg-slate-700 my-2 mx-1"></div>
                <button onclick="zoomIn()" class="hover:bg-slate-700 p-2.5 rounded-md text-slate-300 transition-colors" title="放大">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                </button>
                <button onclick="zoomOut()" class="hover:bg-slate-700 p-2.5 rounded-md text-slate-300 transition-colors" title="缩小">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7" /></svg>
                </button>
            </div>
        </div>

        <div id="tooltip" class="absolute hidden bg-slate-800/95 backdrop-blur border border-slate-600 text-white text-xs rounded-lg p-3 z-30 pointer-events-none shadow-2xl max-w-xs transition-opacity duration-200"></div>

        <div id="svgContainer" class="w-full h-full relative cursor-grab">
            <svg id="topologySvg" class="w-full h-full" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <!-- 阴影效果 -->
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
                    </filter>
                    
                    <!-- 发光发热效果 (用于高亮连线) -->
                    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>

                    <!-- Plane 1 (Blue) 设备渐变 -->
                    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#2563eb"/>
                        <stop offset="100%" stop-color="#1e3a8a"/>
                    </linearGradient>

                    <!-- Plane 2 (Orange) 设备渐变 -->
                    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ea580c"/>
                        <stop offset="100%" stop-color="#7c2d12"/>
                    </linearGradient>

                    <!-- Server (Dark Steel) 设备渐变 -->
                    <linearGradient id="grad-server" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#1e293b"/>
                        <stop offset="100%" stop-color="#0f172a"/>
                    </linearGradient>
                    
                    <!-- LACP 聚合标记图案 -->
                    <pattern id="stripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                        <rect width="4" height="8" fill="rgba(255,255,255,0.1)"></rect>
                    </pattern>
                </defs>
                <g id="svgGroup"></g>
            </svg>
        </div>
        
        <!-- 交互提示遮罩 -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-slate-800/80 backdrop-blur px-4 py-2 rounded-full border border-slate-700 text-xs text-slate-300 pointer-events-none shadow-lg flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-400 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" /></svg>
            提示：将鼠标悬停在服务器或交换机上，可高亮查看其专属的数据链路规划。
        </div>

        <!-- B300 硬件统计浮动面板 -->
        <div id="hardwareStatsContainer" class="hidden">
            <div id="hwFloatPanel">
                <div class="panel-header" onclick="toggleStatsPanel()">
                    <div class="header-title">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-amber-400 shrink-0" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11.707 4.707a1 1 0 00-1.414-1.414L10 9.586 8.707 8.293a1 1 0 00-1.414 0l-2 2a1 1 0 101.414 1.414L8 10.414l1.293 1.293a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                        <span>B300 硬件统计表</span>
                    </div>
                    <div class="toggle-btn" id="toggleBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="flex gap-2 mb-3">
                        <span class="stat-tab active" data-tab="compute" onclick="switchStatsTab('compute')">计算网</span>
                        <span class="stat-tab" data-tab="storage" onclick="switchStatsTab('storage')">存储网</span>
                    </div>
                    <div id="statsContent" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // B300 硬件统计计算引擎 (移植自 b300-network-calc skill)
        // ==========================================

        // 辅助函数: 向上取整到最近的2的幂
        function nextPowerOf2(n) {
            if (n <= 0) return 1;
            return Math.pow(2, Math.ceil(Math.log2(n)));
        }

        // B300 硬件统计计算
        function calcB300Hardware(serverCount) {
            const result = { compute: null, storage: null };

            // ===== 计算网 =====
            // B300: 8x CX8 NIC (800G), 每个800G split为2x400G = 16条下行链路
            const downlinksPerServer = 16; // 8 NIC * 2 (800G→2*400G)
            const leafDownlinkPorts = 64;  // RG-S6990-128QC2XS: 64下行400G端口
            const serversPerLeaf = leafDownlinkPorts / downlinksPerServer; // 4

            // Leaf 数量
            let leafSwitches = Math.ceil(serverCount / serversPerLeaf);
            if (leafSwitches % 2 !== 0) leafSwitches += 1; // 凑偶

            // Spine / Core 数量
            let spineSwitches = 0;
            let coreSwitches = 0;
            let networkType = '';

            if (serverCount <= 512) {
                // Two-Tier
                spineSwitches = nextPowerOf2(Math.ceil(leafSwitches / 2));
                networkType = 'Two-Tier (Leaf-Spine)';
            } else {
                // Three-Tier
                spineSwitches = leafSwitches; // 1:1
                coreSwitches = nextPowerOf2(Math.ceil(spineSwitches / 2));
                networkType = 'Three-Tier (Leaf-Spine-Core)';
            }

            // 计算网交换机列表
            const computeSwitches = [];
            computeSwitches.push({ role: 'Leaf', model: 'RG-S6990-128QC2XS', count: leafSwitches, desc: `${leafDownlinkPorts}下行+${leafDownlinkPorts}上行 400G` });
            computeSwitches.push({ role: 'Spine', model: 'RG-S6990-128QC2XS', count: spineSwitches, desc: `${leafDownlinkPorts * 2} 400G全互联` });
            if (coreSwitches > 0) {
                computeSwitches.push({ role: 'Core', model: 'RG-S6990-128QC2XS', count: coreSwitches, desc: '核心层汇聚' });
            }

            // 计算网光模块 (简化口径 Caliber B)
            const computeModules = [];
            // Spine↔Leaf: 双端计算, 400G-Q112-DR4-L
            const spineLeafModuleCount = leafSwitches * leafDownlinkPorts * 2;
            computeModules.push({ conn: 'Spine↔Leaf', model: '400G-Q112-DR4-L', count: spineLeafModuleCount, desc: '双端, 单模' });
            // Server↔Leaf: 仅交换机侧, 800G-OSFP-RHS-2VR4-MM850 (分支模块)
            const serverLeafModuleCount = serverCount * downlinksPerServer;
            computeModules.push({ conn: 'Server↔Leaf', model: '800G-OSFP-RHS-2VR4-MM850', count: serverLeafModuleCount, desc: '交换机侧, 多模分支' });

            // 计算网线缆
            const computeCables = [];
            // Spine↔Leaf: MPO16-MPO16-SM-50M
            computeCables.push({ conn: 'Spine↔Leaf', model: 'MPO16-MPO16-SM-50M', count: leafSwitches * leafDownlinkPorts, desc: '单模, 50m' });
            // Server↔Leaf: MPO-MPO-OM4-30M
            computeCables.push({ conn: 'Server↔Leaf', model: 'MPO-MPO-OM4-30M', count: serverCount * downlinksPerServer, desc: '多模OM4, 30m' });

            // POD 划分
            let podCount = 1;
            let serversPerPod = serverCount;
            if (serverCount <= 32) { podCount = 1; serversPerPod = serverCount; }
            else if (serverCount <= 64) { podCount = 2; serversPerPod = 32; }
            else if (serverCount <= 128) { podCount = 2; serversPerPod = 64; } // 双平面
            else if (serverCount <= 256) { podCount = Math.ceil(serverCount / 32); serversPerPod = 32; }
            else { podCount = Math.ceil(serverCount / 64); serversPerPod = 64; }

            result.compute = {
                switches: computeSwitches,
                modules: computeModules,
                cables: computeCables,
                meta: {
                    networkType,
                    podCount,
                    serversPerPod,
                    leafSwitches,
                    spineSwitches,
                    coreSwitches
                }
            };

            // ===== 存储网 (serverCount >= 32) =====
            if (serverCount >= 32) {
                // 存储节点: GPU:Storage = 1024:96
                const storageNodes = Math.ceil(serverCount * 96 / 1024);
                // 下行总端口: 每台B300 1个400G存储端口 + 每台存储节点 2个400G存储端口
                const totalStorageDownlink = serverCount * 1 + storageNodes * 2;

                // 存储 Leaf
                let storageLeaf = Math.ceil(totalStorageDownlink / leafDownlinkPorts);
                if (storageLeaf % 2 !== 0) storageLeaf += 1;

                // 存储 Spine (最少2台)
                let storageSpine = Math.max(2, nextPowerOf2(Math.ceil(storageLeaf / 2)));

                const storageSwitches = [];
                storageSwitches.push({ role: 'Leaf', model: 'RG-S6990-128QC2XS', count: storageLeaf, desc: `${leafDownlinkPorts}下行+${leafDownlinkPorts}上行 400G` });
                storageSwitches.push({ role: 'Spine', model: 'RG-S6990-128QC2XS', count: storageSpine, desc: `${leafDownlinkPorts * 2} 400G全互联` });

                // 存储光模块
                const storageModules = [];
                const storageLeafSpineModuleCount = storageLeaf * leafDownlinkPorts * 2;
                storageModules.push({ conn: 'Spine↔Leaf', model: '400G-Q112-DR4-L', count: storageLeafSpineModuleCount, desc: '双端, 单模' });
                storageModules.push({ conn: 'Server↔Leaf', model: '400G-Q112-VR4-MM850', count: totalStorageDownlink, desc: '交换机侧, 多模' });

                // 存储线缆
                const storageCables = [];
                storageCables.push({ conn: 'Spine↔Leaf', model: 'MPO-MPO-OM4-50M', count: storageLeaf * leafDownlinkPorts, desc: '多模OM4, 50m' });
                storageCables.push({ conn: 'Server↔Leaf', model: 'MPO-MPO-OM4-30M', count: totalStorageDownlink, desc: '多模OM4, 30m' });

                result.storage = {
                    switches: storageSwitches,
                    modules: storageModules,
                    cables: storageCables,
                    meta: {
                        storageNodes,
                        totalStorageDownlink,
                        storageLeaf,
                        storageSpine
                    }
                };
            }

            return result;
        }

        // 渲染硬件统计表
        let currentStatsTab = 'compute';
        let cachedHardwareData = null;

        function toggleStatsPanel() {
            const panel = document.getElementById('hwFloatPanel');
            const btn = document.getElementById('toggleBtn');
            panel.classList.toggle('collapsed');
            if (panel.classList.contains('collapsed')) {
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>';
            } else {
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
            }
        }

        function switchStatsTab(tab) {
            currentStatsTab = tab;
            document.querySelectorAll('.stat-tab').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            if (cachedHardwareData) renderHardwareStats(cachedHardwareData);
        }

        function renderHardwareStats(data) {
            cachedHardwareData = data;
            const container = document.getElementById('statsContent');

            if (currentStatsTab === 'storage') {
                if (!data.storage) {
                    container.innerHTML = '<div class="text-xs text-slate-500 p-3 bg-slate-800/50 rounded border border-slate-700 text-center">存储网需要 ≥32 台服务器才会启用</div>';
                    return;
                }
                container.innerHTML = renderStatsSection('存储网', data.storage);
            } else {
                container.innerHTML = renderStatsSection('计算网', data.compute);
            }
        }

        function renderStatsSection(title, section) {
            let html = '';

            // 架构摘要
            if (section.meta) {
                html += `<div class="p-2 bg-slate-800/60 rounded border border-slate-700/50 text-[10px] text-slate-400 space-y-1">`;
                if (section.meta.networkType) {
                    html += `<div class="flex justify-between"><span>网络架构:</span><span class="text-emerald-400 font-semibold">${section.meta.networkType}</span></div>`;
                }
                if (section.meta.podCount) {
                    html += `<div class="flex justify-between"><span>POD 数量:</span><span class="text-white">${section.meta.podCount} 个 (${section.meta.serversPerPod}台/POD)</span></div>`;
                }
                if (section.meta.storageNodes) {
                    html += `<div class="flex justify-between"><span>存储节点:</span><span class="text-white">${section.meta.storageNodes} 台</span></div>`;
                    html += `<div class="flex justify-between"><span>存储下行端口:</span><span class="text-white">${section.meta.totalStorageDownlink} 个</span></div>`;
                }
                html += `</div>`;
            }

            // 交换机
            const totalSwitches = section.switches.reduce((s, i) => s + i.count, 0);
            html += `<div>`;
            html += `<div class="stat-category flex justify-between">交换机 <span class="stat-total">共 ${totalSwitches} 台</span></div>`;
            section.switches.forEach(sw => {
                html += `<div class="stat-row"><span><span class="text-slate-300">${sw.role}</span> <span class="stat-model">${sw.model}</span></span><span class="stat-count">${sw.count}</span></div>`;
            });
            html += `</div>`;

            // 光模块
            const totalModules = section.modules.reduce((s, i) => s + i.count, 0);
            html += `<div>`;
            html += `<div class="stat-category flex justify-between">光模块 <span class="stat-total">共 ${totalModules.toLocaleString()} 只</span></div>`;
            section.modules.forEach(mod => {
                html += `<div class="stat-row"><span><span class="text-slate-300">${mod.conn}</span> <span class="stat-model">${mod.model}</span></span><span class="stat-count">${mod.count.toLocaleString()}</span></div>`;
                html += `<div class="text-[9px] text-slate-500 pl-1">${mod.desc}</div>`;
            });
            html += `</div>`;

            // 线缆
            const totalCables = section.cables.reduce((s, i) => s + i.count, 0);
            html += `<div>`;
            html += `<div class="stat-category flex justify-between">线缆 <span class="stat-total">共 ${totalCables.toLocaleString()} 根</span></div>`;
            section.cables.forEach(cab => {
                html += `<div class="stat-row"><span><span class="text-slate-300">${cab.conn}</span> <span class="stat-model">${cab.model}</span></span><span class="stat-count">${cab.count.toLocaleString()}</span></div>`;
                html += `<div class="text-[9px] text-slate-500 pl-1">${cab.desc}</div>`;
            });
            html += `</div>`;

            return html;
        }

        // ==========================================
        // 原有拓扑生成逻辑
        // ==========================================
        const svgElement = document.getElementById('topologySvg');
        const svgGroup = document.getElementById('svgGroup');
        const svgContainer = document.getElementById('svgContainer');
        const tooltip = document.getElementById('tooltip');
        
        let viewBox = { x: 0, y: 0, w: 2800, h: 1600 };
        let isDragging = false;
        let startPoint = { x: 0, y: 0 };
        const zoomFactor = 1.15;
        
        function updateViewBox() {
            svgElement.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
        }

        function resetZoom() {
            const bbox = svgGroup.getBBox();
            if(bbox.width === 0) return;
            const padding = 150;
            viewBox = {
                x: bbox.x - padding,
                y: bbox.y - padding,
                w: bbox.width + padding * 2,
                h: bbox.height + padding * 2
            };
            updateViewBox();
        }

        function zoomIn() { scaleView(1 / zoomFactor); }
        function zoomOut() { scaleView(zoomFactor); }

        function scaleView(factor) {
            const centerX = viewBox.x + viewBox.w / 2;
            const centerY = viewBox.y + viewBox.h / 2;
            viewBox.w *= factor; viewBox.h *= factor;
            viewBox.x = centerX - viewBox.w / 2;
            viewBox.y = centerY - viewBox.h / 2;
            updateViewBox();
        }

        /* 鼠标拖拽平移与滚轮缩放 */
        svgContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const mouseX = e.offsetX; const mouseY = e.offsetY;
            const rect = svgContainer.getBoundingClientRect();
            const viewX = viewBox.x + (mouseX / rect.width) * viewBox.w;
            const viewY = viewBox.y + (mouseY / rect.height) * viewBox.h;

            const factor = e.deltaY < 0 ? (1 / zoomFactor) : zoomFactor;
            viewBox.w *= factor; viewBox.h *= factor;
            viewBox.x = viewX - (mouseX / rect.width) * viewBox.w;
            viewBox.y = viewY - (mouseY / rect.height) * viewBox.h;
            updateViewBox();
        });

        svgContainer.addEventListener('mousedown', (e) => {
            isDragging = true; svgContainer.style.cursor = 'grabbing';
            startPoint = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startPoint.x;
            const dy = e.clientY - startPoint.y;
            const rect = svgContainer.getBoundingClientRect();
            viewBox.x -= dx * (viewBox.w / rect.width);
            viewBox.y -= dy * (viewBox.h / rect.height);
            startPoint = { x: e.clientX, y: e.clientY };
            updateViewBox();
        });

        window.addEventListener('mouseup', () => { 
            isDragging = false; 
            svgContainer.style.cursor = 'grab';
        });

        function showTooltip(evt, text) {
            tooltip.innerHTML = text;
            tooltip.style.display = 'block';
            tooltip.style.left = (evt.pageX + 15) + 'px';
            tooltip.style.top = (evt.pageY + 15) + 'px';
            tooltip.style.opacity = 1;
        }
        function hideTooltip() { 
            tooltip.style.opacity = 0;
            setTimeout(() => { if(tooltip.style.opacity == 0) tooltip.style.display = 'none'; }, 200);
        }

        // 高亮网络链路核心逻辑
        function highlightPaths(deviceId) {
            const svgGroupEl = document.getElementById('svgGroup');
            svgGroupEl.classList.add('svg-dimmed');
            
            // 找出所有带有此 deviceId 的线
            const links = document.querySelectorAll(`.link-line.${deviceId}`);
            links.forEach(link => {
                link.classList.add('highlight');
                // 让线端点的设备也保持高亮
                const classes = Array.from(link.classList);
                classes.forEach(cls => {
                    if (cls.startsWith('dev-')) {
                        const targetDev = document.getElementById(cls);
                        if (targetDev) targetDev.classList.add('highlight-device');
                    }
                });
            });
            
            // 当前设备自身也要高亮
            const self = document.getElementById(`dev-${deviceId}`);
            if(self) self.classList.add('highlight-device');
        }

        function resetHighlights() {
            const svgGroupEl = document.getElementById('svgGroup');
            svgGroupEl.classList.remove('svg-dimmed');
            
            document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
            document.querySelectorAll('.highlight-device').forEach(el => el.classList.remove('highlight-device'));
        }


        // 绘制弯曲的光缆线条 (带贝塞尔曲线和类别标记)
        function createCableCurve(x1, y1, x2, y2, color, idClasses) {
            // 计算控制点，使线条离开端口时有一段垂直的延伸，看起来像物理布线
            const offset = Math.abs(y2 - y1) * 0.4;
            const pathData = `M ${x1} ${y1} C ${x1} ${y1 - offset}, ${x2} ${y2 + offset}, ${x2} ${y2}`;
            return `<path d="${pathData}" stroke="${color}" stroke-width="1.5" fill="none" class="link-line ${idClasses}" />`;
        }

        // 绘制交换机 (Spine/Leaf)
        function createSwitch(x, y, width, height, planeType, label, id, tooltipText) {
            const fillGradient = planeType === 'blue' ? 'url(#grad-blue)' : 'url(#grad-orange)';
            const strokeColor = planeType === 'blue' ? '#3b82f6' : '#f97316';
            const shadow = 'filter="url(#shadow)"';
            
            // 端口装饰 (小方块阵列)
            let portsHtml = '';
            const portCount = 8;
            const portSpacing = (width - 20) / portCount;
            for(let i=0; i<portCount; i++) {
                portsHtml += `<rect x="${x + 10 + i*portSpacing + portSpacing/2 - 2}" y="${y + height - 8}" width="4" height="4" fill="${planeType === 'blue' ? '#60a5fa' : '#fdba74'}" class="led-blink"></rect>`;
            }

            const safeTooltip = tooltipText.replace(/"/g, '&quot;');

            return `
            <g id="dev-${id}" class="device-group dev-${id}" data-id="${id}" data-tooltip="${safeTooltip}" transform="translate(0,0)">
                <!-- 交换机主体 -->
                <rect x="${x}" y="${y}" width="${width}" height="${height}" rx="6" fill="${fillGradient}" stroke="${strokeColor}" stroke-width="1.5" ${shadow}></rect>
                
                <!-- 顶部高光和内部刻线 -->
                <line x1="${x+2}" y1="${y+2}" x2="${x+width-2}" y2="${y+2}" stroke="rgba(255,255,255,0.2)" stroke-width="1"></line>
                <line x1="${x+4}" y1="${y+height/2}" x2="${x+width-4}" y2="${y+height/2}" stroke="rgba(0,0,0,0.3)" stroke-width="1"></line>
                
                <!-- 标签与端口 -->
                <text x="${x + width/2}" y="${y + height/2 - 2}" font-family="'Inter', sans-serif" font-size="12" fill="#ffffff" font-weight="600" text-anchor="middle" alignment-baseline="middle" pointer-events="none">${label}</text>
                ${portsHtml}
            </g>`;
        }

        // 绘制带 GPU 插槽的算力服务器
        function createServer(x, y, width, height, railCount, label, id, tooltipText) {
            const shadow = 'filter="url(#shadow)"';
            let slotsHtml = '';
            
            // GPU 槽位装饰
            const slotWidth = (width - 40) / railCount;
            for(let i=0; i<railCount; i++) {
                const slotX = x + 20 + i*slotWidth + 2;
                slotsHtml += `
                    <rect x="${slotX}" y="${y + 25}" width="${slotWidth - 4}" height="25" fill="#020617" stroke="#334155" stroke-width="1" rx="2"></rect>
                    <rect x="${slotX + 4}" y="${y + 28}" width="${slotWidth - 12}" height="3" fill="#06b6d4" opacity="0.8"></rect>
                    <text x="${slotX + slotWidth/2}" y="${y + 40}" font-size="8" fill="#64748b" text-anchor="middle">G${i+1}</text>
                `;
            }

            const safeTooltip = tooltipText.replace(/"/g, '&quot;');

            return `
            <g id="dev-${id}" class="device-group dev-${id}" data-id="${id}" data-tooltip="${safeTooltip}">
                <!-- 服务器机箱主体 -->
                <rect x="${x}" y="${y}" width="${width}" height="${height}" rx="8" fill="url(#grad-server)" stroke="#38bdf8" stroke-width="1" ${shadow}></rect>
                
                <!-- 顶部金属网格装饰 -->
                <rect x="${x + 10}" y="${y + 6}" width="${width - 20}" height="8" fill="url(#stripes)" rx="1"></rect>
                
                <!-- 标签 -->
                <text x="${x + width/2}" y="${y + height - 12}" font-family="'Inter', sans-serif" font-size="14" fill="#e2e8f0" font-weight="bold" text-anchor="middle" pointer-events="none">${label}</text>
                ${slotsHtml}
            </g>`;
        }

        function createLACPBadge(cx, cy) {
            return `
            <g class="pointer-events-none">
                <rect x="${cx - 18}" y="${cy - 8}" width="36" height="16" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1"></rect>
                <text x="${cx}" y="${cy + 3}" font-size="8" fill="#cbd5e1" font-weight="bold" text-anchor="middle">LACP</text>
            </g>`;
        }

        function generateTopology() {
            const serverCount = parseInt(document.getElementById('serverCount').value);
            const gpuSetting = document.getElementById('gpuType').value;
            const parts = gpuSetting.split('_');
            const gpuType = parts[0];
            const railCount = parseInt(parts[1]); // 网卡数量/轨道数

            let bgHtml = '';
            let linesHtml = '';
            let nodesHtml = '';

            const blueColor = "#3b82f6";
            const orangeColor = "#f97316";
            
            // 架构常量 (基于截图：64台一个POD)
            const serversPerPod = 64;
            const podCount = Math.ceil(serverCount / serversPerPod);
            const leafPairsPerPod = 8; // 固定8对Leaf

            // 布局坐标
            const spineY = 150;
            const leafY = 480;
            const serverY = 880;
            const canvasWidth = Math.max(2800, podCount * 1400);

            // ==========================================
            // 1. 绘制 Spine 层 (Virtual Dual Plane)
            // ==========================================
            const spineBoxWidth = canvasWidth - 400;
            bgHtml += `<rect x="200" y="${spineY - 70}" width="${spineBoxWidth}" height="150" fill="rgba(15, 23, 42, 0.5)" stroke="#475569" stroke-width="2" stroke-dasharray="6,4" rx="12"></rect>`;
            bgHtml += `<text x="230" y="${spineY - 40}" font-family="sans-serif" font-size="20" fill="#94a3b8" font-weight="bold">核心层 (Spine) - 虚拟双平面</text>`;

            const visualSpines = 6; 
            const spineSpacing = spineBoxWidth / (visualSpines + 1);
            let spineNodes = [];

            for (let i = 0; i < visualSpines; i++) {
                const cx = 200 + spineSpacing * (i + 1);
                const isLast = (i === visualSpines - 1);
                const idx = isLast ? "64" : (i + 1);

                if (i === visualSpines - 2) {
                    nodesHtml += `<text x="${cx}" y="${spineY + 20}" font-size="24" fill="#475569" text-anchor="middle" font-weight="bold">......</text>`;
                    continue;
                }

                // 记录坐标用于连线
                spineNodes.push({ id: idx, p1x: cx - 50, p2x: cx + 50, y: spineY + 40 });

                // Spine 1 (Blue)
                nodesHtml += createSwitch(cx - 95, spineY - 20, 90, 60, 'blue', `Spine1-${idx}`, `s1_${idx}`, `<div class="mb-1 font-bold">Spine1-${idx}</div>平面 1 核心交换机<br>800G 端口`);
                // Spine 2 (Orange)
                nodesHtml += createSwitch(cx + 5, spineY - 20, 90, 60, 'orange', `Spine2-${idx}`, `s2_${idx}`, `<div class="mb-1 font-bold">Spine2-${idx}</div>平面 2 核心交换机<br>800G 端口`);
            }

            // ==========================================
            // 2. 绘制 Leaf 层 和 Server 层
            // ==========================================
            const podWidth = spineBoxWidth / podCount;

            for (let p = 0; p < podCount; p++) {
                const podX = 200 + p * podWidth;
                
                // POD 背景框
                bgHtml += `<rect x="${podX + 20}" y="${leafY - 110}" width="${podWidth - 40}" height="${serverY - leafY + 250}" fill="rgba(30, 41, 59, 0.2)" stroke="#334155" stroke-width="1" rx="16"></rect>`;
                bgHtml += `<text x="${podX + 50}" y="${leafY - 70}" font-size="22" fill="#cbd5e1" font-weight="bold">POD ${p+1}</text>`;
                bgHtml += `<text x="${podX + 50}" y="${leafY - 45}" font-size="14" fill="#64748b">包含 16台 Leaf, 下联 64台 算力节点</text>`;

                // Leaf 层
                let leafNodes = [];
                const leafSpacing = (podWidth - 100) / leafPairsPerPod;

                for (let i = 0; i < leafPairsPerPod; i++) {
                    const cx = podX + 50 + leafSpacing * (i + 0.5);
                    const idx = i + 1;
                    
                    const l1Id = `l1_${p}_${idx}`;
                    const l2Id = `l2_${p}_${idx}`;
                    
                    leafNodes.push({ id: idx, p1x: cx - 35, p2x: cx + 35, y: leafY + 50 });

                    // Sys Mac Id 连线标识 (去堆叠虚拟化)
                    nodesHtml += `<path d="M ${cx-40} ${leafY-30} Q ${cx} ${leafY-45} ${cx+40} ${leafY-30}" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="2,2"/>`;
                    nodesHtml += `<text x="${cx}" y="${leafY-45}" font-size="10" fill="#94a3b8" text-anchor="middle">Sys mac id A</text>`;

                    // 绘制交换机
                    nodesHtml += createSwitch(cx - 70, leafY, 70, 50, 'blue', `L1-${idx}`, l1Id, `<b>L1-${idx}</b><br>所在 POD: ${p+1}<br>角色: Leaf (平面1)<br>上行: 64<br>下行: 64`);
                    nodesHtml += createSwitch(cx + 0, leafY, 70, 50, 'orange', `L2-${idx}`, l2Id, `<b>L2-${idx}</b><br>所在 POD: ${p+1}<br>角色: Leaf (平面2)<br>上行: 64<br>下行: 64`);

                    // 绘制到 Spine 的线 (局部展示以防太乱)
                    if (p === 0 && i === 0) {
                        nodesHtml += `<text x="${cx - 90}" y="${(leafY + spineY)/2}" font-size="14" fill="#94a3b8" transform="rotate(-30, ${cx - 90}, ${(leafY + spineY)/2})">全互联收敛网络</text>`;
                    }
                    
                    spineNodes.forEach(sp => {
                        // 平面1连平面1
                        linesHtml += createCableCurve(cx - 35, leafY, sp.p1x, sp.y, blueColor, `${l1Id} dev-s1_${sp.id}`);
                        // 平面2连平面2
                        linesHtml += createCableCurve(cx + 35, leafY, sp.p2x, sp.y, orangeColor, `${l2Id} dev-s2_${sp.id}`);
                    });
                }

                // Server 层
                const visualServers = 3;
                const serverSpacing = (podWidth - 100) / visualServers;

                for (let s = 0; s < visualServers; s++) {
                    const cx = podX + 50 + serverSpacing * (s + 0.5);
                    const isLast = (s === visualServers - 1);
                    const idx = isLast ? "64" : (s + 1);

                    if (s === visualServers - 2) {
                        nodesHtml += `<text x="${cx}" y="${serverY + 40}" font-size="24" fill="#475569" font-weight="bold" text-anchor="middle">...... 省略部分节点 ......</text>`;
                        continue;
                    }

                    const srvId = `srv_${p}_${idx}`;
                    const serverWidth = 280;
                    
                    // 绘制服务器
                    nodesHtml += createServer(cx - serverWidth/2, serverY, serverWidth, 80, railCount, `算力节点 ${idx} (${gpuType})`, srvId, `<div class="mb-1 font-bold">Server ${idx}</div>配置: ${gpuType}<br>网卡: ${railCount}x CX8`);

                    // 绘制服务器到 Leaf 的网卡连线与 Bond 结构
                    const portGroupSpacing = serverWidth / (railCount + 1);
                    
                    for (let rail = 0; rail < railCount; rail++) {
                        const portX = cx - serverWidth/2 + portGroupSpacing * (rail + 1);
                        const portY = serverY;
                        
                        // 服务器网卡双端口指示
                        nodesHtml += `<rect x="${portX - 12}" y="${portY - 14}" width="10" height="14" fill="#1e3a8a" rx="1"></rect>`;
                        nodesHtml += `<rect x="${portX + 2}" y="${portY - 14}" width="10" height="14" fill="#c2410c" rx="1"></rect>`;
                        nodesHtml += `<text x="${portX - 7}" y="${portY - 4}" font-size="8" fill="#fff" text-anchor="middle">1</text>`;
                        nodesHtml += `<text x="${portX + 7}" y="${portY - 4}" font-size="8" fill="#fff" text-anchor="middle">2</text>`;

                        // 寻址对应的 Leaf (如果网卡数少于8，按比例映射)
                        const targetLeafIdx = (railCount === 8) ? rail : Math.floor(rail * (8 / railCount));
                        const targetLeaf = leafNodes[targetLeafIdx];
                        
                        const l1Id = `l1_${p}_${targetLeaf.id}`;
                        const l2Id = `l2_${p}_${targetLeaf.id}`;

                        // 线条 ID 中包含源和两个目标，以实现联动高亮
                        const linkClasses = `${srvId} dev-${l1Id} dev-${l2Id}`;
                        
                        // 连接 L1
                        linesHtml += createCableCurve(portX - 7, portY - 14, targetLeaf.p1x, targetLeaf.y + 50, blueColor, linkClasses);
                        // 连接 L2
                        linesHtml += createCableCurve(portX + 7, portY - 14, targetLeaf.p2x, targetLeaf.y + 50, orangeColor, linkClasses);

                        // 绘制 LACP 聚合气泡框 (为了不拥挤，只在首尾轨画)
                        if (rail === 0 || rail === railCount - 1) {
                            nodesHtml += createLACPBadge(portX, portY - 40);
                        }
                    }
                }
            }

            // ==========================================
            // 3. 底部理论架构说明图例
            // ==========================================
            const legendY = serverY + 220;
            bgHtml += `
                <g transform="translate(200, ${legendY})">
                    <rect x="0" y="0" width="${spineBoxWidth}" height="260" fill="rgba(15, 23, 42, 0.8)" stroke="#334155" stroke-width="1" rx="12"></rect>
                    <text x="30" y="40" font-size="18" fill="#e2e8f0" font-weight="bold">架构原理：双平面组网 (CX8网卡), Bond模式, VRF路由逃生</text>
                    
                    <circle cx="30" cy="75" r="4" fill="#38bdf8"></circle>
                    <text x="45" y="80" font-size="14" fill="#94a3b8">1. Host CX8 两个端口分别连接到 2个不同平面的 (Leaf 1、Leaf 2) 交换机 (去堆叠)。</text>
                    
                    <circle cx="30" cy="105" r="4" fill="#38bdf8"></circle>
                    <text x="45" y="110" font-size="14" fill="#94a3b8">2. Host CX8 网卡配置动态 <tspan fill="#f8fafc" font-weight="bold">bond 模式 (LACP 端口聚合)</tspan>，ARP双发 (需要内核支持)。</text>
                    
                    <circle cx="30" cy="135" r="4" fill="#38bdf8"></circle>
                    <text x="45" y="140" font-size="14" fill="#94a3b8">3. 两个不同平面Leaf去堆叠设置，使用相同的 sys id、<tspan fill="#f8fafc" font-weight="bold">sys mac (虚拟MAC)</tspan>、不同的 portid 作为 lacp 的 payload，Host 将两台视为一台设备。</text>
                    
                    <circle cx="30" cy="165" r="4" fill="#38bdf8"></circle>
                    <text x="45" y="170" font-size="14" fill="#94a3b8">4. 不同平面的 Leaf 交换机之间通过路由通信，避免相同 MAC 地址造成的二层冲突。</text>

                    <circle cx="30" cy="195" r="4" fill="#38bdf8"></circle>
                    <text x="45" y="200" font-size="14" fill="#94a3b8">5. ARP转明细路由经 BGP 对外发布，上级 Spine 通过 <tspan fill="#f8fafc" font-weight="bold">ECMP</tspan> 下发。单边故障时邻居过期撤销路由，防止单点故障。</text>

                    <circle cx="30" cy="225" r="4" fill="#ef4444"></circle>
                    <text x="45" y="230" font-size="14" fill="#fca5a5" font-weight="bold">6. 逃生极致 (推荐): 利用 Spine 层进行虚拟线跑 (平面1 VRF1, 平面2 VRF2, 两个 VRF 之间互通) 的逃生，不占用物理端口，不影响收敛。</text>
                </g>
            `;

            // 更新左侧侧边栏统计
            const hwData = calcB300Hardware(serverCount);
            const cm = hwData.compute.meta;

            document.getElementById('summaryPanel').innerHTML = `
                <div class="p-3 bg-slate-800 rounded border border-slate-700">
                    <div class="flex justify-between mb-1"><span class="text-slate-400">总算力节点:</span> <span class="text-white font-bold">${serverCount} 台</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">GPU 芯片:</span> <span class="text-cyan-400 font-bold">${serverCount * 8} 颗</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">网络平面:</span> <span class="text-white">2 (蓝色/橙色)</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Rail (轨道):</span> <span class="text-white">${railCount} 轨独立</span></div>
                </div>
                <div class="p-3 bg-slate-800 rounded border border-slate-700 mt-2">
                    <div class="flex justify-between mb-1"><span class="text-slate-400">网络架构:</span> <span class="text-emerald-400 font-semibold">${cm.networkType}</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">划分 POD 数:</span> <span class="text-white">${cm.podCount} 个 (${cm.serversPerPod}台/POD)</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">Leaf 交换机:</span> <span class="text-white">${cm.leafSwitches} 台</span></div>
                    <div class="flex justify-between mb-1"><span class="text-slate-400">Spine 交换机:</span> <span class="text-white">${cm.spineSwitches} 台</span></div>
                    ${cm.coreSwitches > 0 ? `<div class="flex justify-between mb-1"><span class="text-slate-400">Core 交换机:</span> <span class="text-white">${cm.coreSwitches} 台</span></div>` : ''}
                    <div class="flex justify-between"><span class="text-slate-400">核心架构:</span> <span class="text-emerald-400">去堆叠 Bond</span></div>
                </div>
            `;

            // B300 硬件统计表
            const statsContainer = document.getElementById('hardwareStatsContainer');
            if (gpuType === 'B300') {
                statsContainer.classList.remove('hidden');
                renderHardwareStats(hwData);
            } else {
                statsContainer.classList.add('hidden');
            }

            // 先渲染背景(最底层)，再渲染线条(光缆层)，最后渲染节点(设备层)，以防止线条遮挡设备
            svgGroup.innerHTML = bgHtml + linesHtml + nodesHtml;
            setTimeout(resetZoom, 50);
        }

        // 事件委托：处理悬停高亮和 Tooltip
        svgGroup.addEventListener('mouseover', (e) => {
            const devGroup = e.target.closest('.device-group');
            if (devGroup) {
                const text = devGroup.getAttribute('data-tooltip');
                const id = devGroup.getAttribute('data-id');
                if (text) showTooltip(e, text);
                if (id) highlightPaths(id);
            }
        });

        svgGroup.addEventListener('mouseout', (e) => {
            const devGroup = e.target.closest('.device-group');
            if (devGroup) {
                hideTooltip();
                resetHighlights();
            }
        });

        // 确保 Tooltip 在设备内部移动时紧跟鼠标
        svgGroup.addEventListener('mousemove', (e) => {
            if (tooltip.style.opacity === '1') {
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
            }
        });

        window.onload = () => {
            generateTopology();
            
            // 绑定窗口调整大小事件
            window.addEventListener('resize', () => {
                // 可选：防抖动重绘或仅仅调整 viewBox
            });
        };

    </script>
</body>
</html>
